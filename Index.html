<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rehab4Perf — Antoine PERONNAUD</title>
<style>
:root {
  --accent:  #2B5FA6;
  --accent2: #1A3A5C;
  --red:     #C0392B;
  --text3:   rgba(255,255,255,.38);
  --font:    -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #F7F6F3;
}

/* ── Top nav ─────────────────────────────────────────────── */
nav {
background: var(–accent2);
height: 50px;
display: flex;
align-items: center;
padding: 0 20px;
flex-shrink: 0;
box-shadow: 0 2px 10px rgba(0,0,0,.2);
z-index: 100;
}

.logo {
font-family: ‘Georgia’, serif;
font-size: 1.1rem;
font-style: italic;
letter-spacing: -.01em;
margin-right: 24px;
flex-shrink: 0;
user-select: none;
line-height: 1.2;
}
.logo .r { color: var(–accent); }
.logo .n { color: #fff; font-weight: 900; font-style: normal; }
.logo .p { color: var(–red); }

.tabs {
display: flex;
height: 100%;
align-items: stretch;
gap: 2px;
}
.tab {
display: flex;
align-items: center;
gap: 7px;
padding: 0 18px;
color: rgba(255,255,255,.75);
font-size: .85rem;
font-weight: 500;
cursor: pointer;
border: none;
background: none;
font-family: var(–font);
border-bottom: 3px solid transparent;
transition: color .15s, background .15s;
white-space: nowrap;
}
.tab:hover { color: #fff; background: rgba(255,255,255,.07); }
.tab.active {
color: #fff;
border-bottom-color: var(–accent);
background: rgba(255,255,255,.06);
}

.nav-right {
margin-left: auto;
font-size: .7rem;
color: rgba(255,255,255,.65);
text-align: right;
line-height: 1.55;
}

/* ── Iframes ─────────────────────────────────────────────── */
.frame-wrap {
display: none;
flex: 1;
overflow: hidden;
}
.frame-wrap.active { display: flex; }

iframe {
width: 100%;
height: 100%;
border: none;
display: block;
}

@media (max-width: 600px) {
nav { padding: 0 10px; }
.tab { padding: 0 11px; font-size: .8rem; }
.logo { margin-right: 14px; font-size: .95rem; }
.nav-right { display: none; }
}
</style>

</head>
<body>

<nav>
  <div class="logo">
    <span class="r">Rehab</span><span class="n" style="font-family:'Georgia',serif;font-weight:900;font-style:normal">4</span><span class="p">Perf</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="show('bilan')" id="tab-bilan">
      <span>📋</span> Bilan
    </button>
    <button class="tab" onclick="show('outils')" id="tab-outils">
      <span>🔧</span> Outils
    </button>
  </div>
  <div class="nav-right">
    Antoine PERONNAUD<br>Athletik Lamarck · N° AM 757 099 486
  </div>
</nav>

<div class="frame-wrap active" id="wrap-bilan">
  <iframe src="bilan.html" id="frame-bilan" title="Bilan clinique"></iframe>
</div>

<div class="frame-wrap" id="wrap-outils">
  <iframe src="outils.html" id="frame-outils" title="Outils cliniques" loading="lazy"></iframe>
</div>

<script>
function show(id) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.frame-wrap').forEach(function(w){ w.classList.remove('active'); });
  document.getElementById('tab-' + id).classList.add('active');
  document.getElementById('wrap-' + id).classList.add('active');
}
</script>

</body>
</html>
