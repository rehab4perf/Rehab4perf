<style>
:root{--navy:#1A3A5C;--accent:#2B5FA6;--accent-l:#EEF3FB;--green:#2D6A4F;--orange:#D4600A;--border:#E8E6E1;--text:#1A1917;--muted:#9D9B96;--bg:#F5F7FA;--surface:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.hdr{background:var(--navy);padding:18px 32px;display:flex;align-items:center;gap:14px}
.hdr-logo{display:inline-flex;align-items:center;gap:8px}
.hdr-logo .r{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:21px;color:#fff}
.hdr-logo .e{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:.44em;vertical-align:super;color:#7FA8D9;margin:0 .04em;line-height:0}
.hdr-logo .p{font-family:'Poppins',sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:-.025em}
.hdr-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:20px;padding:3px 10px}
.hdr-sub{color:rgba(255,255,255,.5);font-size:.72rem;margin-left:auto;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-label{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-right:2px}
.ctrl-btn{padding:4px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:#6B6860;font-size:.76rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700}
.ctrl-sep{width:1px;height:22px;background:var(--border)}
.main{padding:28px 32px;max-width:1140px}
.cat-block{margin-bottom:32px}
.cat-title{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding-bottom:10px;border-bottom:2px solid var(--border);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.cat-badge{background:var(--accent-l);color:var(--accent);font-size:.6rem;font-weight:700;border-radius:4px;padding:2px 7px;letter-spacing:.06em}
.cat-badge.new{background:#E8F5E9;color:#2E7D32}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:18px 12px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative}
.card:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(43,95,166,.1)}
.card.ok{border-color:#2D6A4F;background:#F3FAF6}
.card.selected{border-color:var(--accent);background:var(--accent-l)}
.card.new-icon{border-style:dashed;border-color:var(--accent)}
.icon-wrap{width:56px;height:56px;border-radius:14px;background:#F0F4F8;display:flex;align-items:center;justify-content:center;transition:background .15s}
.card.ok .icon-wrap{background:#E3F4EA}
.card.selected .icon-wrap{background:#DDE9F8}
.card-name{font-size:.72rem;font-weight:700;color:var(--navy);text-align:center;line-height:1.3}
.card-ctx{font-size:.62rem;color:var(--muted);text-align:center;margin-top:-2px}
.sizes{display:flex;align-items:flex-end;gap:12px;padding-top:8px;border-top:1px solid var(--border);width:100%}
.sz{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.sz-lbl{font-size:.56rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600}
.v1-chip{position:absolute;top:8px;right:8px;font-size:.55rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:#FEF3EB;color:#D4600A;border:1px solid #F5CBA7}
.ok-chip{position:absolute;top:8px;right:8px;font-size:.55rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:#E8F5E9;color:#2E7D32}
.note{background:var(--accent-l);border:1px solid rgba(43,95,166,.2);border-radius:10px;padding:12px 16px;margin-bottom:24px;font-size:.8rem;color:var(--navy);line-height:1.6}
.note strong{font-weight:700}
.legend{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--muted)}
.leg-dot{width:12px;height:12px;border-radius:3px;border:1.5px solid}
</style>

/* ── RENDER ── */
function renderIcon(icon, size) {
  var c = COLORS[icon.colorOverride] || C;
  return svg(icon.paths, size, c, SW);
}

function renderAll() {
  var html = '';
  SECTIONS.forEach(function(sec) {
    html += '<div class="cat-block">'
      +'<div class="cat-title">'+sec.title
      +(sec.badge?'<span class="cat-badge'+(sec.badge==='Programme'?' new':'')+'">'+ sec.badge +'</span>':'')
      +'</div>'
      +'<div class="grid">';
    sec.items.forEach(function(icon) {
      var cls = icon.status==='ok' ? 'card ok' : icon.status==='new' ? 'card new-icon' : 'card';
      var chip = icon.status==='ok'
        ? '<div class="ok-chip">✓ v1</div>'
        : icon.status==='new' ? '<div class="v1-chip">v2</div>' : '';
      html += '<div class="'+cls+'" onclick="this.classList.toggle(\'selected\')">'
        + chip
        + '<div class="icon-wrap">'+renderIcon(icon, 48)+'</div>'
        + '<div class="card-name">'+icon.name+'</div>'
        + '<div class="card-ctx">'+icon.ctx+'</div>'
        + '<div class="sizes">'
        +   '<div class="sz"><div style="height:20px;display:flex;align-items:center;justify-content:center">'+renderIcon(icon,20)+'</div><div class="sz-lbl">Sidebar</div></div>'
        +   '<div class="sz"><div style="height:32px;display:flex;align-items:center;justify-content:center">'+renderIcon(icon,32)+'</div><div class="sz-lbl">Header</div></div>'
        + '</div>'
        + '</div>';
    });
    html += '</div></div>';
  });
  document.getElementById('mount').innerHTML = html;
}

function setColor(k, btn) {
  document.querySelectorAll('.ctrl-btn').forEach(function(b){ if(['Navy','Accent','Vert'].indexOf(b.textContent)>-1) b.classList.remove('active'); });
  btn.classList.add('active');
  C = COLORS[k];
  renderAll();
}
function setSW(v, btn) {
  document.querySelectorAll('.ctrl-btn').forEach(function(b){ if(['Fin','Moyen','Épais'].indexOf(b.textContent)>-1) b.classList.remove('active'); });
  btn.classList.add('active');
  SW = v;
  renderAll();
}

renderAll();
</script>
