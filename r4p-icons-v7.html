<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>rehab⁴perf — Icônes v7 — Articulations</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@1,600&family=Poppins:wght@800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A3A5C;--accent:#2B5FA6;--green:#2D6A4F;--orange:#D4600A;--border:#E8E6E1;--bg:#F5F7FA;--surface:#fff;--muted:#9D9B96}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--navy)}
.hdr{background:var(--navy);padding:16px 28px;display:flex;align-items:center;gap:12px}
.hdr-logo{display:inline-flex;align-items:center;gap:8px}
.hdr-logo .r{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:20px;color:#fff}
.hdr-logo .e{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:.44em;vertical-align:super;color:#7FA8D9;margin:0 .04em}
.hdr-logo .p{font-family:'Poppins',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:-.025em}
.badge{background:rgba(255,165,0,.25);border:1px solid rgba(255,165,0,.5);color:#FFD580;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:20px;padding:3px 10px}
.hdr-src{color:rgba(255,255,255,.45);font-size:.68rem;margin-left:auto;letter-spacing:.06em;font-weight:600}
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-label{font-size:.63rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.btn{padding:4px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:#6B6860;font-size:.74rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700}
.sep{width:1px;height:22px;background:var(--border)}
.main{padding:24px 28px;max-width:980px}
.cat{margin-bottom:36px}
.cat-hdr{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding-bottom:9px;border-bottom:2px solid var(--border);margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:16px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative}
.card:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(43,95,166,.08)}
.card.sel{border-color:var(--accent);background:#EEF3FB}
.icon-bg{width:68px;height:68px;border-radius:14px;background:#EEF3FB;display:flex;align-items:center;justify-content:center}
.card-name{font-size:.72rem;font-weight:700;color:var(--navy);text-align:center;line-height:1.3}
.card-ctx{font-size:.6rem;color:var(--muted);text-align:center;line-height:1.4}
.sizes{display:flex;align-items:flex-end;gap:10px;padding-top:7px;border-top:1px solid var(--border);width:100%}
.sz{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.sz-lbl{font-size:.54rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600}
.chip{position:absolute;top:7px;right:7px;font-size:.52rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:#EEF3FB;color:#2B5FA6}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <svg viewBox="8 34 164 104" width="24" height="16" aria-hidden="true"><g stroke="#4A90D9" stroke-width="17" stroke-linecap="round" fill="none"><line x1="20" y1="118" x2="56" y2="104"/><line x1="70" y1="122" x2="100" y2="84"/><line x1="112" y1="125" x2="134" y2="66"/><line x1="158" y1="128" x2="158" y2="46"/></g></svg>
    <span><span class="r">rehab<span class="e">4</span></span><span class="p">perf</span></span>
  </div>
  <div class="badge">Icônes v7 — Articulations</div>
  <div class="hdr-src">4 icônes · vues distinctes · fill</div>
</div>

<div class="controls">
  <span class="ctrl-label">Couleur</span>
  <button class="btn on" onclick="setC('navy',this)">Navy</button>
  <button class="btn" onclick="setC('accent',this)">Accent</button>
  <button class="btn" onclick="setC('green',this)">Vert</button>
  <button class="btn" onclick="setC('orange',this)">Orange</button>
  <div class="sep"></div>
  <span class="ctrl-label">Taille aperçu</span>
  <button class="btn" onclick="setPrev(36,this)">S</button>
  <button class="btn on" onclick="setPrev(48,this)">M</button>
  <button class="btn" onclick="setPrev(64,this)">L</button>
  <button class="btn" onclick="setPrev(80,this)">XL</button>
</div>

<div class="main" id="main"></div>

<script>
var COLOR='#1A3A5C', PREV=48;
var COLORS={navy:'#1A3A5C',accent:'#2B5FA6',green:'#2D6A4F',orange:'#D4600A'};

var ICONS=[{ cat:'Bilan — Articulations', items:[

{
  name:'Épaule',
  ctx:'Vue latérale · socket en C + tête humérale',
  vb:'0 0 48 48',
  /*
   * Shoulder LATERAL cross-section:
   * - Right side: glenoid socket (concave C-cup shape)
   * - Left: humeral head (large ball) partly in the socket
   * - Below the ball: humerus shaft
   * This is clearly a ball-and-socket from the side.
   */
  d:`<path d="M8 24C8 14 13 7 20 7C23 7 26 8 26 10L26 38C26 40 23 41 20 41C13 41 8 34 8 24Z"/>
  <circle cx="32" cy="22" r="14"/>
  <rect x="26" y="34" width="12" height="12" rx="6"/>`
},

{
  name:'Hanche',
  ctx:'Vue antérieure · bassin + 2 têtes fémorales',
  vb:'0 0 48 48',
  /*
   * Hip ANTERIOR (front) view:
   * - Wide pelvic arch at top (clearly wider than a shoulder)
   * - TWO acetabulum circles (left + right femoral heads) — key differentiator
   * - TWO femur shafts going down
   * This shape is unmistakably a PELVIS — very different from shoulder.
   */
  d:`<path fill-rule="evenodd" clip-rule="evenodd" d="
    M4 20C4 9 13 2 24 2C35 2 44 9 44 20C44 28 39 33 32 35L32 46L26 46L26 35L22 35L22 46L16 46L16 35C9 33 4 28 4 20Z
    M14 14C11 14 8 17 8 20C8 23 11 26 14 26C17 26 20 23 20 20C20 17 17 14 14 14Z
    M34 14C31 14 28 17 28 20C28 23 31 26 34 26C37 26 40 23 40 20C40 17 37 14 34 14Z
  "/>`
},

{
  name:'Genou',
  ctx:'Vue latérale · fémur + rotule proéminente',
  vb:'0 0 48 48',
  /*
   * Knee LATERAL view:
   * - Main body: femur shaft (top) + condyle + tibia (bottom) as one piece
   * - Patella: separate prominent oval on the ANTERIOR side
   * The patella oval protruding to the right is the defining feature.
   */
  d:`<path d="M16 4L28 4L28 20C36 20 44 26 44 34C44 42 36 46 28 46L16 46C10 46 4 42 4 34C4 26 12 20 16 20Z"/>
  <ellipse cx="45" cy="27" rx="5" ry="9"/>`
},

{
  name:'Pied / Cheville',
  ctx:'Vue médiale · cheville + voûte + orteils',
  vb:'0 0 48 48',
  /*
   * Foot MEDIAL profile (inner side):
   * - Tibia/fibula coming down from top-left
   * - Heel (calcaneus) at bottom-left, rounded
   * - Plantar arch (slight curve underneath)
   * - Ball of foot and toes at right
   * - Ankle malleolus as a small circular cutout
   */
  d:`<path fill-rule="evenodd" clip-rule="evenodd" d="
    M12 6C12 3 14 2 17 3C20 4 21 8 21 13L21 20
    L32 20C35 20 38 23 37 27L33 27
    L42 27C46 27 48 31 47 35C47 38 44 40 41 40
    L37 40L36 43C34 46 31 47 28 47
    L12 47C8 47 5 44 5 40C5 36 7 31 10 27L10 6
    C10 6 11 6 12 6Z
    M12 30C10 30 8 32 8 34C8 36 10 38 12 38C14 38 16 36 16 34C16 32 14 30 12 30Z
  "/>`
},

]}];

function mkSvg(icon, size) {
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="'+(icon.vb||'0 0 48 48')+'" width="'+size+'" height="'+size+'" fill="'+COLOR+'" style="flex-shrink:0">'+icon.d+'</svg>';
}

function render() {
  var html='';
  ICONS.forEach(function(sec){
    html+='<div class="cat"><div class="cat-hdr">'+sec.cat+'</div><div class="grid">';
    sec.items.forEach(function(icon){
      html+='<div class="card" onclick="this.classList.toggle(\'sel\')">'
        +'<div class="chip">fill</div>'
        +'<div class="icon-bg">'+mkSvg(icon,PREV)+'</div>'
        +'<div class="card-name">'+icon.name+'</div>'
        +'<div class="card-ctx">'+icon.ctx+'</div>'
        +'<div class="sizes">'
        +'<div class="sz"><div style="height:26px;display:flex;align-items:center">'+mkSvg(icon,20)+'</div><div class="sz-lbl">20px</div></div>'
        +'<div class="sz"><div style="height:38px;display:flex;align-items:center">'+mkSvg(icon,32)+'</div><div class="sz-lbl">32px</div></div>'
        +'<div class="sz"><div style="height:52px;display:flex;align-items:center">'+mkSvg(icon,40)+'</div><div class="sz-lbl">40px</div></div>'
        +'</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('main').innerHTML=html;
}

function setC(k,btn){
  document.querySelectorAll('.btn').forEach(function(b){if(['Navy','Accent','Vert','Orange'].includes(b.textContent))b.classList.remove('on');});
  btn.classList.add('on'); COLOR=COLORS[k]; render();
}
function setPrev(v,btn){
  document.querySelectorAll('.btn').forEach(function(b){if(['S','M','L','XL'].includes(b.textContent))b.classList.remove('on');});
  btn.classList.add('on'); PREV=v; render();
}
render();
</script>
</body>
</html>
