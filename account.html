<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Mon compte – Rehab4Perf</title>
<style>
:root {
  --navy:#1A3A5C; --accent:#2B5FA6; --accent2:#4A90D9;
  --bg:#F0F4F8; --surface:#fff; --text:#1a2433; --muted:#6b7a8d;
  --border:#dde3ec;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { min-height:100%; background:var(--bg); font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; color:var(--text); }

.account-wrap { padding:24px; max-width:640px; margin:0 auto; }

.page-header { margin-bottom:20px; }
.page-header h1 { font-size:1.1rem; font-weight:700; color:var(--navy); margin-bottom:2px; }
.page-header p { font-size:.8rem; color:var(--muted); }

.card { background:var(--surface); border-radius:10px; border:1px solid var(--border); padding:20px; margin-bottom:16px; }
.card-title { font-size:.72rem; font-weight:700; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:14px; }

.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group.full { grid-column:1/-1; }
.form-label { font-size:.72rem; font-weight:600; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }
.form-input {
  padding:8px 10px; border:1px solid var(--border); border-radius:6px;
  font-size:.85rem; color:var(--text); outline:none; background:#FAFBFD;
  font-family:inherit;
}
.form-input:focus { border-color:var(--accent2); background:#fff; }

.btn { padding:9px 18px; border-radius:6px; border:none; font-size:.82rem; font-weight:600; cursor:pointer; transition:background .15s; font-family:inherit; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--navy); }

.btn-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.save-status { font-size:.78rem; color:#27AE60; display:none; }

.avatar { width:56px; height:56px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.3rem; font-weight:700; flex-shrink:0; }
.user-row { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
.user-meta h2 { font-size:.95rem; font-weight:700; color:var(--text); }
.user-meta p { font-size:.78rem; color:var(--muted); }

.info-item { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
.info-item:last-child { border-bottom:none; }
.info-label { font-size:.82rem; font-weight:600; }
.info-sub { font-size:.74rem; color:var(--muted); margin-top:1px; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:.68rem; font-weight:700; }
.badge-green { background:#EFF9EE; color:#2D7D46; }

@media (max-width:500px) {
  .form-grid { grid-template-columns:1fr; }
  .form-group.full { grid-column:1; }
  .account-wrap { padding:16px; }
}
</style>
</head>
<body>
<div class="account-wrap">

  <div class="page-header">
    <h1>Mon compte</h1>
    <p>Vos informations professionnelles apparaissent dans les exports et CR patients</p>
  </div>

  <!-- Identité -->
  <div class="card">
    <div class="user-row">
      <div class="avatar" id="avatarCircle">?</div>
      <div class="user-meta">
        <h2 id="displayName">—</h2>
        <p id="displayCabinet">—</p>
      </div>
    </div>
    <div class="card-title">Informations professionnelles</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Prénom</label>
        <input class="form-input" id="fieldPrenom" type="text" placeholder="Jean">
      </div>
      <div class="form-group">
        <label class="form-label">Nom</label>
        <input class="form-input" id="fieldNom" type="text" placeholder="Dupont">
      </div>
      <div class="form-group">
        <label class="form-label">N° ADELI / AM</label>
        <input class="form-input" id="fieldAM" type="text" placeholder="123456789">
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input class="form-input" id="fieldTel" type="tel" placeholder="06 12 34 56 78">
      </div>
      <div class="form-group full">
        <label class="form-label">Email professionnel</label>
        <input class="form-input" id="fieldEmail" type="email" placeholder="jean.dupont@cabinet.fr">
      </div>
      <div class="form-group full">
        <label class="form-label">Cabinet / Structure</label>
        <input class="form-input" id="fieldCabinet" type="text" placeholder="Athletik Lamarck">
      </div>
    </div>
    <div class="btn-row" style="margin-top:16px;">
      <button class="btn btn-primary" onclick="saveProfile()">Enregistrer</button>
      <span class="save-status" id="saveStatus">✓ Sauvegardé</span>
    </div>
  </div>

  <!-- Accès -->
  <div class="card">
    <div class="card-title">Accès & Sécurité</div>
    <div class="info-item">
      <div>
        <div class="info-label">Protection du site</div>
        <div class="info-sub">Accès sécurisé par mot de passe Netlify</div>
      </div>
      <span class="badge badge-green">Actif</span>
    </div>
    <div class="info-item">
      <div>
        <div class="info-label">Données locales</div>
        <div class="info-sub">Bilans et données patients stockés sur cet appareil</div>
      </div>
      <span class="badge badge-green">Privé</span>
    </div>
  </div>

</div>

<script>
function getProfile() {
  try { return JSON.parse(localStorage.getItem('r4p-profile') || '{}'); } catch(e) { return {}; }
}

function loadProfile() {
  var p = getProfile();
  var prenom  = p.prenom  || '';
  var nom     = p.nom     || '';
  var cabinet = p.cabinet || '';
  var fullName = (prenom + ' ' + nom).trim();

  document.getElementById('fieldPrenom').value  = prenom;
  document.getElementById('fieldNom').value     = nom;
  document.getElementById('fieldAM').value      = p.am  || '';
  document.getElementById('fieldTel').value     = p.tel || '';
  document.getElementById('fieldEmail').value   = p.email || '';
  document.getElementById('fieldCabinet').value = cabinet;

  document.getElementById('displayName').textContent    = fullName || 'Mon compte';
  document.getElementById('displayCabinet').textContent = cabinet  || '—';

  var initials = ((prenom[0] || '') + (nom[0] || '')).toUpperCase() || '?';
  document.getElementById('avatarCircle').textContent = initials;
}

function saveProfile() {
  var profile = {
    prenom:  document.getElementById('fieldPrenom').value.trim(),
    nom:     document.getElementById('fieldNom').value.trim(),
    am:      document.getElementById('fieldAM').value.trim(),
    tel:     document.getElementById('fieldTel').value.trim(),
    email:   document.getElementById('fieldEmail').value.trim(),
    cabinet: document.getElementById('fieldCabinet').value.trim()
  };
  try { localStorage.setItem('r4p-profile', JSON.stringify(profile)); } catch(e) {}
  loadProfile();
  // Broadcast to parent (nav display)
  if(window.parent !== window) {
    window.parent.postMessage({ type:'r4p-profile', profile:profile }, '*');
  }
  var status = document.getElementById('saveStatus');
  status.style.display = 'inline';
  setTimeout(function(){ status.style.display = 'none'; }, 2500);
}

// Allow Enter to save
document.addEventListener('keydown', function(e) {
  if(e.key === 'Enter' && e.target.classList.contains('form-input')) saveProfile();
});

loadProfile();
</script>
</body>
</html>
