<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Prescription d'exercices</title>
<style>
:root {
  --navy:#1A3A5C; --accent:#2B5FA6; --accent2:#4A90D9;
  --bg:#F0F4F8; --surface:#fff; --text:#1a2433; --muted:#6b7a8d;
  --border:#dde3ec; --tag-bg:#EBF3FF; --tag-color:#2B5FA6;
  --sidebar-w:300px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; background:var(--bg); font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; color:var(--text); }

/* ── LAYOUT ── */
.app { display:flex; height:100%; overflow:hidden; }

/* Sidebar library */
.sidebar {
  width:var(--sidebar-w); min-width:240px; max-width:360px;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0;
}
.sidebar-header { padding:14px 14px 10px; background:var(--navy); }
.sidebar-title { color:#fff; font-size:.82rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; margin-bottom:8px; }
.search-box {
  width:100%; padding:7px 10px; border:none; border-radius:6px;
  background:rgba(255,255,255,.15); color:#fff; font-size:.82rem; outline:none;
}
.search-box::placeholder { color:rgba(255,255,255,.5); }
.filter-row { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.filter-btn {
  padding:3px 9px; border-radius:12px; border:1px solid rgba(255,255,255,.3);
  background:none; color:rgba(255,255,255,.75); font-size:.72rem; cursor:pointer;
  transition:background .15s, color .15s;
}
.filter-btn.active, .filter-btn:hover { background:var(--accent2); border-color:var(--accent2); color:#fff; }

.lib-scroll { flex:1; overflow-y:auto; padding:8px 0; }
.lib-section { margin-bottom:4px; }
.lib-section-title {
  padding:6px 14px 4px; font-size:.7rem; font-weight:700;
  color:var(--muted); letter-spacing:.08em; text-transform:uppercase;
  position:sticky; top:0; background:var(--surface); z-index:1;
}
.lib-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:7px 14px; cursor:pointer; gap:8px;
  border-left:3px solid transparent; transition:background .12s;
}
.lib-item:hover { background:#F5F8FF; border-left-color:var(--accent2); }
.lib-item-info { flex:1; min-width:0; }
.lib-item-name { font-size:.8rem; font-weight:500; color:var(--text); line-height:1.3; }
.lib-item-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:2px; }
.lib-tag {
  padding:1px 6px; border-radius:8px; background:var(--tag-bg);
  color:var(--tag-color); font-size:.65rem; font-weight:600; letter-spacing:.03em; white-space:nowrap;
}
.lib-tag.renfo { background:#EFF9EE; color:#2D7D46; }
.lib-tag.automassage { background:#FFF4EC; color:#C05621; }
.lib-add-btn {
  width:24px; height:24px; border-radius:50%; border:none;
  background:var(--accent2); color:#fff; font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  line-height:1; transition:background .15s; padding:0;
}
.lib-add-btn:hover { background:var(--accent); }
.lib-item.added .lib-add-btn { background:#27AE60; }
.lib-item.added .lib-add-btn::before { content:'✓'; }
.lib-item:not(.added) .lib-add-btn::before { content:'+'; }

/* Main prescription zone */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.main-header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:12px 18px; display:flex; align-items:center; gap:12px; flex-shrink:0;
}
.main-header h1 { font-size:.92rem; font-weight:700; color:var(--navy); flex:1; }
.patient-input {
  padding:6px 10px; border:1px solid var(--border); border-radius:6px;
  font-size:.8rem; color:var(--text); outline:none; width:180px;
}
.patient-input:focus { border-color:var(--accent2); }
.btn {
  padding:7px 14px; border-radius:6px; border:none; font-size:.78rem;
  font-weight:600; cursor:pointer; transition:background .15s;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--navy); }
.btn-outline { background:none; color:var(--accent); border:1px solid var(--accent); }
.btn-outline:hover { background:var(--tag-bg); }
.btn-danger { background:none; color:#E74C3C; border:1px solid #E74C3C; }
.btn-danger:hover { background:#FEF0EE; }

.session-area { flex:1; overflow-y:auto; padding:16px 18px; }

/* Bloc section */
.bloc { background:var(--surface); border-radius:10px; border:1px solid var(--border); margin-bottom:14px; overflow:hidden; }
.bloc-header {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:var(--navy); color:#fff;
}
.bloc-title-input {
  flex:1; background:transparent; border:none; color:#fff;
  font-size:.88rem; font-weight:700; outline:none; letter-spacing:.03em;
}
.bloc-title-input::placeholder { color:rgba(255,255,255,.5); }
.bloc-del-btn { background:none; border:none; color:rgba(255,255,255,.55); cursor:pointer; font-size:.9rem; padding:2px 6px; border-radius:4px; }
.bloc-del-btn:hover { color:#fff; background:rgba(255,255,255,.15); }
.bloc-del-btn::before { content:'×'; font-size:1.2rem; line-height:1; }
.bloc-body { padding:8px; }

/* Exercise rows */
.exo-row {
  display:grid; align-items:start; gap:6px; padding:8px 6px;
  border-bottom:1px solid var(--border);
  grid-template-columns: 28px 1fr 60px 60px 48px 60px 76px 130px 32px;
}
.exo-row:last-child { border-bottom:none; }
.exo-col-header {
  display:grid; gap:6px; padding:4px 6px 2px;
  grid-template-columns: 28px 1fr 60px 60px 48px 60px 76px 130px 32px;
}
.col-lbl { font-size:.65rem; font-weight:700; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }
.drag-handle { color:var(--border); cursor:grab; font-size:1rem; display:flex; align-items:center; justify-content:center; user-select:none; }
.exo-name-cell { min-width:0; }
.exo-name { font-size:.8rem; font-weight:600; color:var(--text); line-height:1.3; }
.exo-sub { display:flex; gap:6px; flex-wrap:wrap; margin-top:2px; }
.cell-input {
  width:100%; padding:4px 6px; border:1px solid var(--border); border-radius:5px;
  font-size:.78rem; color:var(--text); text-align:center; outline:none;
  background:#FAFBFD;
}
.cell-input:focus { border-color:var(--accent2); background:#fff; }
.exo-del-btn {
  width:24px; height:24px; border-radius:4px; border:none;
  background:none; color:#CBD2DB; cursor:pointer; font-size:1rem;
  display:flex; align-items:center; justify-content:center; transition:color .15s;
}
.exo-del-btn:hover { color:#E74C3C; }
.exo-del-btn::before { content:'×'; }
.vid-link {
  display:inline-flex; align-items:center; gap:3px;
  color:var(--accent2); font-size:.7rem; text-decoration:none;
  padding:1px 5px; border-radius:4px; border:1px solid var(--tag-bg);
  background:var(--tag-bg); white-space:nowrap;
}
.vid-link:hover { background:#D6E9FF; }

.add-bloc-btn {
  width:100%; padding:10px; border:2px dashed var(--border); border-radius:8px;
  background:none; color:var(--muted); font-size:.82rem; cursor:pointer;
  font-family:inherit; transition:border-color .15s, color .15s; margin-bottom:14px;
}
.add-bloc-btn:hover { border-color:var(--accent2); color:var(--accent2); }

/* Notes area */
.notes-bloc { background:var(--surface); border-radius:10px; border:1px solid var(--border); padding:12px 14px; margin-bottom:14px; }
.notes-label { font-size:.72rem; font-weight:700; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
.notes-ta { width:100%; border:1px solid var(--border); border-radius:6px; padding:8px; font-size:.8rem; font-family:inherit; color:var(--text); resize:vertical; min-height:60px; outline:none; }
.notes-ta:focus { border-color:var(--accent2); }

/* Empty state */
.empty-state { text-align:center; padding:48px 24px; color:var(--muted); }
.empty-state .icon { font-size:2.5rem; margin-bottom:10px; opacity:.4; }
.empty-state p { font-size:.85rem; line-height:1.6; }

/* Print */
@media print {
  .sidebar, .main-header .btn, .add-bloc-btn, .exo-del-btn, .bloc-del-btn, .drag-handle { display:none !important; }
  .app { display:block; }
  .main { display:block; }
  .session-area { overflow:visible; padding:10px; }
  .exo-row { page-break-inside:avoid; }
  body { color:#000; background:#fff; }
}

/* Cible cell */
.cible-cell { display:flex; gap:3px; align-items:center; }
.cible-select {
  padding:4px 4px; border:1px solid var(--border); border-radius:5px;
  font-size:.72rem; color:var(--text); outline:none; background:#FAFBFD;
  cursor:pointer; min-width:0; flex:0 0 auto;
}
.cible-select:focus { border-color:var(--accent2); background:#fff; }
.cible-val {
  width:100%; padding:4px 4px; border:1px solid var(--border); border-radius:5px;
  font-size:.78rem; color:var(--text); text-align:center; outline:none;
  background:#FAFBFD; min-width:0;
}
.cible-val:focus { border-color:var(--accent2); background:#fff; }

/* Export modal */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100;
  display:flex; align-items:center; justify-content:center;
}
.modal-overlay.hidden { display:none; }
.modal {
  background:#fff; border-radius:12px; padding:24px; max-width:520px; width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.modal h2 { font-size:.95rem; font-weight:700; color:var(--navy); margin-bottom:6px; }
.modal p { font-size:.8rem; color:var(--muted); margin-bottom:14px; line-height:1.5; }
.modal-btns { display:flex; gap:8px; flex-wrap:wrap; }
.modal-close { position:absolute; top:10px; right:14px; background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--muted); }

/* Mobile */
@media (max-width:700px) {
  :root { --sidebar-w:100%; }
  .app { flex-direction:column; }
  .sidebar { width:100%; max-width:100%; max-height:40vh; border-right:none; border-bottom:1px solid var(--border); }
  .exo-row { grid-template-columns: 1fr 48px 48px 42px 56px 68px 110px 28px; }
  .exo-row > .drag-handle { display:none; }
  .exo-col-header { grid-template-columns: 1fr 48px 48px 42px 56px 68px 110px 28px; }
  .exo-col-header > .col-lbl:first-child { display:none; }
}
</style>
</head>
<body>
<div class="app">

<!-- ═══════════════════════════════ SIDEBAR ═══════════════════════════════ -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Bibliothèque d'exercices</div>
    <input class="search-box" type="text" id="searchInput" placeholder="Rechercher un exercice…" oninput="filterLib()">
    <div class="filter-row" id="filterRow">
      <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">Tous</button>
      <button class="filter-btn" data-filter="warmup" onclick="setFilter(this,'warmup')">Warm-up</button>
      <button class="filter-btn" data-filter="renfo" onclick="setFilter(this,'renfo')">Renfo</button>
      <button class="filter-btn" data-filter="automassage" onclick="setFilter(this,'automassage')">Auto-massage</button>
    </div>
  </div>
  <div class="lib-scroll" id="libScroll"></div>
</aside>

<!-- ═══════════════════════════════ MAIN ════════════════════════════════ -->
<div class="main">
  <div class="main-header">
    <h1>Prescription d'exercices</h1>
    <input class="patient-input" type="text" id="patientName" placeholder="Nom du patient" />
    <button class="btn btn-outline" onclick="addBloc()">+ Bloc</button>
    <button class="btn btn-primary" onclick="exportSession()">📤 Exporter</button>
    <button class="btn btn-outline" onclick="window.print()">🖨 Imprimer</button>
    <button class="btn btn-danger" onclick="clearSession()">Effacer</button>
  </div>
  <div class="session-area" id="sessionArea">
    <div class="empty-state" id="emptyState">
      <div class="icon">📋</div>
      <p>Ajoutez un bloc puis sélectionnez des exercices<br>depuis la bibliothèque pour construire votre séance.</p>
    </div>
  </div>
</div>

</div><!-- .app -->

<!-- Export modal -->
<div class="modal-overlay hidden" id="exportModal">
  <div class="modal" style="position:relative;">
    <button class="modal-close" onclick="document.getElementById('exportModal').classList.add('hidden')">×</button>
    <h2>Exporter la séance</h2>
    <p>Génère un fichier HTML autonome avec les liens vidéo cliquables, prêt à envoyer par email ou messagerie.</p>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="downloadExport()">⬇ Télécharger le fichier HTML</button>
      <button class="btn btn-outline" onclick="copyExportLink()">📋 Copier le HTML</button>
      <button class="btn btn-outline" onclick="document.getElementById('exportModal').classList.add('hidden')">Annuler</button>
    </div>
  </div>
</div>

/* ================================================================
   STATE
   ================================================================ */
var blocs = [];
var currentFilter = 'all';
var activeBloc = null; // id of the bloc to add exos to

/* ================================================================
   LIBRARY RENDER
   ================================================================ */
function getTypeLabel(t){ return {warmup:'Warm-up',renfo:'Renfo',automassage:'Auto-massage'}[t]||t; }
function getTypeClass(t){ return t==='renfo'?'renfo':t==='automassage'?'automassage':''; }

function filterLib(){
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  renderLib(q);
}

function setFilter(btn, f){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  filterLib();
}

function renderLib(q){
  q = (q||'').toLowerCase();
  var scroll = document.getElementById('libScroll');
  // Group by zone within type
  var visible = LIBRARY.filter(function(ex){
    if(currentFilter!=='all' && ex.type!==currentFilter) return false;
    if(q && ex.name.toLowerCase().indexOf(q)===-1 && ex.zone.toLowerCase().indexOf(q)===-1 && ex.obj.toLowerCase().indexOf(q)===-1) return false;
    return true;
  });
  // Group by zone
  var groups = {};
  var order = [];
  visible.forEach(function(ex){
    var k = ex.type+'||'+ex.zone;
    if(!groups[k]){ groups[k]={type:ex.type,zone:ex.zone,items:[]}; order.push(k); }
    groups[k].items.push(ex);
  });
  // Get added ids
  var addedIds = {};
  blocs.forEach(function(b){ b.exos.forEach(function(e){ addedIds[e.libId]=true; }); });
  var html = '';
  order.forEach(function(k){
    var g = groups[k];
    html += '<div class="lib-section">';
    html += '<div class="lib-section-title">'+escH(g.zone)+'</div>';
    g.items.forEach(function(ex){
      var isAdded = !!addedIds[ex.id];
      html += '<div class="lib-item'+(isAdded?' added':'')+'" id="li-'+ex.id+'">';
      html += '<div class="lib-item-info">';
      html += '<div class="lib-item-name">'+escH(ex.name)+'</div>';
      html += '<div class="lib-sub">';
      html += '<span class="lib-tag '+getTypeClass(ex.type)+'">'+getTypeLabel(ex.type)+'</span>';
      if(ex.obj) html += '<span class="lib-tag" style="background:#F3F0FF;color:#5B4FBF;">'+escH(ex.obj)+'</span>';
      html += '</div></div>';
      html += '<button class="lib-add-btn" onclick="addExoFromLib(\''+ex.id+'\')" title="Ajouter"></button>';
      html += '</div>';
    });
    html += '</div>';
  });
  if(!html) html = '<div style="padding:24px;text-align:center;color:var(--muted);font-size:.8rem;">Aucun exercice trouvé</div>';
  scroll.innerHTML = html;
}

/* ================================================================
   SESSION / BLOCS
   ================================================================ */
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function genId(){ return '_'+Math.random().toString(36).slice(2,9); }

function addBloc(){
  var id = genId();
  blocs.push({id:id, title:'BLOC', exos:[]});
  activeBloc = id;
  renderSession();
}

function deleteBloc(id){
  blocs = blocs.filter(function(b){ return b.id!==id; });
  if(activeBloc===id) activeBloc = blocs.length ? blocs[blocs.length-1].id : null;
  renderSession();
  renderLib(document.getElementById('searchInput').value.toLowerCase());
}

function addExoFromLib(libId){
  var ex = LIBRARY.find(function(e){ return e.id===libId; });
  if(!ex) return;
  // If no bloc, create one
  if(!blocs.length) addBloc();
  // Use activeBloc or last bloc
  var targetId = activeBloc || blocs[blocs.length-1].id;
  var bloc = blocs.find(function(b){ return b.id===targetId; });
  if(!bloc) return;
  var row = {id:genId(), libId:ex.id, name:ex.name, url:ex.url, reps:'', duree:'', series:'', cibleType:'RPE', cibleVal:'', obj:ex.obj, tempo:'', recup:''};
  bloc.exos.push(row);
  renderSession();
  renderLib(document.getElementById('searchInput').value.toLowerCase());
  // Scroll to bloc
  var el = document.getElementById('bloc-'+targetId);
  if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function removeExo(blocId, exoId){
  var bloc = blocs.find(function(b){ return b.id===blocId; });
  if(!bloc) return;
  bloc.exos = bloc.exos.filter(function(e){ return e.id!==exoId; });
  renderSession();
  renderLib(document.getElementById('searchInput').value.toLowerCase());
}

function updateField(blocId, exoId, field, val){
  var bloc = blocs.find(function(b){ return b.id===blocId; });
  if(!bloc) return;
  var exo = bloc.exos.find(function(e){ return e.id===exoId; });
  if(exo) exo[field] = val;
}

function updateBlocTitle(id, val){
  var bloc = blocs.find(function(b){ return b.id===id; });
  if(bloc) bloc.title = val;
}

function setActiveBloc(id){
  activeBloc = id;
  // Highlight active bloc header
  document.querySelectorAll('.bloc-header').forEach(function(h){
    h.style.opacity = h.dataset.blocid===id ? '1' : '.72';
  });
}

function clearSession(){
  if(blocs.length===0) return;
  if(!confirm('Effacer toute la séance ?')) return;
  blocs = [];
  activeBloc = null;
  document.getElementById('patientName').value = '';
  renderSession();
  renderLib(document.getElementById('searchInput').value.toLowerCase());
}

/* ================================================================
   RENDER SESSION
   ================================================================ */
function renderSession(){
  var area = document.getElementById('sessionArea');
  if(!blocs.length){
    area.innerHTML = '<div class="empty-state" id="emptyState"><div class="icon">📋</div><p>Ajoutez un bloc puis sélectionnez des exercices<br>depuis la bibliothèque pour construire votre séance.</p></div>';
    return;
  }
  var html = '';
  blocs.forEach(function(b){
    var isActive = b.id===activeBloc;
    html += '<div class="bloc" id="bloc-'+b.id+'">';
    html += '<div class="bloc-header" data-blocid="'+b.id+'" style="opacity:'+(isActive?'1':'.8')+'" onclick="setActiveBloc(\''+b.id+'\')">';
    html += '<input class="bloc-title-input" value="'+escH(b.title)+'" placeholder="Nom du bloc" oninput="updateBlocTitle(\''+b.id+'\',this.value)">';
    html += '<button class="bloc-del-btn" onclick="event.stopPropagation();deleteBloc(\''+b.id+'\')" title="Supprimer le bloc"></button>';
    html += '</div>';
    html += '<div class="bloc-body">';
    if(b.exos.length){
      html += '<div class="exo-col-header">';
      html += '<span class="col-lbl"></span>';
      html += '<span class="col-lbl">Exercice</span>';
      html += '<span class="col-lbl">Reps</span>';
      html += '<span class="col-lbl">Durée</span>';
      html += '<span class="col-lbl">Séries</span>';
      html += '<span class="col-lbl">Récup</span>';
      html += '<span class="col-lbl">Tempo</span>';
      html += '<span class="col-lbl">Cible</span>';
      html += '<span></span>';
      html += '</div>';
      b.exos.forEach(function(e){
        var ct = e.cibleType||'RPE';
        html += '<div class="exo-row">';
        html += '<div class="drag-handle">⋮⋮</div>';
        html += '<div class="exo-name-cell">';
        html += '<div class="exo-name">'+escH(e.name)+'</div>';
        html += '<div class="exo-sub">';
        if(e.url) html += '<a class="vid-link" href="'+escH(e.url)+'" target="_blank">▶ Vidéo</a>';
        if(e.obj) html += '<span class="lib-tag" style="background:#F3F0FF;color:#5B4FBF;">'+escH(e.obj)+'</span>';
        html += '</div></div>';
        html += '<input class="cell-input" type="text" value="'+escH(e.reps)+'" placeholder="—" title="Répétitions" oninput="updateField(\''+b.id+'\',\''+e.id+'\',\'reps\',this.value)">';
        html += '<input class="cell-input" type="text" value="'+escH(e.duree)+'" placeholder="—" title="Durée" oninput="updateField(\''+b.id+'\',\''+e.id+'\',\'duree\',this.value)">';
        html += '<input class="cell-input" type="text" value="'+escH(e.series)+'" placeholder="—" title="Séries" oninput="updateField(\''+b.id+'\',\''+e.id+'\',\'series\',this.value)">';
        html += '<input class="cell-input" type="text" value="'+escH(e.recup)+'" placeholder="—" title="Récupération" oninput="updateField(\''+b.id+'\',\''+e.id+'\',\'recup\',this.value)">';
        html += '<input class="cell-input" type="text" value="'+escH(e.tempo)+'" placeholder="—" title="Tempo" oninput="updateField(\''+b.id+'\',\''+e.id+'\',\'tempo\',this.value)">';
        html += '<div class="cible-cell">';
        html += '<select class="cible-select" onchange="updateField(\''+b.id+'\',\''+e.id+'\',\'cibleType\',this.value)">';
        ['RPE','RIR','Charges'].forEach(function(opt){
          html += '<option value="'+opt+'"'+(ct===opt?' selected':'')+'>'+opt+'</option>';
        });
        html += '</select>';
        html += '<input class="cible-val" type="text" value="'+escH(e.cibleVal||'')+'" placeholder="—" title="Valeur cible" oninput="updateField(\''+b.id+'\',\''+e.id+'\',\'cibleVal\',this.value)">';
        html += '</div>';
        html += '<button class="exo-del-btn" onclick="removeExo(\''+b.id+'\',\''+e.id+'\')" title="Retirer"></button>';
        html += '</div>';
      });
    } else {
      html += '<div style="padding:14px;text-align:center;color:var(--muted);font-size:.78rem;">Cliquez sur un exercice dans la bibliothèque pour l\'ajouter ici</div>';
    }
    html += '</div></div>'; // .bloc-body .bloc
  });
  // Notes
  html += '<div class="notes-bloc"><div class="notes-label">Notes / Consignes</div>';
  html += '<textarea class="notes-ta" id="sessionNotes" placeholder="Conseils, progressions, points d\'attention…">'+escH(getNotes())+'</textarea></div>';
  html += '<button class="add-bloc-btn" onclick="addBloc()">+ Ajouter un bloc</button>';
  area.innerHTML = html;
}

var _notes = '';
function getNotes(){ return _notes; }
// Persist notes when re-rendering
document.addEventListener('input', function(e){
  if(e.target && e.target.id==='sessionNotes') _notes = e.target.value;
});

/* ================================================================
   EXPORT
   ================================================================ */
function exportSession(){
  if(!blocs.length){ alert('Aucun exercice à exporter.'); return; }
  document.getElementById('exportModal').classList.remove('hidden');
}

function buildExportHTML(){
  var patient = document.getElementById('patientName').value || 'Patient';
  var date = new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  var notes = _notes;

  var blocksHtml = '';
  blocs.forEach(function(b){
    if(!b.exos.length) return;
    blocksHtml += '<div class="bloc">';
    blocksHtml += '<div class="bloc-header">'+escH(b.title)+'</div>';
    blocksHtml += '<table>';
    blocksHtml += '<thead><tr><th>Exercice</th><th>Vidéo</th><th>Reps</th><th>Durée</th><th>Séries</th><th>Récup</th><th>Tempo</th><th>Cible</th></tr></thead>';
    blocksHtml += '<tbody>';
    b.exos.forEach(function(e){
      var cible = e.cibleVal ? (e.cibleType+' '+e.cibleVal) : '—';
      blocksHtml += '<tr>';
      blocksHtml += '<td class="exo-name-col">'+escH(e.name)+(e.obj?'<br><span class="tag">'+escH(e.obj)+'</span>':'')+'</td>';
      blocksHtml += '<td>'+(e.url?'<a href="'+escH(e.url)+'" target="_blank">▶ Vidéo</a>':'—')+'</td>';
      blocksHtml += '<td>'+(e.reps||'—')+'</td>';
      blocksHtml += '<td>'+(e.duree||'—')+'</td>';
      blocksHtml += '<td>'+(e.series||'—')+'</td>';
      blocksHtml += '<td>'+(e.recup||'—')+'</td>';
      blocksHtml += '<td>'+(e.tempo||'—')+'</td>';
      blocksHtml += '<td class="cible-col">'+escH(cible)+'</td>';
      blocksHtml += '</tr>';
    });
    blocksHtml += '</tbody></table></div>';
  });

  return '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Prescription – '+escH(patient)+'</title><style>'
    +'*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:-apple-system,Helvetica Neue,Arial,sans-serif;background:#F0F4F8;color:#1a2433;padding:24px}'
    +'.header{background:#1A3A5C;color:#fff;padding:18px 24px;border-radius:10px;margin-bottom:20px}'
    +'.header h1{font-size:1.1rem;font-weight:700;margin-bottom:2px}'
    +'.header .meta{font-size:.8rem;opacity:.7}'
    +'.logo{font-size:.85rem;font-style:italic;margin-bottom:8px}'
    +'.logo .r{color:#4A90D9}.logo .n{font-weight:900;font-style:normal}.logo .p{color:#E74C3C}'
    +'.bloc{background:#fff;border-radius:10px;border:1px solid #dde3ec;margin-bottom:16px;overflow:hidden}'
    +'.bloc-header{background:#1A3A5C;color:#fff;padding:10px 16px;font-size:.88rem;font-weight:700;letter-spacing:.04em}'
    +'table{width:100%;border-collapse:collapse}'
    +'thead tr{background:#F5F8FF}'
    +'th{padding:7px 10px;font-size:.68rem;font-weight:700;color:#6b7a8d;text-transform:uppercase;letter-spacing:.06em;text-align:left;border-bottom:1px solid #dde3ec}'
    +'td{padding:9px 10px;font-size:.8rem;border-bottom:1px solid #f0f4f8;vertical-align:middle}'
    +'tr:last-child td{border-bottom:none}'
    +'.exo-name-col{font-weight:600;min-width:160px}'
    +'.tag{display:inline-block;padding:1px 6px;border-radius:8px;background:#F3F0FF;color:#5B4FBF;font-size:.65rem;font-weight:600;margin-top:3px}'
    +'a{color:#2B5FA6;text-decoration:none;font-weight:500}'
    +'a:hover{text-decoration:underline}'
    +'.cible-col{font-weight:600;color:#1A3A5C}'
    +'.notes{background:#fff;border-radius:10px;border:1px solid #dde3ec;padding:16px;margin-top:4px}'
    +'.notes-label{font-size:.7rem;font-weight:700;color:#6b7a8d;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}'
    +'.notes-body{font-size:.82rem;line-height:1.6;white-space:pre-wrap}'
    +'@media print{body{background:#fff;padding:10px}.header{border-radius:0}}'
    +'</style></head><body>'
    +'<div class="header">'
    +'<div class="logo"><span class="r">Rehab</span><span class="n">4</span><span class="p">Perf</span></div>'
    +'<h1>Prescription d\'exercices – '+escH(patient)+'</h1>'
    +'<div class="meta">'+date+' · Antoine PERONNAUD · Athletik Lamarck</div>'
    +'</div>'
    +blocksHtml
    +(notes?'<div class="notes"><div class="notes-label">Notes / Consignes</div><div class="notes-body">'+escH(notes)+'</div></div>':'')
    +'</body></html>';
}

function downloadExport(){
  var html = buildExportHTML();
  var patient = (document.getElementById('patientName').value||'prescription').replace(/\s+/g,'_');
  var date = new Date().toISOString().slice(0,10);
  var blob = new Blob([html],{type:'text/html;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prescription_'+patient+'_'+date+'.html';
  a.click();
  document.getElementById('exportModal').classList.add('hidden');
}

function copyExportLink(){
  var html = buildExportHTML();
  navigator.clipboard.writeText(html).then(function(){
    alert('HTML copié dans le presse-papiers. Vous pouvez le coller dans un email ou un éditeur.');
  }).catch(function(){
    alert('Impossible de copier automatiquement. Utilisez "Télécharger" à la place.');
  });
  document.getElementById('exportModal').classList.add('hidden');
}

renderLib('');
