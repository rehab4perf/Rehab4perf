// ── Calcul durée estimée (miroir de programme.html) ──────────────
function _parseNum(str){
  if(!str) return null;
  str = String(str).trim();
  if(str==='Max'||str==='max') return 20;
  if(str.indexOf('+')!==-1){ var p=str.split('+').map(parseFloat).filter(function(n){return !isNaN(n);}); if(p.length) return p.reduce(function(a,b){return a+b;},0); }
  if(str.match(/^\d[\d-]*\d$/)&&str.indexOf('-')!==-1){ var p2=str.split('-').map(parseFloat).filter(function(n){return !isNaN(n);}); if(p2.length>1) return p2.reduce(function(a,b){return a+b;},0)/p2.length; }
  var n=parseFloat(str); return isNaN(n)?null:n;
}
function _parseMin(str){
  if(!str) return null;
  str=String(str).trim().toLowerCase().replace(/\s/g,'');
  var m;
  if(m=str.match(/^(\d+)min(\d+)s?$/)) return parseInt(m[1])+parseInt(m[2])/60;
  if(m=str.match(/^(\d+)min$/)) return parseInt(m[1]);
  if(m=str.match(/^(\d+)s$/)) return parseInt(m[1])/60;
  if(m=str.match(/^([\d.]+)-([\d.]+)min$/)) return (parseFloat(m[1])+parseFloat(m[2]))/2;
  var n=parseFloat(str); return isNaN(n)?null:n;
}
function _estimateExoMin(e){
  var series=_parseNum(e.series); if(!series||series<=0) return null;
  var recup=_parseMin(e.recup); if(recup===null) recup=0;
  var work=0;
  if(e.duree){ var d=_parseMin(e.duree); work=(d!==null)?d:0.5; }
  else if(e.reps){ var r=_parseNum(e.reps); work=r?(r*4)/60:0.5; }
  else work=0.5;
  return series*work+Math.max(0,series-1)*recup;
}
function _calcSessionDuree(blocs){
  var total=0;
  blocs.forEach(function(b){
    if(b.type === 'cardio'){
      total += (b.duree_totale || 0);
    } else {
      (b.exos||[]).forEach(function(e){
        var m=_estimateExoMin(e);
        if(m&&m>0) total+=m;
      });
    }
  });
  return Math.max(5, Math.round(total));
}

var _currentDureeMin = 0;
var _currentRpe = 0;

function _initExoEffortsFromFeedback(existingExoData) {

  var v = inp ? parseInt(inp.value) : _currentDureeMin;

  _currentRpe = val;
  document.querySelectorAll('.rpe-btn').forEach(function(btn){
    btn.classList.toggle('active', parseInt(btn.dataset.val)===val);
  });
  var borg = BORG_CR10[val];

  var uaEl   = document.getElementById('rpeUaDisplay');
  if(descEl){ descEl.textContent=borg?borg.label:''; descEl.style.color=borg?borg.color:''; }

function _submitRpe(){
  if(!_currentRpe){ alert('Sélectionne ton niveau d\'effort (1–10).'); return; }
  if(!_currentSeanceId) return;
  var dur = _rpeGetDuree();
  var btn = document.getElementById('rpeSubmitBtn');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Envoi…'; }

  // Collecter le feedback par exercice depuis _currentBlocs
  var exoRows = [];
  (_currentBlocs||[]).forEach(function(b, bi){
    if(b.type === 'cardio'){
      var cKey = 'cardio-'+bi;
      var cPain = (_painRatings[cKey] !== undefined) ? _painRatings[cKey] : null;
      var sport = b.sport || 'Cardio';
      if(cPain !== null) exoRows.push({ key: cKey, name: sport, pain: cPain });
      return;
    }
    (b.exos||[]).forEach(function(e, ei){
      if(!e.name) return;
      var eKey = _exoKey(bi, ei);
      var pain = (_painRatings[eKey] !== undefined) ? _painRatings[eKey] : null;
      var noteInp = document.getElementById('exoNote-'+eKey);
      var note = noteInp ? noteInp.value.trim() : '';
      if(pain !== null || note) {
        var row = { key: eKey, name: e.name };
        if(pain !== null) row.pain = pain;
        if(note) row.note = note;
        exoRows.push(row);
      }
    });
  });
  var globalNote = ((document.getElementById('exoGlobalNoteTA')||{}).value||'').trim();
  var exoData = (exoRows.length || globalNote) ? { exos: exoRows, note: globalNote } : null;

  var body = { seance_id:_currentSeanceId, rpe:_currentRpe, duree_min:dur, submitted_at:new Date().toISOString() };
  if(exoData) body.exo_data = exoData;

  fetch(SUPA_URL+'/rest/v1/athlete_feedback', {
    method:'POST',
    headers:{'apikey':SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify(body)
  }).then(function(r){
    if(!r.ok){ return r.json().then(function(d){ alert('Erreur : '+JSON.stringify(d)); if(btn){btn.disabled=false;btn.textContent='Envoyer mon ressenti';} }); }
    var ua = _currentRpe*dur;
    var card = document.getElementById('rpeCard');
    if(card) card.innerHTML=
      '<div class="rpe-success-msg">'
      +'<div style="font-size:1.4rem;">✅</div>'
      +'<div style="font-weight:700;color:var(--navy);margin:6px 0;">Ressenti enregistré !</div>'
      +'<div class="rpe-success-ua" style="color:'+_uaColor(ua)+';">⚡ '+ua+' UA</div>'
      +'<div class="rpe-success-detail">RPE '+_currentRpe+' × '+dur+' min</div>'
      +'</div>';
  }).catch(function(){ alert('Erreur réseau. Réessaie.'); if(btn){btn.disabled=false;btn.textContent='Envoyer mon ressenti';} });
}

function _fmtSeenDate(iso){
  var d = new Date(iso);
  if(isNaN(d.getTime())) return '';
  var dd = String(d.getDate()).padStart(2,'0');
  var mm = String(d.getMonth()+1).padStart(2,'0');
  return dd+'/'+mm;
}

function buildRpeCard(seanceId, blocs, existing){
  _currentSeanceId = seanceId || '';
  _currentBlocs = blocs || [];
  _currentDureeMin = _calcSessionDuree(blocs);
  _currentRpe = (existing&&existing.rpe) ? existing.rpe : 0;

  var html = '<div class="rpe-card" id="rpeCard">';
  html += '<div class="rpe-card-title">🏃 Mon ressenti de séance</div>';
  html += '<div class="rpe-duree"><label for="rpeDureeInp">Durée réelle :</label><input type="number" id="rpeDureeInp" min="1" max="360" value="'+_currentDureeMin+'" oninput="_rpeUpdateUa()"><span>min</span></div>';
  html += '<div class="rpe-scale-label">Niveau d\'effort perçu — Borg 1–10</div>';
  html += '<div class="rpe-buttons">';
  for(var i=1;i<=10;i++){
    var active = (_currentRpe===i)?' active':'';
    html += '<button class="rpe-btn'+active+'" data-val="'+i+'" onclick="_setRpe('+i+')">'+i+'</button>';
  }
  html += '</div>';
  var initBorg = _currentRpe>0 ? BORG_CR10[_currentRpe] : null;
  html += '<div class="rpe-desc" id="rpeDesc" style="color:'+(initBorg?initBorg.color:'var(--muted)')+'">'
       +  (initBorg?escH(initBorg.label):'Sélectionne ton niveau d\'effort')+'</div>';
  if(_currentRpe>0){
    var initUa = _currentRpe*_currentDureeMin;
    html += '<div class="rpe-ua-display" id="rpeUaDisplay" style="color:'+_uaColor(initUa)+'">⚡ Charge : '+_currentRpe+' × '+_currentDureeMin+' min = <strong>'+initUa+' UA</strong></div>';
  } else {
    html += '<div class="rpe-ua-display" id="rpeUaDisplay"></div>';
  }
  if(existing&&existing.rpe) html += '<div class="rpe-already">✓ Déjà envoyé — tu peux modifier ton ressenti</div>';
  if(existing&&existing.seen_at) html += '<div class="rpe-seen">👁️ Lu par ton kiné le '+_fmtSeenDate(existing.seen_at)+'</div>';
  var initGlobalNote = (existing&&existing.exo_data&&existing.exo_data.note) ? existing.exo_data.note : '';
  html += '<textarea class="exo-global-note-ta" id="exoGlobalNoteTA" placeholder="Remarques générales (douleurs, difficultés, sensations…)" oninput="this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\'">'+escH(initGlobalNote)+'</textarea>';
  html += '<button class="rpe-submit-btn" id="rpeSubmitBtn" onclick="_submitRpe()">Envoyer mon ressenti</button>';
  html += '</div>';
  return html;
}

// Lancement
init();

// ── YouTube helpers ──────────────────────────────────────────────────────────
function _ytId(url){
  if(!url) return null;
  var m = url.match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function _ytThumbHtml(url){
  var id = _ytId(url); if(!id) return null;
  return '<span class="yt-thumb-wrap" onclick="openYtModal(\''+id+'\')" title="Voir la vidéo">'
       + '<img src="https://img.youtube.com/vi/'+id+'/hqdefault.jpg" alt="vidéo" loading="lazy">'
       + '<span class="yt-play"></span>'
       + '</span>';
}
function openYtModal(videoId){
  document.getElementById('ytModalIframe').src = 'https://www.youtube.com/embed/'+videoId+'?autoplay=1&rel=0';
  document.getElementById('ytModalOverlay').classList.add('open');
}
function closeYtModal(e){
  if(e && e.target !== document.getElementById('ytModalOverlay')) return;
  document.getElementById('ytModalIframe').src = '';
  document.getElementById('ytModalOverlay').classList.remove('open');
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeYtModal(); });
// ─────────────────────────────────────────────────────────────────────────────

/* ══════════════════════════════════════════════════════
   CAP — Retour à la course à pied
══════════════════════════════════════════════════════ */
var _capCurrentSeanceId = null;
var _capCurrentPain = null;

var _capPathoNames = {
  aucune:'',bit:'BIT',achille:'Achille',
  rotule:'Rotule / SFP',pubalgie:'Pubalgie',
  fasciite:'Fasciopathie plantaire',periostite:'Périostite tibiale'
};
var _capPhaseNames = {1:'Phase 1 — Réintroduction',2:'Phase 2 — Consolidation',3:'Phase 3 — Retour continu'};
var _capPhaseColors = {1:'#2563EB',2:'#059669',3:'#7C3AED'};
var _capPainDescs = ['Aucune douleur','Très légère','Légère','Légère à modérée','Modérée','Modérée à forte','Forte','Très forte','Intense','Extrêmement intense','Insupportable'];
var _capPainColors = ['#27AE60','#5ABD6A','#82CC44','#A8C940','#F4D03F','#F39C12','#E67E22','#D35400','#E74C3C','#C0392B','#922B21'];

function _buildCapProgHTML(prog) {
  var d = prog.donnees || {};
  var sess = d.session || {};
  var profile = d.profile || {};
  var patho = profile.patho || 'aucune';
  var pathoLbl = _capPathoNames[patho] || '';
  var phaseColor = _capPhaseColors[sess.phase] || '#2563EB';
  var phaseLbl = _capPhaseNames[sess.phase] || '';
  var idx = (d.session_index !== undefined ? d.session_index + 1 : '?');
  var total = d.total || '?';

  var html = '<div style="padding:6px 0 14px;">';
  html += '<div style="font-size:1.15rem;font-weight:800;color:#1A3A5C;margin-bottom:4px;">🏃 ' + escH(sess.label || prog.nom) + '</div>';

  var meta = [];
  if (pathoLbl) meta.push(pathoLbl);
  meta.push('Séance ' + idx + '/' + total);
  html += '<div style="font-size:.78rem;color:#6b7a8d;margin-bottom:10px;">' + escH(meta.join(' · ')) + '</div>';

  if (phaseLbl) {
    html += '<div style="font-size:.72rem;font-weight:700;color:'+phaseColor+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;">' + escH(phaseLbl) + '</div>';
  }

  // Consignes : préférer celles stockées dans donnees, sinon fallback dictionnaire
  var consignesByPatho = {
    aucune:     ['Ne pas augmenter vitesse et durée simultanément'],
    bit:        ['Cadence cible ≥ 175 pas/min — réduit l\'adduction de hanche et la contrainte latérale','Éviter les descentes et le dévers jusqu\'à la semaine 5'],
    achille:    ['Éviter les côtes et surfaces dures les 4 premières semaines — privilégier chemins souples','Raideur matinale acceptable si elle disparaît en < 20 min ; la surveiller séance après séance'],
    rotule:     ['Éviter les descentes et les surfaces en dévers jusqu\'à la semaine 5','Cadence ≥ 170 pas/min pour réduire les forces de compression patellaires','Réduire la vitesse si douleur en montée ou en descente de marches'],
    pubalgie:   ['Augmenter le volume avant l\'intensité — pas de sprint ni de changement de direction avant la semaine 5','Éviter les côtes montantes les 4 premières semaines'],
    fasciite:   ['Les premières minutes de course peuvent être légèrement douloureuses (< 2/10) — normal si ça s\'atténue à l\'échauffement','Privilégier surfaces souples, éviter pieds nus et chaussures minimalistes'],
    periostite: ['Surfaces souples exclusivement les 3 premières semaines (herbe, piste, chemin)','Chaussures absorbantes avec bon maintien — remplacer si > 700 km','Ne jamais augmenter volume et vitesse simultanément'],
    postop_genou:['Observer la symétrie de foulée à chaque séance — arrêt si boiterie ou compensation visible','Surveiller le gonflement post-séance — toute augmentation par rapport à J-1 → repos 48h avant la séance suivante','Respecter strictement la progression planifiée — ne jamais sauter d\'étape']
  };
  var consignes = d.consignes || consignesByPatho[patho];
  if (consignes && consignes.length) {
    html += '<div style="background:#EBF3FF;border-radius:8px;padding:10px 12px;font-size:.77rem;color:#1a3558;">';
    html += '<div style="font-size:.66rem;font-weight:700;color:#2B5FA6;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Consignes</div>';
    consignes.forEach(function(c){ html += '<div style="padding:2px 0;">• ' + escH(c) + '</div>'; });
    html += '</div>';
  }
  // Détail du bloc cardio
  var bloc = d.blocs && d.blocs[0];
  if(bloc && bloc.type === 'cardio'){
    html += '<div style="background:#EBF8FF;border-radius:10px;padding:12px 14px;margin-top:4px;">';
    html += '<div style="font-size:.66rem;font-weight:700;color:#0369A1;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Séance du jour</div>';
    if(bloc.effort_type === 'fractionne' && bloc.repetitions){
      html += '<div style="font-size:1.05rem;font-weight:800;color:#1A3A5C;margin-bottom:4px;">'
           +  escH(bloc.repetitions)+'×('+escH(bloc.duree_effort||'')+' C / '+escH(bloc.duree_recup||'')+' M)</div>';
    } else if(bloc.effort_type === 'continu' && bloc.duree_totale){
      html += '<div style="font-size:1.05rem;font-weight:800;color:#1A3A5C;margin-bottom:4px;">'
           +  escH(String(bloc.duree_totale))+' min continu</div>';
    } else if(bloc.effort_type === 'continu' && bloc.distance){
      html += '<div style="font-size:1.05rem;font-weight:800;color:#1A3A5C;margin-bottom:4px;">'
           +  escH(String(bloc.distance))+' km continu</div>';
    }
    var cMeta = [];
    if(bloc.duree_totale) cMeta.push('~'+bloc.duree_totale+' min');
    if(bloc.distance && bloc.duree_totale) cMeta.push(bloc.distance+' km');
    if(bloc.zone) cMeta.push('Zone '+bloc.zone);
    if(cMeta.length) html += '<div style="font-size:.75rem;color:#0369A1;font-weight:600;">'+escH(cMeta.join(' · '))+'</div>';
    if(bloc.notes) html += '<div style="font-size:.75rem;color:#475569;margin-top:5px;font-style:italic;">💬 '+escH(bloc.notes)+'</div>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function _buildHsrProgHTML(prog) {
  var d    = prog.donnees || {};
  var ref  = d.ref1RM || 0;
  var charge = ref ? Math.round(ref * (d.pct || 65) / 100 * 2) / 2 : null;
  var sets   = d.sets  || '?';
  var reps   = d.reps  || '?';
  var phase  = d.phase_label || d.phase_key || '';
  var exo    = d.exercice || '';
  var idx    = d.session_index !== undefined ? d.session_index + 1 : '?';
  var total  = d.total || '?';
  var consignes = d.consignes && d.consignes.length ? d.consignes : [
    'Tempo 3/0/3/0 : 3 s excentrique — 0 s pause — 3 s concentrique — 0 s pause',
    'Repos entre les séries : 2 à 3 minutes',
    'Douleur tolérable ≤ 3/10 pendant l\'exercice — arrêter si ≥ 5/10',
    'Progresser uniquement si douleur ≤ 3/10 lors de la dernière série',
    'Échauffement : 5 min vélo léger + 1 série légère à 15 répétitions',
    'Minimum 48 h de récupération entre deux séances'
  ];

  var html = '<div style="padding:6px 0 14px;">';
  html += '<div style="font-size:1.1rem;font-weight:800;color:#14532d;margin-bottom:4px;">🏋 HSR — ' + escH(exo || prog.nom) + '</div>';
  html += '<div style="font-size:.78rem;color:#6b7a8d;margin-bottom:10px;">' + escH(phase) + ' · Séance ' + idx + '/' + total + '</div>';

  if (charge !== null) {
    html += '<div style="background:#f0fdf4;border-radius:8px;padding:10px 12px;margin-bottom:10px;">'
      + '<div style="font-size:.66rem;font-weight:700;color:#16a34a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Prescription</div>'
      + '<div style="font-size:1.1rem;font-weight:800;color:#14532d;">' + sets + '×' + reps + ' répétitions</div>'
      + '<div style="font-size:.82rem;color:#15803d;font-weight:600;margin-top:2px;">' + charge + ' kg (' + (d.pct || '?') + '% 1RM)</div>'
      + '</div>';
  }

  if (consignes.length) {
    html += '<div style="background:#f0fdf4;border-radius:8px;padding:10px 12px;font-size:.77rem;color:#14532d;">';
    html += '<div style="font-size:.66rem;font-weight:700;color:#16a34a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Consignes</div>';
    consignes.forEach(function(c){ html += '<div style="padding:2px 0;">• ' + escH(c) + '</div>'; });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

var _capCurrentRpe = 0;

function _buildCapPainCard(seanceId, existing) {
  _capCurrentSeanceId = seanceId;
  // Nouvelles colonnes douleur/effort — fallback legacy (rpe=douleur, duree_min=effort<=10)
  _capCurrentPain = (existing && existing.douleur !== null && existing.douleur !== undefined) ? existing.douleur
    : (existing && existing.rpe !== null && existing.rpe !== undefined && existing.duree_min <= 10) ? existing.rpe : null;
  _capCurrentRpe  = (existing && existing.effort) ? existing.effort
    : (existing && existing.duree_min && existing.duree_min <= 10) ? existing.duree_min : 0;

  var alreadyDone = _capCurrentPain !== null;
  var html = '<div class="rpe-card" id="rpeCard">';

  // ── Douleur EVA ──
  html += '<div class="rpe-card-title">🩹 Douleur (EVA)</div>';
  html += '<div class="rpe-scale-label" style="margin-bottom:8px;">0 = aucune · 10 = insupportable</div>';
  if(alreadyDone) html += '<div class="rpe-already">Déjà renseigné : '+_capCurrentPain+'/10 — '+((_capPainDescs[_capCurrentPain])||'')+'</div>';
  if(alreadyDone && existing && existing.seen_at) html += '<div class="rpe-seen">👁️ Lu par ton kiné le '+_fmtSeenDate(existing.seen_at)+'</div>';
  html += '<div class="rpe-buttons" id="capPainBtns">';
  for(var i=0; i<=10; i++){
    var act = (alreadyDone && _capCurrentPain===i) ? ' active' : '';
    html += '<button class="rpe-btn'+act+'" data-val="'+i+'" style="'+(act?'background:#E74C3C;border-color:#E74C3C;color:#fff;':'')+'" onclick="_capSetPain('+i+')">'+i+'</button>';
  }
  html += '</div>';
  html += '<div class="rpe-desc" id="capPainDesc" style="color:'+(_capCurrentPain!==null?(_capPainColors[_capCurrentPain]||''):'var(--muted)')+'">'+(_capCurrentPain!==null?escH(_capPainDescs[_capCurrentPain]||''):'')+'</div>';

  // ── Effort Borg ──
  html += '<div style="border-top:1px solid #e5e7eb;margin:14px 0 10px;"></div>';
  html += '<div class="rpe-card-title">💪 Effort ressenti (Borg)</div>';
  html += '<div class="rpe-scale-label" style="margin-bottom:8px;">1 = très facile · 10 = maximum</div>';
  html += '<div class="rpe-buttons" id="capRpeBtns">';
  for(var j=1; j<=10; j++){
    var actR = (_capCurrentRpe===j) ? ' active' : '';
    html += '<button class="rpe-btn'+actR+'" data-val="'+j+'" onclick="_capSetRpe('+j+')">'+j+'</button>';
  }
  html += '</div>';
  var initBorg = _capCurrentRpe>0 ? BORG_CR10[_capCurrentRpe] : null;
  html += '<div class="rpe-desc" id="capRpeDesc" style="color:'+(initBorg?initBorg.color:'var(--muted)')+'">'+escH(initBorg?initBorg.label:'')+'</div>';

  html += '<button class="rpe-submit-btn" id="capPainSubmit" onclick="_submitCapFeedback()"'+(alreadyDone?' disabled':'')+'>'+( alreadyDone?'Déjà envoyé':'Envoyer mon bilan')+'</button>';
  html += '</div>';
  return html;
}

function _capSetPain(val) {
  _capCurrentPain = val;
  document.querySelectorAll('#capPainBtns .rpe-btn').forEach(function(b){
    var on = parseInt(b.dataset.val)===val;
    b.classList.toggle('active', on);
    b.style.background = on ? '#E74C3C' : '';
    b.style.borderColor = on ? '#E74C3C' : '';
    b.style.color = on ? '#fff' : '';
  });
  var desc = document.getElementById('capPainDesc');
  if(desc){ desc.textContent = _capPainDescs[val]||''; desc.style.color = _capPainColors[val]||'#6b7a8d'; }
}

function _capSetRpe(val) {
  _capCurrentRpe = val;
  document.querySelectorAll('#capRpeBtns .rpe-btn').forEach(function(b){
    var on = parseInt(b.dataset.val)===val;
    b.classList.toggle('active', on);
    b.style.background = on ? '#2B5FA6' : '';
    b.style.borderColor = on ? '#2B5FA6' : '';
    b.style.color = on ? '#fff' : '';
  });
  var borg = BORG_CR10[val];
  var desc = document.getElementById('capRpeDesc');
  if(desc){ desc.textContent = borg?borg.label:''; desc.style.color = borg?borg.color:''; }
}

function _submitCapFeedback() {
  if(_capCurrentPain===null||_capCurrentPain===undefined){ alert('Sélectionne ton score de douleur (0–10).'); return; }
  if(!_capCurrentRpe){ alert('Sélectionne ton niveau d\'effort (1–10).'); return; }
  if(!_capCurrentSeanceId) return;
  var btn = document.getElementById('capPainSubmit');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Envoi…'; }

  fetch(SUPA_URL+'/rest/v1/athlete_feedback', {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    // douleur/effort dans leurs colonnes dediees — rpe/duree_min mis a NULL
    // (reserves aux seances standard : rpe = Borg, duree_min = duree reelle)
    body: JSON.stringify({ seance_id: _capCurrentSeanceId, douleur: _capCurrentPain, effort: _capCurrentRpe, rpe: null, duree_min: null, submitted_at: new Date().toISOString() })
  })
  .then(function(r){
    if(!r.ok){ return r.json().then(function(d){ alert('Erreur : '+JSON.stringify(d)); if(btn){btn.disabled=false;btn.textContent='Réessayer';} }); }
    var painColor = _capPainColors[_capCurrentPain]||'#2B5FA6';
    var card = document.getElementById('rpeCard');
    if(card) card.innerHTML =
      '<div class="rpe-success-msg">'
      +'<div style="font-size:1.4rem;">'+(_capCurrentPain<=2?'✅':_capCurrentPain<=4?'⚠️':'🔴')+'</div>'
      +'<div style="font-weight:700;color:var(--navy);margin:6px 0;">Bilan enregistré !</div>'
      +'<div style="font-size:.85rem;margin-bottom:4px;">🩹 Douleur : <strong style="color:'+painColor+'">'+_capCurrentPain+'/10</strong> — '+escH(_capPainDescs[_capCurrentPain]||'')+'</div>'
      +'<div style="font-size:.85rem;">💪 Effort : <strong>'+_capCurrentRpe+'/10</strong> — '+escH((BORG_CR10[_capCurrentRpe]&&BORG_CR10[_capCurrentRpe].label)||'')+'</div>'
      +'</div>';
  })
  .catch(function(){ alert('Erreur réseau. Réessaie.'); if(btn){btn.disabled=false;btn.textContent='Réessayer';} });
}
// ─────────────────────────────────────────────────────────────────────────────
</script>

<script>
/* Enregistrement du service worker (PWA installable). Recharge une fois quand un
   nouveau SW prend le contrôle, pour que les déploiements se propagent proprement. */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js', { scope: '/athlete.html' }).catch(function (e) { console.warn('SW:', e); });
    var reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (reloaded) return; reloaded = true; window.location.reload();
    });
  });
}
</script>
