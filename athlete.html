<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Mon Programme</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest-athlete.webmanifest">
<meta name="theme-color" content="#1A3A5C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rehab4Perf">
<link rel="apple-touch-icon" href="icons/apple-touch-180.png">
<link rel="stylesheet" href="fonts/fonts.css">
<style>
:root {
  --navy:#1A3A5C; --accent:#2B5FA6; --accent2:#4A90D9;
  --bg:#F0F4F8; --surface:#fff; --text:#1a2433; --muted:#6b7a8d;
  --border:#dde3ec;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:var(--bg); font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; color:var(--text); min-height:100%; }

/* ── HEADER ── */
.app-header {
  background:var(--navy); color:#fff; padding:14px 16px;
  position:sticky; top:0; z-index:10;
  display:flex; align-items:center; gap:10px;
}
.header-logo { display:inline-flex; align-items:center; gap:8px; }
.header-logo svg { display:block; flex-shrink:0; }
.logo-w { display:inline-flex; align-items:baseline; line-height:1; white-space:nowrap; }
.logo-r { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:20px; color:#fff; letter-spacing:-.01em; }
.logo-e { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:.44em; vertical-align:super; color:#7FA8D9; margin:0 .05em 0 .01em; line-height:0; }
.logo-p { font-family:'Poppins',sans-serif; font-weight:800; font-size:16px; color:#fff; letter-spacing:-.025em; margin-left:.02em; }
.header-sub { font-size:.68rem; color:rgba(255,255,255,.6); margin-top:1px; }
.header-patient { font-size:.95rem; font-weight:700; color:#fff; margin-top:2px; line-height:1.2; }
.header-left { flex:1; min-width:0; }
.header-btn {
  background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
  color:#fff; border-radius:8px; padding:6px 12px; font-size:.76rem; cursor:pointer;
  white-space:nowrap; transition:background .15s;
}
.header-btn:hover { background:rgba(255,255,255,.25); }
.header-btn:disabled { opacity:.5; cursor:default; }
.back-btn {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.25);
  color:#fff; border-radius:8px; padding:6px 12px; font-size:.76rem; cursor:pointer;
  display:none; align-items:center; gap:6px;
}
.back-btn.visible { display:flex; }

/* ── CONTENT ── */
.content { max-width:1100px; margin:0 auto; padding:16px 24px 40px; }

/* ── PROG META ── */
.prog-meta {
  background:var(--surface); border-radius:12px; padding:14px 16px;
  border:1px solid var(--border); margin-bottom:16px;
}
.prog-title { font-size:1.1rem; font-weight:700; color:var(--navy); margin-bottom:3px; }
.prog-date { font-size:.76rem; color:var(--muted); }

/* ── BLOC ── */
.bloc {
  background:var(--surface); border-radius:12px;
  border:1px solid var(--border); margin-bottom:14px; overflow:hidden;
}
.bloc-header {
  padding:11px 14px; background:var(--navy);
  display:flex; align-items:center; gap:10px;
}
.bloc-title { color:#fff; font-size:.92rem; font-weight:700; flex:1; }
.bloc-badge {
  font-size:.62rem; font-weight:700; padding:3px 8px; border-radius:10px;
  background:rgba(255,255,255,.2); color:rgba(255,255,255,.9); text-transform:uppercase; letter-spacing:.04em;
}
.bloc-badge.endurance { background:rgba(56,189,248,.3); }
.bloc-badge.puissance { background:rgba(251,146,60,.3); }
.bloc-badge.hypertrophie { background:rgba(167,139,250,.3); }
.bloc-badge.forcemax { background:rgba(248,113,113,.3); }

.methode-card {
  margin:8px 12px; padding:9px 12px; border-radius:7px; font-size:.76rem;
  line-height:1.5; border-left:3px solid #6b7a8d;
  background:#F5F7FA; color:#4a5568;
}
.methode-card.mc-endurance    { background:#F0FAF0; border-color:#2D7D46; color:#1a4d28; }
.methode-card.mc-puissance    { background:#F5F0FF; border-color:#7B2DBF; color:#4a1d8a; }
.methode-card.mc-hypertrophie { background:#EEF3FB; border-color:#2B5FA6; color:#1a3a6e; }
.methode-card.mc-forcemax     { background:#FEF0EE; border-color:#C0392B; color:#7a1a10; }
.methode-card-label { font-weight:700; margin-bottom:3px; font-size:.78rem; }
.methode-card-desc  { opacity:.9; }
.methode-card-protocol { margin-top:5px; font-size:.7rem; opacity:.75; }

.exo-list { padding:6px 0; }
.exo-item { padding:11px 14px; border-bottom:1px solid var(--border); }
.exo-item:last-child { border-bottom:none; }
.exo-item.chained { border-left:3px solid var(--accent2); }
.exo-name { font-size:.88rem; font-weight:600; color:var(--text); margin-bottom:5px; }
.exo-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:7px; }
.exo-tag {
  font-size:.7rem; padding:3px 8px; border-radius:10px;
  background:#EBF3FF; color:var(--accent); font-weight:500; text-decoration:none;
}
.exo-tag.video { background:#E8F5E9; color:#2E7D32; }
.exo-tag.chain { background:#F3F0FF; color:#5B4FBF; }
/* ── YouTube vignette ── */
.yt-thumb-wrap {
  display:inline-block; position:relative; cursor:pointer; border-radius:5px;
  overflow:hidden; vertical-align:middle; flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.18);
}
.yt-thumb-wrap img { display:block; width:72px; height:40px; object-fit:cover; }
.yt-thumb-wrap .yt-play {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.28); transition:background .15s;
}
.yt-thumb-wrap:hover .yt-play, .yt-thumb-wrap:active .yt-play { background:rgba(0,0,0,.48); }
.yt-thumb-wrap .yt-play::after {
  content:''; width:0; height:0;
  border-top:7px solid transparent; border-bottom:7px solid transparent;
  border-left:12px solid #fff; margin-left:2px;
}
.yt-modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:9500;
  display:none; align-items:center; justify-content:center; padding:20px;
}
.yt-modal-overlay.open { display:flex; }
.yt-modal-box {
  background:#000; border-radius:10px; overflow:hidden;
  width:100%; max-width:720px; aspect-ratio:16/9; position:relative;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}
.yt-modal-box iframe { width:100%; height:100%; border:none; display:block; }
.yt-modal-close {
  position:absolute; top:-38px; right:0; background:none; border:none;
  color:#fff; font-size:1.6rem; cursor:pointer; line-height:1; opacity:.8;
}
.yt-modal-close:hover { opacity:1; }
.exo-params {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(85px, 1fr)); gap:5px;
}
.param-box { background:var(--bg); border-radius:8px; padding:6px 8px; text-align:center; }
.param-label { font-size:.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:2px; }
.param-val { font-size:.85rem; font-weight:700; color:var(--text); }
.exo-consigne {
  margin-top:7px; font-size:.76rem; color:var(--muted);
  background:#FFFBEB; border-left:3px solid #F59E0B;
  padding:6px 10px; border-radius:0 6px 6px 0; line-height:1.5;
}
.chain-link { text-align:center; font-size:.7rem; color:var(--accent2); padding:3px 0; font-weight:600; }

/* Pain slider per exercise */
.exo-pain-slider-row { display:flex; align-items:center; gap:9px; margin-top:9px; max-width:340px; }
.exo-pain-num {
  width:26px; height:26px; border-radius:7px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:.78rem; font-weight:700; background:#f0f4f8; color:#9aa8b8;
  transition:background .15s, color .15s; cursor:pointer; user-select:none;
}
.exo-pain-body { flex:1; min-width:0; display:flex; align-items:center; gap:8px; }
.pain-slider {
  -webkit-appearance:none; appearance:none; flex:1; height:3px; border-radius:2px;
  outline:none; margin:0; display:block;
  background:linear-gradient(to right,#27AE60 0%,#82D03E 20%,#F4D03F 40%,#F39C12 55%,#E67E22 70%,#E74C3C 85%,#922B21 100%);
  opacity:.75;
}
.pain-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
  background:#fff; border:1.5px solid #94a3b8; cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.15);
}
.pain-slider::-moz-range-thumb {
  width:14px; height:14px; border-radius:50%; background:#fff; border:1.5px solid #94a3b8;
  cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.15);
}
.exo-pain-state { font-size:.64rem; font-weight:600; white-space:nowrap; flex-shrink:0; min-width:82px; text-align:right; }
.exo-note-toggle {
  width:26px; height:26px; border-radius:7px; border:1px solid var(--border);
  background:#fff; color:#9aa8b8; cursor:pointer; font-size:.75rem; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; padding:0;
  transition:border-color .12s, color .12s;
}
.exo-note-toggle.has-note { border-color:var(--accent2); color:var(--accent2); background:#eef3fb; }
.exo-note-area { display:none; margin-top:6px; }
.exo-note-area.open { display:block; }

/* Session note */
.session-note-section { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:14px 16px; margin-top:14px; }
.session-note-title { font-size:.82rem; font-weight:700; color:var(--navy); margin-bottom:8px; }
.session-note-ta {
  width:100%; border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; font-size:.85rem; font-family:inherit; color:var(--text);
  resize:none; min-height:90px; outline:none; line-height:1.5;
}
.session-note-ta:focus { border-color:var(--accent2); }
.session-note-save-btn {
  margin-top:8px; background:var(--accent); color:#fff; border:none;
  border-radius:8px; padding:8px 18px; font-size:.82rem; font-weight:600;
  cursor:pointer; width:100%;
}
.session-note-save-btn:hover { background:var(--accent2); }
.session-note-saved { font-size:.75rem; color:#27AE60; margin-top:5px; text-align:center; display:none; }

/* Patient persistent note */

.notes-bloc {
  background:var(--surface); border-radius:12px; border:1px solid var(--border);
  padding:14px; margin-bottom:14px;
}
.notes-label { font-size:.7rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:7px; }
.notes-text { font-size:.83rem; color:var(--text); line-height:1.6; white-space:pre-wrap; }

/* ── CALENDAR ── */
.cal-nav {
  display:flex; align-items:center; gap:8px; margin-bottom:14px;
  background:var(--surface); border-radius:12px; border:1px solid var(--border);
  padding:10px 14px; flex-wrap:wrap;
}
.cal-nav h2 { flex:1; text-align:center; font-size:.92rem; font-weight:700; color:var(--navy); text-transform:capitalize; min-width:120px; }
.cal-nav-btn {
  background:none; border:1px solid var(--border); border-radius:8px;
  width:32px; height:32px; cursor:pointer; font-size:.85rem; color:var(--text);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.cal-nav-btn:hover { background:var(--bg); }
.cal-today-btn {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:5px 10px; font-size:.72rem; cursor:pointer; color:var(--text); flex-shrink:0;
}
/* Vue toggle mois/semaine */
.view-toggle {
  display:flex; gap:2px; background:var(--bg); border-radius:8px; padding:3px; flex-shrink:0;
}
.view-btn {
  padding:4px 10px; border:none; border-radius:6px; font-size:.72rem;
  cursor:pointer; color:var(--muted); background:transparent;
  transition:all .15s; font-family:inherit; white-space:nowrap;
}
.view-btn.active {
  background:#fff; color:var(--accent); font-weight:700;
  box-shadow:0 1px 3px rgba(0,0,0,.1);
}
.view-btn:hover:not(.active) { color:var(--text); }

.cal-grid {
  display:grid; grid-template-columns:repeat(7,1fr); gap:3px;
}
.cal-day-header {
  text-align:center; font-size:.62rem; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:.04em; padding:5px 0;
}
.cal-day {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:8px 7px; height:92px; overflow:hidden; cursor:pointer; transition:background .12s;
}
.cal-day:hover { background:#F5F8FF; border-color:var(--accent2); }
.cal-day.other-month { background:transparent; border-color:transparent; cursor:default; }
/* Dots (mobile) */
.cal-dots { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; padding:0 2px; }
.cal-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
/* Overflow badge (desktop) */
.cal-more { font-size:.6rem; color:var(--muted); font-weight:600; margin-top:2px; cursor:pointer; }
.cal-more:hover { color:var(--accent); }
.cal-day.today { border-color:var(--accent); }
.cal-day-num {
  font-size:.78rem; font-weight:700; color:var(--muted); margin-bottom:5px; text-align:right;
}
.cal-day.today .cal-day-num { color:var(--accent); }
.cal-chip {
  font-size:.68rem; font-weight:600; padding:4px 6px; border-radius:5px;
  background:var(--accent); color:#fff; margin-bottom:3px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  cursor:pointer; transition:opacity .12s;
}
.cal-chip:hover { opacity:.85; }
.cal-msg-chip {
  font-size:.66rem; font-weight:600; padding:3px 6px; border-radius:5px;
  background:#EEF2FF; color:#4338CA; border:1px solid #C7D2FE;
  margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  cursor:pointer; transition:opacity .12s;
}
.cal-msg-chip:hover { opacity:.8; }
.cal-empty { color:var(--border); font-size:.65rem; text-align:center; margin-top:8px; }

/* ── VUE SEMAINE ── */
.week-grid {
  display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:14px;
}
.week-col {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  overflow:hidden; min-height:110px;
}
.week-col.today { border-color:var(--accent); border-width:2px; }
.week-col-header {
  padding:6px 6px 5px; border-bottom:1px solid var(--border);
  text-align:center; background:var(--bg);
}
.week-day-name {
  font-size:.58rem; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px;
}
.week-day-num { font-size:.82rem; font-weight:700; color:var(--text); }
.week-day-num.today { color:var(--accent); }
.week-col-body { padding:5px 4px; }
.week-event {
  background:var(--accent); color:#fff; border-radius:6px;
  padding:5px 6px; margin-bottom:4px; cursor:pointer; transition:opacity .12s;
}
.week-event:hover { opacity:.82; }
.week-event-name { font-size:.67rem; font-weight:600; line-height:1.35; word-break:break-word; }
.week-event-ua { font-size:.6rem; font-weight:700; margin-top:2px; }
.week-cycle {
  font-size:.56rem; font-weight:700; color:#fff; border-radius:3px;
  padding:1px 4px; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.week-empty { text-align:center; color:var(--border); font-size:.62rem; padding:12px 0; }
@media(max-width:600px){
  /* ── Layout général ── */
  .content { padding:10px 10px 30px; }

  /* ── Barre de navigation calendrier ── */
  .cal-nav { padding:8px 10px; gap:5px; }
  .cal-nav h2 { font-size:.82rem; }
  .cal-nav-btn { width:40px; height:40px; font-size:1rem; }
  .cal-today-btn { padding:6px 12px; font-size:.74rem; }
  .view-btn { padding:5px 8px; font-size:.72rem; }

  /* ── Vue Mois : cellules compactes avec dots ── */
  .cal-day { height:58px; padding:5px 4px; }
  .cal-day-header { font-size:.58rem; letter-spacing:0; }
  .cal-day-num { font-size:.7rem; margin-bottom:2px; }
  .cal-dots { margin-top:4px; gap:4px; }
  .cal-dot  { width:7px; height:7px; }

  /* ── Vue Semaine 3 jours : colonnes lisibles ── */
  .week-col { min-height:90px; border-radius:12px; }
  .week-col-header { padding:8px 6px 6px; }
  .week-day-name { font-size:.66rem; letter-spacing:.03em; }
  .week-day-num { font-size:.95rem; }
  .week-col-body { padding:6px 5px; }
  .week-event { padding:8px 8px; margin-bottom:5px; border-radius:8px; }
  .week-event-name { font-size:.78rem; line-height:1.4; }
  .week-event-ua { font-size:.68rem; margin-top:3px; }
  .week-cycle { font-size:.6rem; padding:2px 5px; }
  .week-empty { font-size:.7rem; padding:14px 0; }
}

/* ── MODAL PROGRAMME ── */
.prog-modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.5); z-index:100;
  align-items:flex-end; justify-content:center;
}
.prog-modal-overlay.open { display:flex; }
.prog-modal {
  background:var(--bg); width:100%; max-width:860px;
  border-radius:18px 18px 0 0; max-height:90vh; overflow-y:auto;
  padding-bottom:20px;
}
.prog-modal-header {
  background:var(--navy); color:#fff;
  padding:14px 16px; border-radius:18px 18px 0 0;
  display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:2;
}
.prog-modal-title { flex:1; font-size:.9rem; font-weight:700; }
.prog-modal-close {
  background:rgba(255,255,255,.15); border:none; color:#fff;
  border-radius:50%; width:28px; height:28px; font-size:1rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.prog-modal-body { padding:14px; }

/* ── STATES ── */
.loading-state, .error-state, .empty-state {
  text-align:center; padding:50px 20px; color:var(--muted);
}
.loading-state .spinner {
  width:32px; height:32px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .8s linear infinite; margin:0 auto 14px;
}
@keyframes spin { to { transform:rotate(360deg); } }
.error-icon { font-size:2.2rem; margin-bottom:10px; }
.error-title { font-size:.95rem; font-weight:700; color:var(--text); margin-bottom:5px; }
.error-msg { font-size:.8rem; }
.last-updated { text-align:center; font-size:.68rem; color:var(--muted); margin-top:8px; }
.footer { text-align:center; font-size:.68rem; color:var(--muted); padding:16px 0 6px; }
.footer a { color:var(--accent); text-decoration:none; }

/* ── RPE / UA Card ── */
.rpe-card {
  background:linear-gradient(135deg,#F5F7FA,#EEF3FB);
  border:2px solid var(--accent); border-radius:14px;
  padding:18px 16px; margin:14px 0 0;
}
.rpe-card-title { font-size:.95rem; font-weight:800; color:var(--navy); margin-bottom:5px; }
.rpe-duree { display:flex; align-items:center; gap:8px; font-size:.78rem; color:var(--muted); margin-bottom:14px; }
.rpe-duree label { white-space:nowrap; }
.rpe-duree input { width:62px; padding:4px 7px; border:1.5px solid var(--border); border-radius:7px; font-size:.85rem; font-weight:700; color:var(--navy); font-family:inherit; text-align:center; background:#fff; }
.rpe-duree input:focus { border-color:var(--accent); outline:none; }
.rpe-scale-label { font-size:.72rem; font-weight:700; color:var(--text); margin-bottom:9px; text-transform:uppercase; letter-spacing:.05em; }
.rpe-buttons { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
.rpe-btn {
  width:42px; height:42px; border-radius:9px; border:2px solid var(--border);
  background:#fff; font-size:.92rem; font-weight:700; cursor:pointer;
  transition:all .13s; color:var(--text); font-family:inherit; flex-shrink:0;
}
.rpe-btn:hover { border-color:var(--accent); background:#EEF3FB; }
.rpe-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; transform:scale(1.1); }
.rpe-desc { font-size:.84rem; font-weight:700; min-height:1.4em; margin-bottom:8px; transition:color .2s; }
.rpe-ua-display { font-size:1.05rem; font-weight:800; min-height:1.5em; margin-bottom:14px; transition:color .2s; }
.rpe-already { font-size:.72rem; color:var(--muted); margin-bottom:10px; font-style:italic; }
.rpe-seen { font-size:.72rem; color:#0F766E; margin-bottom:10px; font-weight:600; display:flex; align-items:center; gap:5px; }
.rpe-submit-btn {
  width:100%; padding:12px; background:var(--accent); color:#fff;

<script>
var SUPA_URL = 'https://sxdobjodxkwexaspepdm.supabase.co';
var SUPA_KEY = 'sb_publishable_zEJrmQOnKyRm-Y_NyojaTA_ERrDx4pl';

var OBJ_LABELS = { libre:'Libre', endurance:'Endurance', puissance:'Puissance', hypertrophie:'Hypertrophie', forcemax:'Force max' };
var CYCLE_COLORS = {'Force':'#1A3A5C','Puissance':'#C0392B','Hypertrophie':'#2D7D46','Endurance de force':'#2B5FA6','Récupération':'#D4600A','Réathlétisation':'#9B2C6B'};
function _cycleColor(nom){ return CYCLE_COLORS[nom] || '#52514E'; }
function _cyEndDate(cy){
  if(cy.endDate){ var e=new Date(cy.endDate); e.setHours(0,0,0,0); return e; }
  var e=new Date(cy.startDate); e.setHours(0,0,0,0); e.setDate(e.getDate()+cy.duree*7-1); return e;
}
function _dayCycleBg(cellDate){
  for(var i=0;i<_calCycles.length;i++){
    var cy=_calCycles[i];
    if(!cy.startDate) continue;
    var cyStart=new Date(cy.startDate); cyStart.setHours(0,0,0,0);
    var cyEnd=_cyEndDate(cy);
    if(cellDate>=cyStart && cellDate<=cyEnd){
      var hex=cy.color||_cycleColor(cy.nom);
      var r=parseInt(hex.slice(1,3),16)||82;
      var g=parseInt(hex.slice(3,5),16)||81;
      var b=parseInt(hex.slice(5,7),16)||78;
      return 'rgba('+r+','+g+','+b+',.10)';
    }
  }
  return '';
}
var MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
var DAYS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

var _isMobile = window.innerWidth <= 600;
window.addEventListener('resize', function(){
  var m = window.innerWidth <= 600;
  if(m !== _isMobile){ _isMobile = m; if(typeof _renderCalGrid==='function') _renderCalGrid(); }
});

var _mode = ''; // 'prog' ou 'cal'
var _patientId = '';
var _progId = '';
var _seanceId  = '';   // seances_planifiees.id passé via ?seance= (lien séance unique)
var _kineMode = false; // true si ?mode=kine dans l'URL
var _pratId   = '';    // praticien_id transmis via ?prat=
var _calYear = new Date().getFullYear();
var _calMonth = new Date().getMonth();
var _calView = 'month'; // 'month' | 'week' | 'day'
var _calWeekStart = _getMonday(new Date()); // Lundi de la semaine courante
var _calDayDate   = (function(){ var d=new Date(); d.setHours(0,0,0,0); return d; }()); // Jour affiché
var _calEvents         = []; // [{id, date, programme_id, programmes:{nom}}]
var _calCycles         = []; // cycles du patient depuis patient_settings
var _stravaActs        = []; // activités Strava du patient
var _cycleLegendOpen   = false; // état accordéon légende cycles
var _calMessages       = []; // [{id, date, title, body}] messages patient visibles
var _calClinicalNotes  = []; // [{id, date, title, body}] notes cliniques (mode kiné uniquement)

function _getMonday(d){
  var dt = new Date(d); dt.setHours(0,0,0,0);
  var day = dt.getDay();
  var diff = (day === 0) ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  return dt;
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Strava : mêmes helpers que le builder praticien (prog-main.js) ── */
function _fmtPace(secPerKm){
  if(!secPerKm || !isFinite(secPerKm)) return null;
  var m = Math.floor(secPerKm/60), s = Math.round(secPerKm%60);
  if(s === 60){ m++; s = 0; }
  return m + "'" + String(s).padStart(2,'0');
}
function _decodePolyline(str){
  var pts=[], index=0, lat=0, lng=0;
  while(index < str.length){
    var b, shift=0, result=0;
    do { b = str.charCodeAt(index++)-63; result |= (b & 0x1f) << shift; shift += 5; } while(b >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : (result >> 1);
    shift=0; result=0;
    do { b = str.charCodeAt(index++)-63; result |= (b & 0x1f) << shift; shift += 5; } while(b >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : (result >> 1);
    pts.push([lat/1e5, lng/1e5]);
  }
  return pts;
}
function _polylineToSvg(encoded, w, h){
  try {
    var pts = _decodePolyline(encoded);
    if(pts.length < 2) return '';
    var minLat=Infinity,maxLat=-Infinity,minLng=Infinity,maxLng=-Infinity;
    pts.forEach(function(p){
      if(p[0]<minLat)minLat=p[0]; if(p[0]>maxLat)maxLat=p[0];
      if(p[1]<minLng)minLng=p[1]; if(p[1]>maxLng)maxLng=p[1];
    });
    var latR = Math.max(maxLat-minLat, 1e-6), lngR = Math.max(maxLng-minLng, 1e-6);
    var lngScale = Math.cos((minLat+maxLat)/2 * Math.PI/180);
    var effW = lngR * lngScale, effH = latR;
    var scale = Math.min((w-12)/effW, (h-12)/effH);
    var offX = (w - effW*scale)/2, offY = (h - effH*scale)/2;
    var step = Math.max(1, Math.floor(pts.length/160));
    var d = '';
    for(var i=0; i<pts.length; i+=step){
      var x = offX + (pts[i][1]-minLng)*lngScale*scale;
      var y = offY + (maxLat-pts[i][0])*scale;
      d += (d?' L ':'M ') + x.toFixed(1) + ',' + y.toFixed(1);
    }
    var first = pts[0], sx = offX+(first[1]-minLng)*lngScale*scale, sy = offY+(maxLat-first[0])*scale;
    return '<svg viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'">'
      + '<path d="'+d+'" fill="none" stroke="#FC4C02" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>'
      + '<circle cx="'+sx.toFixed(1)+'" cy="'+sy.toFixed(1)+'" r="4" fill="#22c55e"/>'
      + '</svg>';
  } catch(e){ return ''; }
}

function fmtDate(d){
  if(!d) return '';
  var p = d.split('-');
  return p.length===3 ? p[2]+'/'+p[1]+'/'+p[0] : d;
}

function fmtCible(c){
  if(!c) return '';
  var t=c.type||'RPE', mn=c.min||'', mx=c.max||'';
  if(mn&&mx) return t+' '+mn+'–'+mx;
  if(mn) return t+' '+mn;
  if(!mn&&!mx) return ''; // type seul sans valeur → ne rien afficher
  return t;
}

// ── Init ────────────────────────────────────────────
function init(){
  var params = new URLSearchParams(window.location.search);
  _progId    = params.get('prog')    || '';
  _patientId = params.get('patient') || '';
  _seanceId  = params.get('seance')  || '';
  _kineMode  = params.get('mode') === 'kine';
  _pratId    = params.get('prat')    || '';
  var nomParam = (params.get('nom') || '').trim();

  // Persistance d'identité pour l'app installée (PWA) : lancée depuis l'écran d'accueil,
  // athlete.html s'ouvre SANS les paramètres du lien → on les mémorise à la 1re ouverture
  // (via le lien) puis on les restaure quand l'URL n'en contient plus.
  var CTX_KEY = 'r4p-athlete-ctx';
  if(_patientId || _progId){
    try { localStorage.setItem(CTX_KEY, JSON.stringify({ prog:_progId, patient:_patientId, seance:_seanceId, mode:(params.get('mode')||''), prat:_pratId, nom:nomParam })); } catch(e){}
  } else {
    try {
      var ctx = JSON.parse(localStorage.getItem(CTX_KEY) || 'null');
      if(ctx){
        _progId = ctx.prog||''; _patientId = ctx.patient||''; _seanceId = ctx.seance||'';
        _kineMode = ctx.mode === 'kine'; _pratId = ctx.prat||''; nomParam = ctx.nom||'';
      }
    } catch(e){}
  }

  // Nom du patient (paramètre d'affichage) : l'afficher dans l'en-tête pour que
  // le kiné/l'athlète voie immédiatement à qui correspond le lien.
  var elPat = document.getElementById('headerPatient');
  if(elPat && nomParam) elPat.textContent = nomParam;

  if(_patientId){
    _mode = 'cal';
    document.getElementById('headerSub').textContent = _kineMode ? '🩺 Vue kiné — Calendrier + notes' : 'Calendrier athlète';
    document.getElementById('refreshBtn').onclick = function(){ renderCalendar(); };
    // Sur mobile : vue mois par défaut (cellules compactes avec dots)
    renderCalendar();
  } else if(_progId){
    _mode = 'prog';
    document.getElementById('headerSub').textContent = 'Programme athlète';
    document.getElementById('refreshBtn').onclick = function(){ loadProgById(_progId, renderProgInMain); };
    loadProgById(_progId, renderProgInMain);
  } else {
    showError('Lien invalide', 'Aucun programme ni calendrier spécifié. Demande le lien à ton praticien.');
  }
}

function refresh(){
  if(_mode==='cal') renderCalendar();
  else if(_mode==='prog') loadProgById(_progId, renderProgInMain);
}

// ── Mode programme unique ────────────────────────────
function loadProgById(id, callback){
  var btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.textContent = '⏳';
  fetch(SUPA_URL + '/rest/v1/programmes?id=eq.' + id + '&select=*', {
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' }
  })
  .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, status:r.status, data:d}; }); })
  .then(function(res){
    btn.disabled = false; btn.textContent = '↻ Actualiser';
    if(!res.ok){ showError('Erreur '+res.status, JSON.stringify(res.data)); return; }
    var arr = Array.isArray(res.data) ? res.data : [];
    if(!arr.length){ showError('Programme introuvable', 'Ce programme n\'existe plus ou le lien est invalide.'); return; }
    callback(arr[0]);
    document.getElementById('lastUpdated').textContent = 'Actualisé à ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  })
  .catch(function(err){
    btn.disabled = false; btn.textContent = '↻ Actualiser';
    showError('Erreur réseau', err&&err.message||String(err));
  });
}

function renderProgInMain(prog){
  var donnees = prog.donnees || {};
  var isCap = donnees.type === 'cap' || (prog.nom && prog.nom.indexOf('CAP —') === 0);
  var isHsr = donnees.type === 'hsr' || (prog.nom && prog.nom.indexOf('HSR —') === 0);
  var html = isCap ? _buildCapProgHTML(prog) : (isHsr ? _buildHsrProgHTML(prog) : buildProgHTML(prog));
  if(!_seanceId){
    document.getElementById('mainContent').innerHTML = html;
    return;
  }
  fetch(SUPA_URL + '/rest/v1/athlete_feedback?seance_id=eq.' + _seanceId, {
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' }
  })
  .then(function(r){ return r.json(); })
  .then(function(fbArr){
    var existing = (Array.isArray(fbArr) && fbArr.length) ? fbArr[0] : null;
    var raw = prog.donnees || [];
    var blocs = Array.isArray(raw) ? raw : (raw.blocs || []);
    _loadPainRatings();
    _loadSessionNote();
    _initExoEffortsFromFeedback(existing && existing.exo_data);
    html = isCap ? _buildCapProgHTML(prog) : (isHsr ? _buildHsrProgHTML(prog) : buildProgHTML(prog));
    html += (isCap || isHsr) ? _buildCapPainCard(_seanceId, existing) : buildRpeCard(_seanceId, blocs, existing);
    document.getElementById('mainContent').innerHTML = html;
  })
  .catch(function(){
    document.getElementById('mainContent').innerHTML = html;
  });
}

// ── Mode calendrier ──────────────────────────────────
function renderCalendar(){
  var btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.textContent = '⏳';
  // Charge séances planifiées, cycles ET messages patient en parallèle (+ notes cliniques si mode kiné)
  var fetches = [
    fetch(SUPA_URL + '/rest/v1/seances_planifiees?patient_id=eq.' + _patientId
        + '&select=id,date,programme_id,programmes(nom),athlete_feedback(rpe,duree_min)&order=date.asc', {
      headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' }
    }).then(function(r){ return r.json(); }),
    fetch(SUPA_URL + '/rest/v1/patient_settings?patient_id=eq.' + _patientId + '&select=cycles', {
      headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' }
    }).then(function(r){ return r.json(); }),
    fetch(SUPA_URL + '/rest/v1/patient_messages?patient_id=eq.' + _patientId + '&order=date.asc', {
      headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' }
    }).then(function(r){ return r.json(); }),
    fetch(SUPA_URL + '/rest/v1/strava_activities?patient_id=eq.' + _patientId
        + '&select=strava_id,date,type,nom,distance_m,duree_s,charge,donnees&order=date.asc', {
      headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' }
    }).then(function(r){ return r.json(); }).catch(function(){ return []; })
  ];
  if(_kineMode && _pratId){
    fetches.push(
      fetch(SUPA_URL + '/rest/v1/clinical_notes?patient_id=eq.' + _patientId + '&praticien_id=eq.' + _pratId + '&order=date.asc', {
        headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' }
      }).then(function(r){ return r.json(); }).catch(function(){ return []; })
    );
  }
  Promise.all(fetches)
  .then(function(results){
    btn.disabled = false; btn.textContent = '↻ Actualiser';
    _calEvents   = Array.isArray(results[0]) ? results[0] : [];
    var settingsArr = Array.isArray(results[1]) ? results[1] : [];
    _calCycles   = (settingsArr.length && Array.isArray(settingsArr[0].cycles)) ? settingsArr[0].cycles : [];
    _calMessages = Array.isArray(results[2]) ? results[2] : [];
    _stravaActs  = Array.isArray(results[3]) ? results[3] : [];
    _calClinicalNotes = (results[4] && Array.isArray(results[4])) ? results[4] : [];
    _renderCalGrid();
    document.getElementById('lastUpdated').textContent = 'Actualisé à ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  })
  .catch(function(err){
    btn.disabled = false; btn.textContent = '↻ Actualiser';
    showError('Erreur réseau', err&&err.message||String(err));
  });
}

function setCalView(view){
  _calView = view;
  if(view === 'week'){
    if(_isMobile){
      // Mobile : commence à aujourd'hui (pas forcément lundi)
      var _tnw = new Date(); _tnw.setHours(0,0,0,0);
      _calWeekStart = _tnw;
    } else {
      _calWeekStart = _getMonday(new Date(_calYear, _calMonth, 15));
    }
    _calDayDate   = new Date(_calWeekStart);
  } else if(view === 'day'){
    // Aller au jour du milieu du mois / de la semaine courante
    if(_calView === 'month' || arguments[1] === 'from-month'){
      _calDayDate = new Date(_calYear, _calMonth, new Date().getDate() || 1);
    }
    _calWeekStart = _getMonday(_calDayDate);
    _calYear  = _calDayDate.getFullYear();
    _calMonth = _calDayDate.getMonth();
  } else { // month
    _calYear  = _calWeekStart.getFullYear();
    _calMonth = _calWeekStart.getMonth();
  }
  _renderCalGrid();
}

function goToToday(){
  var now = new Date(); now.setHours(0,0,0,0);
  _calYear      = now.getFullYear();
  _calMonth     = now.getMonth();
  _calWeekStart = _getMonday(now);
  _calDayDate   = new Date(now);
  _renderCalGrid();
}

function jumpToDay(dateStr){
  var d = new Date(dateStr); d.setHours(0,0,0,0);
  _calDayDate   = d;
  _calWeekStart = _getMonday(d);
  _calYear  = d.getFullYear();
  _calMonth = d.getMonth();
  _calView  = 'day';
  _renderCalGrid();
}

function calMove(dir){
  if(_calView === 'day'){
    var dd = new Date(_calDayDate);
    dd.setDate(dd.getDate() + dir);
    _calDayDate   = dd;
    _calWeekStart = _getMonday(dd);
    _calYear  = dd.getFullYear();
    _calMonth = dd.getMonth();
  } else if(_calView === 'week'){
    var ws = new Date(_calWeekStart);
    var step = _isMobile ? 3 : 7;
    ws.setDate(ws.getDate() + dir * step);
    _calWeekStart = ws;
  } else {
    _calMonth += dir;
    if(_calMonth > 11){ _calMonth = 0; _calYear++; }
    if(_calMonth < 0) { _calMonth = 11; _calYear--; }
  }
  _renderCalGrid();
}

/* ── Barre de navigation commune ── */
function _buildCalNav(label){
  return '<div class="cal-nav">'
    + '<button class="cal-nav-btn" onclick="calMove(-1)">◀</button>'
    + '<h2>'+escH(label)+'</h2>'
    + '<button class="cal-nav-btn" onclick="calMove(1)">▶</button>'
    + '<button class="cal-today-btn" onclick="goToToday()">Aujourd\'hui</button>'
    + '<div class="view-toggle">'
    + '<button class="view-btn'+(_calView==='month'?' active':'')+'" onclick="setCalView(\'month\')">📅 Mois</button>'
    + '<button class="view-btn'+(_calView==='week'?' active':'')+'" onclick="setCalView(\'week\')">📋 Sem.</button>'
    + '<button class="view-btn'+(_calView==='day'?' active':'')+'" onclick="setCalView(\'day\')">📆 Jour</button>'
    + '</div>'
    + '</div>';
}

/* ── Bandeau cycle actuel + légende accordéon ── */
function _toggleCycleLegend(){
  _cycleLegendOpen = !_cycleLegendOpen;
  var panel = document.getElementById('cycle-legend-panel');
  var caret = document.getElementById('cycle-legend-caret');
  if(panel) panel.style.display = _cycleLegendOpen ? 'block' : 'none';
  if(caret) caret.textContent = _cycleLegendOpen ? '▲' : '▼';
}

function _buildCycleBanner(){
  if(!_calCycles || !_calCycles.length) return '';
  var today = new Date(); today.setHours(0,0,0,0);
  var MC = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];

  var cur = null;
  _calCycles.forEach(function(cy){
    if(!cy.startDate) return;
    var s = new Date(cy.startDate); s.setHours(0,0,0,0);
    var e = _cyEndDate(cy);
    if(today>=s && today<=e) cur = cy;
  });

  var html = '';

  if(cur){
    var cyS = new Date(cur.startDate); cyS.setHours(0,0,0,0);
    var cyE = _cyEndDate(cur);
    var wk  = Math.floor((today-cyS)/(7*24*3600*1000))+1;
    var pct = Math.min(100, Math.round(wk/cur.duree*100));
    var col = cur.color || _cycleColor(cur.nom);
    var endLbl = cyE.getDate()+' '+MC[cyE.getMonth()];
    html += '<div style="background:'+col+';border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;">'
      +'<div style="width:38px;height:38px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.25rem;">⚡</div>'
      +'<div style="flex:1;min-width:0;">'
      +'<div style="font-size:.65rem;color:rgba(255,255,255,.75);margin-bottom:1px;">Cycle en cours</div>'
      +'<div style="font-size:.88rem;font-weight:700;color:#fff;">'+escH(cur.nom)+'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;margin-top:5px;">'
      +'<div style="flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;">'
      +'<div style="width:'+pct+'%;height:100%;background:rgba(255,255,255,.9);border-radius:2px;"></div>'
      +'</div>'
      +'<span style="font-size:.68rem;color:rgba(255,255,255,.85);white-space:nowrap;">Sem. '+wk+' / '+cur.duree+'</span>'
      +'</div>'
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0;">'
      +'<div style="font-size:.62rem;color:rgba(255,255,255,.7);">Se termine le</div>'
      +'<div style="font-size:.78rem;font-weight:600;color:#fff;">'+endLbl+'</div>'
      +'</div>'
      +'</div>';
  }

  // Accordéon légende complète
  html += '<div style="margin-bottom:12px;">'
    +'<button onclick="_toggleCycleLegend()" style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 14px;cursor:pointer;font-size:.74rem;font-weight:700;color:var(--navy);font-family:inherit;">'
    +'<span>📅 Plan de cycles complet</span>'
    +'<span id="cycle-legend-caret" style="font-size:.62rem;color:var(--muted);transition:transform .2s;">'+(_cycleLegendOpen?'▲':'▼')+'</span>'
    +'</button>'
    +'<div id="cycle-legend-panel" style="display:'+(_cycleLegendOpen?'block':'none')+';background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:4px 14px 10px;">';

  _calCycles.forEach(function(cy, i){
    if(!cy.startDate) return;
    var s = new Date(cy.startDate); s.setHours(0,0,0,0);
    var e = _cyEndDate(cy);
    var col = cy.color || _cycleColor(cy.nom);
    var sLbl = s.getDate()+' '+MC[s.getMonth()]+' '+s.getFullYear();
    var eLbl = e.getDate()+' '+MC[e.getMonth()]+' '+e.getFullYear();
    var status, sBg, sTxt;
    if(today < s){ status='À venir'; sBg='rgba(107,122,141,.1)'; sTxt='var(--muted)'; }
    else if(today > e){ status='Terminé'; sBg='rgba(107,122,141,.1)'; sTxt='var(--muted)'; }
    else { status='En cours'; sBg=col+'28'; sTxt=col; }
    var isLast = (i === _calCycles.length-1);
    html += '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;'+(isLast?'':'border-bottom:1px solid var(--border);')+';opacity:'+(today>=e?.55:1)+';">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:'+col+';flex-shrink:0;"></div>'
      +'<div style="flex:1;min-width:0;">'
      +'<div style="font-size:.8rem;font-weight:600;color:var(--text);">'+escH(cy.nom)+'</div>'
      +'<div style="font-size:.67rem;color:var(--muted);">'+sLbl+' – '+eLbl+' · '+cy.duree+' sem.</div>'
      +'</div>'
      +'<span style="font-size:.67rem;font-weight:600;background:'+sBg+';color:'+sTxt+';border-radius:5px;padding:3px 8px;white-space:nowrap;">'+status+'</span>'
      +'</div>';
  });

  html += '</div></div>';
  return html;
}

/* ── Bloc "Prochaines séances" commun ── */
function _buildUpcomingHtml(){
  var MOIS_COURTS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  var upcoming = _calEvents
    .filter(function(e){ return e.date >= new Date().toISOString().split('T')[0]; })
    .sort(function(a,b){ return a.date.localeCompare(b.date); })
    .slice(0,5);
  if(!upcoming.length) return '';
  var html = '<div style="margin-top:16px;">'
    + '<div style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Prochaines séances</div>';
  upcoming.forEach(function(ev){
    var nom = (ev.programmes&&ev.programmes.nom)||'Programme';
    var p = ev.date.split('-');
    var dateLabel = parseInt(p[2])+' '+MOIS_COURTS[parseInt(p[1])-1];
    var fb2 = ev.athlete_feedback;
    var ua2 = (fb2&&fb2.rpe&&fb2.duree_min) ? fb2.rpe*fb2.duree_min : null;
    var uaTag = ua2 ? '<span style="font-size:.7rem;font-weight:800;color:'+_uaColor(ua2)+';background:#F5F7FA;border-radius:5px;padding:2px 7px;margin-left:4px;">⚡ '+ua2+' UA</span>' : '';
    html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;" onclick="openProgModal(\''+escH(ev.programme_id)+'\',\''+escH(ev.id)+'\')">'
          + '<div style="background:var(--accent);color:#fff;border-radius:8px;padding:6px 10px;font-size:.7rem;font-weight:700;white-space:nowrap;">'+escH(dateLabel)+'</div>'
          + '<div style="font-size:.85rem;font-weight:600;flex:1;">📋 '+escH(nom)+uaTag+'</div>'
          + '<div style="color:var(--muted);font-size:.8rem;">›</div>'
          + '</div>';
  });
  return html + '</div>';
}

/* ── Rendu principal — dispatch mois / semaine / jour ── */
function _renderCalGrid(){
  var html = _buildCycleBanner();
  if(_calView === 'week')     html += _buildWeekHtml();
  else if(_calView === 'day') html += _buildDayHtml();
  else                        html += _buildMonthHtml();
  html += _buildUpcomingHtml();
  document.getElementById('mainContent').innerHTML = html;
}

/* ── Vue MOIS ── */
function _buildMonthHtml(){
  var first = new Date(_calYear, _calMonth, 1);
  var startDow = (first.getDay()+6)%7;
  var daysInMonth = new Date(_calYear, _calMonth+1, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);

  var headers = DAYS.map(function(d){ return '<div class="cal-day-header">'+d+'</div>'; }).join('');
  var cells = '';
  for(var i=0;i<startDow;i++) cells += '<div class="cal-day other-month"></div>';

  for(var d=1;d<=daysInMonth;d++){
    var dateStr = _calYear+'-'+String(_calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var cellDate = new Date(_calYear,_calMonth,d);
    var isToday = cellDate.getTime()===today.getTime();
    var dayEvs = _calEvents.filter(function(e){ return e.date===dateStr; });
    var dayMsgsCell = _calMessages.filter(function(m){ return m.date===dateStr; });
    var dayCliNotes = _calClinicalNotes.filter(function(n){ return n.date===dateStr; });
    var dayStrava = _stravaActs.filter(function(a){ return a.date===dateStr; });
    var chips, msgChips, cliChips;
    if(_isMobile){
      // Mobile : un dot coloré par séance/message — tap ouvre vue Jour
      var dots = dayEvs.map(function(ev){
        var fb=ev.athlete_feedback, ua=(fb&&fb.rpe&&fb.duree_min)?fb.rpe*fb.duree_min:null;
        return '<span class="cal-dot" style="background:'+(ua?_uaColor(ua):'var(--accent)')+'"></span>';
      }).join('')
        + dayStrava.map(function(){ return '<span class="cal-dot" style="background:#FC4C02"></span>'; }).join('')
        + (dayMsgsCell.length ? '<span class="cal-dot" style="background:#4338CA"></span>' : '')
        + (dayCliNotes.length ? '<span class="cal-dot" style="background:#64748b"></span>' : '');
      chips    = dots ? '<div class="cal-dots">'+dots+'</div>' : '';
      msgChips = ''; cliChips = '';
    } else {
      // Desktop : max 1 chip séance + max 1 chip message (+ note clinique si kine) + badge "+N autres"
      var usedStravas = {};
      chips = dayEvs.slice(0,1).map(function(ev){
        var nom=(ev.programmes&&ev.programmes.nom)||'Programme';
        var fb=ev.athlete_feedback, ua=(fb&&fb.rpe&&fb.duree_min)?fb.rpe*fb.duree_min:null;
        var uaBadge=ua?'<span class="chip-ua" style="color:'+_uaColor(ua)+';">⚡'+ua+'</span>':'';
        // Strava match pour CAP / Vélo
        var mProgDType=ev.programmes&&ev.programmes.donnees&&ev.programmes.donnees.type;
        var isRunProg=nom.indexOf('CAP —')===0||mProgDType==='cap';
        var isVeloProg=nom.indexOf('Vélo —')===0;
        var matchTypes=isRunProg?['Run','TrailRun','Walk']:isVeloProg?['Ride','VirtualRide']:[];
        var matched=matchTypes.length?dayStrava.find(function(a){ return matchTypes.indexOf(a.type)!==-1&&!usedStravas[a.strava_id]; }):null;
        if(matched) usedStravas[matched.strava_id]=true;
        var sd=matched&&matched.distance_m>=1000?(matched.distance_m/1000).toFixed(1)+'km':matched&&matched.distance_m>0?matched.distance_m+'m':'';
        var st=matched&&matched.duree_s>0?Math.round(matched.duree_s/60)+'min':'';
        var sinfo=[sd,st].filter(Boolean).join(' ');
        var sBadge=matched&&sinfo?'<span style="font-size:.55rem;background:#FC4C02;color:#fff;border-radius:3px;padding:0 3px;font-weight:700;">S '+sinfo+'</span>':'';
        return '<div class="cal-chip" onclick="event.stopPropagation();openProgModal(\''+escH(ev.programme_id)+'\',\''+escH(ev.id)+'\')" title="'+escH(nom)+'">'
             +'📋 '+escH(nom.length>10?nom.slice(0,10)+'…':nom)+uaBadge+sBadge+'</div>';
      }).join('');
      msgChips = dayMsgsCell.slice(0,1).map(function(m){
        var lbl=m.title||(m.body?m.body.slice(0,18)+(m.body.length>18?'…':''):'Message');
        return '<div class="cal-msg-chip" onclick="event.stopPropagation();_openMsgModal(\''+escH(m.id)+'\')" title="'+escH((m.title?m.title+'\n':'')+m.body)+'">💬 '+escH(lbl)+'</div>';
      }).join('');
      cliChips = dayCliNotes.slice(0,1).map(function(n){
        var lbl=(n.title||(n.body?n.body.slice(0,18)+(n.body.length>18?'…':''):'Note clinique'));
        return '<div class="cal-chip" style="background:#f1f5f9;color:#64748b;border-color:#cbd5e1;" title="'+escH((n.title?n.title+'\n':'')+n.body)+'">🔒 '+escH(lbl.length>12?lbl.slice(0,12)+'…':lbl)+'</div>';
      }).join('');
      // Strava : seulement les activités non absorbées dans une séance planifiée
      var unmatchedStrava=dayStrava.filter(function(a){ return !usedStravas[a.strava_id]; });
      var stravaChips = unmatchedStrava.slice(0,1).map(function(act){
        var tmap={Run:'🏃',Ride:'🚴',Swim:'🏊',Walk:'🚶',WeightTraining:'💪',Hike:'🥾',TrailRun:'🏔️'};
        var emoji=tmap[act.type]||'⚡';
        var dist=act.distance_m>0?(act.distance_m>=1000?(act.distance_m/1000).toFixed(1)+'km':act.distance_m+'m'):'';
        var label=(act.nom||act.type||'Strava').slice(0,10);
        return '<div class="cal-chip" style="background:#FC4C02;color:#fff;border-color:#FC4C02;cursor:default;" title="'+escH((act.nom||act.type||'')+(dist?' — '+dist:''))+'">'+emoji+' '+escH(label)+(dist?' <span style="font-size:.58rem;font-weight:800;opacity:.85;">'+dist+'</span>':'')+'</div>';
      }).join('');
      chips += stravaChips;
      var shownCount=(dayEvs.length>0?1:0)+(dayMsgsCell.length>0?1:0)+(dayCliNotes.length>0?1:0)+(unmatchedStrava.length>0?1:0);
      var extraCount=dayEvs.length+dayMsgsCell.length+dayCliNotes.length+unmatchedStrava.length-shownCount;
      if(extraCount>0) chips+='<div class="cal-more" onclick="event.stopPropagation();jumpToDay(\''+dateStr+'\')">+'+extraCount+' autre'+(extraCount>1?'s':'')+'</div>';
    }
    var cycleBg = _dayCycleBg(cellDate);
    var cycleStartPill = '';
    _calCycles.forEach(function(cy){
      if(!cy.startDate) return;
      var cs = new Date(cy.startDate); cs.setHours(0,0,0,0);
      if(cs.getTime()===cellDate.getTime()){
        var ccol = cy.color||_cycleColor(cy.nom);
        var cshort = cy.nom.length>9 ? cy.nom.slice(0,9)+'…' : cy.nom;
        cycleStartPill = '<div style="font-size:.52rem;font-weight:700;color:'+ccol+';background:'+ccol+'22;border-radius:3px;padding:1px 5px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">↪ '+escH(cshort)+'</div>';
      }
    });
    cells += '<div class="cal-day'+(isToday?' today':'')+'"'
           + (cycleBg?' style="background-color:'+cycleBg+';"':'')
           + ' onclick="jumpToDay(\''+dateStr+'\')">'
           + '<div class="cal-day-num">'+d+'</div>'
           + cycleStartPill
           + chips+msgChips+(cliChips||'')+'</div>';
  }

  return _buildCalNav(MONTHS[_calMonth]+' '+_calYear)
    + '<div class="cal-grid">'+headers+cells+'</div>';
}

/* ── Vue SEMAINE (7j desktop / 3j mobile) ── */
function _buildWeekHtml(){
  var today = new Date(); today.setHours(0,0,0,0);
  var MOIS_COURTS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  var numDays = _isMobile ? 3 : 7;
  var days = [];
  for(var i=0;i<numDays;i++){
    var d = new Date(_calWeekStart);
    d.setDate(d.getDate()+i);
    days.push(d);
  }
  // Label de la barre nav
  var d0 = days[0], dLast = days[numDays-1];
  var navLabel;
  if(d0.getMonth()===dLast.getMonth()){
    navLabel = d0.getDate()+'–'+dLast.getDate()+' '+MONTHS[d0.getMonth()]+' '+d0.getFullYear();
  } else {
    navLabel = d0.getDate()+' '+MOIS_COURTS[d0.getMonth()]
             + ' – '+dLast.getDate()+' '+MOIS_COURTS[dLast.getMonth()]
             + ' '+dLast.getFullYear();
  }

  var html = _buildCalNav(navLabel);
  html += '<div class="week-grid" style="grid-template-columns:repeat('+numDays+',1fr);">';
  days.forEach(function(day){
    var dateStr = day.getFullYear()+'-'+String(day.getMonth()+1).padStart(2,'0')+'-'+String(day.getDate()).padStart(2,'0');
    var isToday = day.getTime()===today.getTime();
    var dow = day.getDay()===0 ? 6 : day.getDay()-1; // 0=Lun … 6=Dim
    var dayEvs = _calEvents.filter(function(e){ return e.date===dateStr; });

    var weekCycleBg = _dayCycleBg(day);
    var weekCycleTag = '';
    _calCycles.forEach(function(cy){
      if(!cy.startDate) return;
      var wcs = new Date(cy.startDate); wcs.setHours(0,0,0,0);
      if(wcs.getTime()===day.getTime()){
        var wcol = cy.color||_cycleColor(cy.nom);
        var wshort = cy.nom.length>7 ? cy.nom.slice(0,7)+'…' : cy.nom;
        weekCycleTag = '<div style="font-size:.52rem;font-weight:700;color:'+wcol+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;">↪ '+escH(wshort)+'</div>';
      }
    });
    html += '<div class="week-col'+(isToday?' today':'')+'"'+(weekCycleBg?' style="background-color:'+weekCycleBg+';"':'')+'>'+
            '<div class="week-col-header" onclick="jumpToDay(\''+dateStr+'\')" style="cursor:pointer;" title="Voir le détail du jour">'
          + '<div class="week-day-name">'+DAYS[dow]+'</div>'
          + '<div class="week-day-num'+(isToday?' today':'')+'">'+day.getDate()+'</div>'
          + weekCycleTag
          + '</div><div class="week-col-body">';

    var weekUsedStravas = {};
    var dayStravaWeek = _stravaActs.filter(function(a){ return a.date===dateStr; });
    dayEvs.forEach(function(ev){
      var nom = (ev.programmes&&ev.programmes.nom)||'Programme';
      var fb = ev.athlete_feedback;
      var ua = (fb&&fb.rpe&&fb.duree_min) ? fb.rpe*fb.duree_min : null;
      var uaHtml = ua ? '<div class="week-event-ua" style="color:'+_uaColor(ua)+';">⚡'+ua+' UA</div>' : '';
      var wpDType=ev.programmes&&ev.programmes.donnees&&ev.programmes.donnees.type;
      var isRunProg=nom.indexOf('CAP —')===0||wpDType==='cap';
      var isVeloProg=nom.indexOf('Vélo —')===0;
      var wTypes=isRunProg?['Run','TrailRun','Walk']:isVeloProg?['Ride','VirtualRide']:[];
      var wMatch=wTypes.length?dayStravaWeek.find(function(a){ return wTypes.indexOf(a.type)!==-1&&!weekUsedStravas[a.strava_id]; }):null;
      if(wMatch) weekUsedStravas[wMatch.strava_id]=true;
      var wsd=wMatch&&wMatch.distance_m>=1000?(wMatch.distance_m/1000).toFixed(1)+'km':wMatch&&wMatch.distance_m>0?wMatch.distance_m+'m':'';
      var wst=wMatch&&wMatch.duree_s>0?Math.round(wMatch.duree_s/60)+'min':'';
      var wsInfo=[wsd,wst].filter(Boolean).join(' ');
      var wBadge=wMatch&&wsInfo?'<div class="week-event-ua" style="color:#FC4C02;">S '+wsInfo+'</div>':'';
      html += '<div class="week-event" onclick="openProgModal(\''+escH(ev.programme_id)+'\',\''+escH(ev.id)+'\')">'
            + '<div class="week-event-name">📋 '+escH(nom)+'</div>'
            + uaHtml+wBadge+'</div>';
    });

    _calMessages.filter(function(m){ return m.date===dateStr; }).forEach(function(m){
      var lbl = m.title || (m.body ? m.body.slice(0,20)+(m.body.length>20?'…':'') : 'Message');
      html += '<div class="cal-msg-chip" style="margin:2px 0;" onclick="event.stopPropagation();_openMsgModal(\''+escH(m.id)+'\')">💬 '+escH(lbl)+'</div>';
    });

    _calClinicalNotes.filter(function(n){ return n.date===dateStr; }).forEach(function(n){
      var lbl = n.title || (n.body ? n.body.slice(0,20)+(n.body.length>20?'…':'') : 'Note clinique');
      html += '<div class="cal-chip" style="margin:2px 0;background:#f1f5f9;color:#64748b;border-color:#cbd5e1;" title="'+escH((n.title?n.title+'\n':'')+n.body)+'">🔒 '+escH(lbl)+'</div>';
    });

    _stravaActs.filter(function(a){ return a.date===dateStr&&!weekUsedStravas[a.strava_id]; }).forEach(function(act){
      var tmap={Run:'🏃',Ride:'🚴',Swim:'🏊',Walk:'🚶',WeightTraining:'💪',Hike:'🥾',TrailRun:'🏔️'};
      var emoji=tmap[act.type]||'⚡';
      var dist=act.distance_m>0?(act.distance_m>=1000?(act.distance_m/1000).toFixed(1)+' km':act.distance_m+' m'):'';
      var dur=act.duree_s>0?Math.round(act.duree_s/60)+' min':'';
      var meta=[dist,dur].filter(Boolean).join(' · ');
      html += '<div class="week-event" style="background:#FFF3EE;border-color:#FC4C02;cursor:default;" title="'+escH((act.nom||act.type||'')+(meta?' — '+meta:''))+'">'
            + '<div class="week-event-name" style="color:#FC4C02;">'+emoji+' '+escH((act.nom||act.type||'Activité').slice(0,22))+'</div>'
            + (meta ? '<div class="week-event-ua" style="color:#FC4C02;">'+escH(meta)+'</div>' : '')
            + '</div>';
    });

    // Cycles : fond coloré sur la colonne, pas de chip

    var dayMsgs = _calMessages.filter(function(m){ return m.date===dateStr; });
    var dayCli  = _calClinicalNotes.filter(function(n){ return n.date===dateStr; });
    if(!dayEvs.length && !dayMsgs.length && !dayCli.length) html += '<div class="week-empty">—</div>';
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

/* ── Vue JOUR ── */
function _buildDayHtml(){
  var DAYS_FULL = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  var MOIS_COURTS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  var today = new Date(); today.setHours(0,0,0,0);
  var day = _calDayDate;
  var isToday = day.getTime() === today.getTime();
  var dateStr = day.getFullYear()+'-'+String(day.getMonth()+1).padStart(2,'0')+'-'+String(day.getDate()).padStart(2,'0');
  var navLabel = DAYS_FULL[day.getDay()]+' '+day.getDate()+' '+MOIS_COURTS[day.getMonth()]+' '+day.getFullYear();
  var dayEvs = _calEvents.filter(function(e){ return e.date===dateStr; });

  var html = _buildCalNav(navLabel);

  // Badge jour actuel
  if(isToday){
    html += '<div style="text-align:center;font-size:.72rem;font-weight:700;color:var(--accent);margin-bottom:10px;letter-spacing:.04em;">— Aujourd\'hui —</div>';
  }

  // Cycles actifs ce jour
  var cyclesHtml = '';
  _calCycles.forEach(function(cy){
    if(!cy.startDate) return;
    var cyStart = new Date(cy.startDate); cyStart.setHours(0,0,0,0);
    var cyEnd = _cyEndDate(cy);
    if(day>=cyStart && day<=cyEnd){
      var weekNum = Math.floor((day-cyStart)/(7*24*3600*1000))+1;
      var col = _cycleColor(cy.nom);
      cyclesHtml += '<div style="background:'+col+';color:#fff;border-radius:8px;padding:8px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;">'
        + '<span style="font-size:.8rem;font-weight:700;">⚡ '+escH(cy.nom)+'</span>'
        + '<span style="font-size:.72rem;opacity:.85;margin-left:auto;">Semaine '+weekNum+' / '+cy.duree+'</span>'
        + '</div>';
    }
  });
  if(cyclesHtml) html += cyclesHtml;

  var dayMsgs = _calMessages.filter(function(m){ return m.date===dateStr; });
  var dayCliNotes = _calClinicalNotes.filter(function(n){ return n.date===dateStr; });
  var dayStrava = _stravaActs.filter(function(a){ return a.date===dateStr; });

  // Séances du jour
  if(!dayEvs.length && !dayMsgs.length && !dayCliNotes.length && !dayStrava.length){
    html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px 16px;text-align:center;color:var(--muted);">'
          + '<div style="font-size:2rem;margin-bottom:10px;">😴</div>'
          + '<div style="font-size:.88rem;font-weight:600;">Pas de séance prévue ce jour</div>'
          + '</div>';
  } else {
    var dayUsedStravas = {};
    dayEvs.forEach(function(ev){
      var nom = (ev.programmes&&ev.programmes.nom)||'Programme';
      var fb = ev.athlete_feedback;
      var ua = (fb&&fb.rpe&&fb.duree_min) ? fb.rpe*fb.duree_min : null;
      var uaTag = ua ? '<span style="font-size:.75rem;font-weight:800;color:'+_uaColor(ua)+';background:#F5F7FA;border-radius:6px;padding:3px 9px;">⚡ '+ua+' UA</span>' : '';
      var dpDType=ev.programmes&&ev.programmes.donnees&&ev.programmes.donnees.type;
      var isRunProg=nom.indexOf('CAP —')===0||dpDType==='cap';
      var isVeloProg=nom.indexOf('Vélo —')===0;
      var matchTypes=isRunProg?['Run','TrailRun','Walk']:isVeloProg?['Ride','VirtualRide']:[];
      var matched=matchTypes.length?dayStrava.find(function(a){ return matchTypes.indexOf(a.type)!==-1&&!dayUsedStravas[a.strava_id]; }):null;
      if(matched) dayUsedStravas[matched.strava_id]=true;
      var stravaSection='';
      if(matched){
        var dsd=matched.distance_m>=1000?(matched.distance_m/1000).toFixed(1)+' km':matched.distance_m>0?matched.distance_m+' m':'';
        var dst=matched.duree_s>0?Math.round(matched.duree_s/60)+' min':'';
        var dsInfo=[dsd,dst].filter(Boolean).join(' · ');
        stravaSection='<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;">'
          +'<svg width="13" height="13" viewBox="0 0 24 24" fill="#FC4C02"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>'
          +'<span style="font-size:.75rem;font-weight:700;color:#FC4C02;">Strava'+(dsInfo?' · '+escH(dsInfo):'')+'</span>'
          +'</div>';
      }
      html += '<div style="background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s;" onclick="openProgModal(\''+escH(ev.programme_id)+'\',\''+escH(ev.id)+'\')" onmouseover="this.style.boxShadow=\'0 4px 16px rgba(43,95,166,.18)\'" onmouseout="this.style.boxShadow=\'none\'">'
            + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">'
            + '<div style="font-size:1rem;font-weight:700;color:var(--navy);flex:1;">📋 '+escH(nom)+'</div>'
            + uaTag
            + '</div>'
            + '<div style="font-size:.75rem;color:var(--accent);font-weight:600;">Voir le programme  ›</div>'
            + stravaSection
            + '</div>';
    });
    // Messages patient du jour
    dayMsgs.forEach(function(m){
      html += '<div style="background:#EEF2FF;border:2px solid #C7D2FE;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;" onclick="_openMsgModal(\''+escH(m.id)+'\')">'
            + '<div style="font-size:.72rem;font-weight:700;color:#6366F1;margin-bottom:4px;letter-spacing:.04em;">💬 MESSAGE DE TON PRATICIEN</div>'
            + (m.title ? '<div style="font-size:.92rem;font-weight:700;color:#3730A3;margin-bottom:4px;">'+escH(m.title)+'</div>' : '')
            + '<div style="font-size:.82rem;color:#4338CA;white-space:pre-wrap;">'+escH(m.body ? (m.body.length>120 ? m.body.slice(0,120)+'…' : m.body) : '')+'</div>'
            + (m.body && m.body.length>120 ? '<div style="font-size:.72rem;color:#6366F1;margin-top:6px;font-weight:600;">Lire la suite ›</div>' : '')
            + '</div>';
    });
    // Notes cliniques (mode kiné uniquement)
    dayCliNotes.forEach(function(n){
      html += '<div style="background:#f8fafc;border:2px solid #cbd5e1;border-radius:12px;padding:14px 16px;margin-bottom:10px;">'
            + '<div style="font-size:.72rem;font-weight:700;color:#64748b;margin-bottom:4px;letter-spacing:.04em;">🔒 NOTE CLINIQUE</div>'
            + (n.title ? '<div style="font-size:.92rem;font-weight:700;color:#1e293b;margin-bottom:4px;">'+escH(n.title)+'</div>' : '')
            + '<div style="font-size:.82rem;color:#64748b;white-space:pre-wrap;">'+escH(n.body||'')+'</div>'
            + '</div>';
    });
    // Activités Strava du jour
    var tmap={Run:'🏃',Ride:'🚴',Swim:'🏊',Walk:'🚶',WeightTraining:'💪',Hike:'🥾',TrailRun:'🏔️',VirtualRide:'🚴',Rowing:'🚣'};
    dayStrava.filter(function(a){ return !dayUsedStravas[a.strava_id]; }).forEach(function(act){
      var emoji = tmap[act.type]||'⚡';
      var d     = act.donnees || {};
      var dist  = act.distance_m>0 ? (act.distance_m>=1000?(act.distance_m/1000).toFixed(2)+' km':act.distance_m+' m') : null;
      var dur   = act.duree_s>0 ? (Math.floor(act.duree_s/3600)>0?Math.floor(act.duree_s/3600)+'h ':'')+Math.round((act.duree_s%3600)/60)+'min' : null;
      var typeLabel = {Run:'Course',Ride:'Vélo',Swim:'Natation',Walk:'Marche',WeightTraining:'Musculation',Hike:'Randonnée',TrailRun:'Trail',VirtualRide:'Vélo virtuel',Rowing:'Aviron'}[act.type]||act.type||'Activité';
      var pace = (act.distance_m > 100 && act.duree_s) ? _fmtPace(act.duree_s/(act.distance_m/1000)) : null;
      var runLike = ['Run','TrailRun','Walk','Hike'].indexOf(act.type) !== -1;
      var pills = [
        ['DISTANCE', dist],
        ['DURÉE', dur],
        ['TYPE', escH(typeLabel)],
        (runLike && pace) ? ['ALLURE MOY.', pace+'/km'] : (d.avg_speed ? ['VITESSE MOY.', (d.avg_speed*3.6).toFixed(1)+' km/h'] : null),
        d.avg_hr ? ['FC MOY.', Math.round(d.avg_hr)+' bpm'] : null,
        d.max_hr ? ['FC MAX', Math.round(d.max_hr)+' bpm'] : null,
        d.elevation ? ['D+', Math.round(d.elevation)+' m'] : null,
        d.cadence ? ['CADENCE', Math.round(d.cadence*2)] : null,
        act.charge ? ['CHARGE', '⚡ '+act.charge+' UA'] : null
      ].filter(Boolean);
      var pillsHtml = pills.map(function(p){
        var color = (p[0]==='CHARGE') ? '#FC4C02' : '#1A1917';
        return '<div style="font-size:.82rem;"><span style="color:#9D6050;font-size:.7rem;font-weight:700;letter-spacing:.04em;display:block;">'+p[0]+'</span><span style="font-weight:700;color:'+color+';">'+p[1]+'</span></div>';
      }).join('');
      // Allures par kilomètre
      var splitsHtml = '';
      if(Array.isArray(d.splits) && d.splits.length > 1){
        var paces = d.splits.map(function(s){ return (s.d > 0 && s.t > 0) ? s.t/(s.d/1000) : null; });
        var fullPaces = paces.filter(function(p,i){ return p && d.splits[i].d >= 500; });
        if(fullPaces.length >= 2){
          var minP = Math.min.apply(null, fullPaces), maxP = Math.max.apply(null, fullPaces);
          var range = Math.max(maxP-minP, 1);
          var bars = d.splits.map(function(s, i){
            var p = paces[i];
            if(!p) return '';
            var partial = s.d < 500;
            // Hauteur en pixels absolus, pas en % : le conteneur immédiat de la barre
            // (colonne flex à hauteur auto) ne fournit aucune hauteur de référence pour
            // un height:XX%, qui serait alors ignoré par le navigateur (barre invisible).
            var barPx = 12 + Math.round((1 - (p-minP)/range) * 34);
            var kmLbl = partial ? (s.d/1000).toFixed(1).replace('.',',') : String(i+1);
            return '<div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;flex:1;height:60px;">'
              + '<span style="font-size:.62rem;color:#9D6050;">'+_fmtPace(p)+'</span>'
              + '<div style="width:70%;background:#FC4C02;border-radius:3px 3px 0 0;height:'+barPx+'px'+(partial?';opacity:.4':'')+'"></div>'
              + '<span style="font-size:.62rem;color:#9D6050;">'+kmLbl+'</span></div>';
          }).join('');
          splitsHtml = '<div style="margin-top:10px;"><div style="font-size:.7rem;font-weight:700;color:#9D6050;letter-spacing:.04em;margin-bottom:6px;">ALLURE PAR KILOMÈTRE</div>'
            + '<div style="display:flex;align-items:flex-end;gap:3px;">'+bars+'</div></div>';
        }
      }
      // Parcours
      var routeHtml = '';
      if(d.polyline){
        var svg = _polylineToSvg(d.polyline, 120, 90);
        if(svg) routeHtml = '<div style="flex-shrink:0;">'+svg+'<div style="font-size:.62rem;color:#9D6050;text-align:center;margin-top:2px;">Parcours</div></div>';
      }
      html += '<div style="background:#FFF3EE;border:2px solid #FC4C02;border-radius:12px;padding:16px;margin-bottom:10px;">'
            + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">'
            + '<svg width="16" height="16" viewBox="0 0 24 24" fill="#FC4C02"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>'
            + '<div style="font-size:1rem;font-weight:700;color:#FC4C02;flex:1;">'+emoji+' '+escH(act.nom||typeLabel)+'</div>'
            + '</div>'
            + '<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;">'
            + (routeHtml ? routeHtml : '')
            + '<div style="flex:1;min-width:180px;">'
            + '<div style="display:flex;gap:16px;flex-wrap:wrap;">'+pillsHtml+'</div>'
            + splitsHtml
            + '</div>'
            + '</div>'
            + '</div>';
    });
  }

  return html;
}

// ── Modal programme ──────────────────────────────────
function openProgModal(progId, seanceId){
  document.getElementById('progModalTitle').textContent = 'Programme';
  document.getElementById('progModalBody').innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  document.getElementById('progModal').classList.add('open');
  var fetches = [
    fetch(SUPA_URL + '/rest/v1/programmes?id=eq.' + progId + '&select=*', {
      headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' }
    }).then(function(r){ return r.json(); })
  ];
  if(seanceId){
    fetches.push(
      fetch(SUPA_URL + '/rest/v1/athlete_feedback?seance_id=eq.' + seanceId, {
        headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' }
      }).then(function(r){ return r.json(); })
    );
  }
  Promise.all(fetches)
  .then(function(results){
    var arr = Array.isArray(results[0]) ? results[0] : [];
    if(!arr.length){ document.getElementById('progModalBody').innerHTML = '<div class="error-state"><div class="error-icon">⚠️</div><div>Programme introuvable.</div></div>'; return; }
    var prog = arr[0];
    document.getElementById('progModalTitle').textContent = prog.nom || 'Programme';
    var raw = prog.donnees || [];
    var blocs = Array.isArray(raw) ? raw : (raw.blocs || []);
    var existing = null;
    if(results[1]){
      var fbArr = Array.isArray(results[1]) ? results[1] : [];
      existing = fbArr.length ? fbArr[0] : null;
    }
    _loadPainRatings();
    _loadSessionNote();
    var donnees = prog.donnees || {};
    var isCap = donnees.type === 'cap' || (prog.nom && prog.nom.indexOf('CAP —') === 0);
    var isHsr = donnees.type === 'hsr' || (prog.nom && prog.nom.indexOf('HSR —') === 0);
    _initExoEffortsFromFeedback(existing && existing.exo_data);
    var html = isCap ? _buildCapProgHTML(prog) : (isHsr ? _buildHsrProgHTML(prog) : buildProgHTML(prog));
    if(seanceId) html += (isCap || isHsr) ? _buildCapPainCard(seanceId, existing) : buildRpeCard(seanceId, blocs, existing);
    document.getElementById('progModalBody').innerHTML = html;
  })
  .catch(function(){
    document.getElementById('progModalBody').innerHTML = '<div class="error-state"><div class="error-icon">⚠️</div><div>Erreur réseau.</div></div>';
  });
}

function closeProgModal(){
  document.getElementById('progModal').classList.remove('open');
}

function _openMsgModal(msgId){
  var m = _calMessages.find(function(x){ return x.id === msgId; });

  document.getElementById('msgModalTitle').textContent = m.title || 'Message de ton praticien';
  var MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

  var dateLbl = parseInt(parts[2])+' '+MOIS[parseInt(parts[1])-1]+' '+parts[0];

    +'<div style="font-size:.92rem;color:#1e1b4b;white-space:pre-wrap;line-height:1.6;">'+escH(m.body||'')+'</div>';

// ── Pain ratings + done state per exercise ────────────────────
var _painRatings = {}; // { 'exoKey': 0-10 }
var _doneExos    = {}; // { 'exoKey': true }

function _exoKey(blocIdx, exoIdx){ return 'b'+blocIdx+'e'+exoIdx; }

function _loadPainRatings(){
  if(!_currentSeanceId) return;
  try {
    var raw = localStorage.getItem('r4p-pain-'+_currentSeanceId);
    _painRatings = raw ? JSON.parse(raw) : {};
    var rawDone = localStorage.getItem('r4p-done-'+_currentSeanceId);
    _doneExos = rawDone ? JSON.parse(rawDone) : {};
  } catch(e){ _painRatings = {}; _doneExos = {}; }
}

function _savePainRatings(){
  if(!_currentSeanceId) return;
  try { localStorage.setItem('r4p-pain-'+_currentSeanceId, JSON.stringify(_painRatings)); } catch(e){}
}

var PAIN_LABELS = ['Aucune douleur','Très légère','Légère','Légère','Modérée','Modérée','Importante','Importante','Forte','Très forte','Insupportable'];

function _updatePainUI(key){
  var v = _painRatings[key];
  var num = document.getElementById('painNum-'+key);
  var st  = document.getElementById('painState-'+key);
  var sl  = document.getElementById('painSlider-'+key);
  if(v === undefined){
    if(num){ num.textContent='–'; num.style.background='#f0f4f8'; num.style.color='#9aa8b8'; }
    if(st){ st.textContent='Douleur ?'; st.style.color='var(--muted)'; st.style.fontWeight='400'; }
    if(sl) sl.value = 0;
  } else {
    if(num){ num.textContent=v; num.style.background=PAIN_COLORS[v]; num.style.color=(v===4?'#1a2433':'#fff'); }
    if(st){ st.textContent=PAIN_LABELS[v]; st.style.color=PAIN_COLORS[v]; st.style.fontWeight='700'; }
    if(sl) sl.value = v;
  }
}

// ── Construction HTML d'un programme ────────────────
function buildProgHTML(prog){
  var raw = prog.donnees || [];
  var blocs = Array.isArray(raw) ? raw : (raw.blocs || []);
  var notes = Array.isArray(raw) ? '' : (raw.notes || '');
  var html = '';

  html += '<div class="prog-meta">'
       +  '<div class="prog-title">'+escH(prog.nom||'Programme')+'</div>'
       +  '<div class="prog-date">📅 '+escH(fmtDate(prog.date))+'</div>'
       +  '</div>';

  if(!blocs.length){
    html += '<div class="empty-state"><div style="font-size:2rem;margin-bottom:10px">📋</div><div>Ce programme ne contient pas encore d\'exercices.</div></div>';
    return html;
  }

  blocs.forEach(function(b, bIdx){
    // ── Bloc cardio ──────────────────────────────────────────────
    if(b.type === 'cardio'){
      var sport = b.sport === 'course' ? 'Course à pied' : (b.sport || 'Cardio');
      var effortLbl = b.effort_type === 'fractionne' ? 'Fractionné' : (b.effort_type === 'continu' ? 'Continu' : '');
      html += '<div class="bloc"><div class="bloc-header">'
           +  '<div class="bloc-title">🏃 '+escH(sport)+'</div>'
           +  (effortLbl ? '<span class="bloc-badge endurance">'+escH(effortLbl)+'</span>' : '')
           +  '</div><div class="exo-list"><div class="exo-item">';
      // Détails workout
      var cParams = [];
      if(b.effort_type === 'fractionne'){
        if(b.repetitions) cParams.push({l:'Répétitions', v: b.repetitions+'×'});
        if(b.duree_effort) cParams.push({l:'Course', v: b.duree_effort});
        if(b.duree_recup)  cParams.push({l:'Marche', v: b.duree_recup});
      }
      if(b.duree_totale) cParams.push({l:'Durée totale', v: b.duree_totale+' min'});
      if(b.distance) cParams.push({l:'Distance', v: b.distance+' km'});
      if(b.zone) cParams.push({l:'Zone cardio', v: 'Zone '+b.zone});
      if(cParams.length){
        html += '<div class="exo-params">';
        cParams.forEach(function(p){ html += '<div class="param-box"><div class="param-label">'+escH(p.l)+'</div><div class="param-val">'+escH(p.v)+'</div></div>'; });
        html += '</div>';
      }
      if(b.notes) html += '<div class="exo-consigne">💬 '+escH(b.notes)+'</div>';
      // Douleur session
      var _cKey = 'cardio-'+bIdx;
      html += _buildPainSliderHTML(_cKey, false, '');
      html += '</div></div></div>';
      return;
    }
    // ── Bloc musculation / autre ──────────────────────────────────
    var obj = b.objectif||'libre';
    html += '<div class="bloc">'
         +  '<div class="bloc-header">'
         +  '<div class="bloc-title">'+escH(b.title||'Bloc')+'</div>'
         +  '<span class="bloc-badge '+escH(obj)+'">'+escH(OBJ_LABELS[obj]||obj)+'</span>'
         +  '</div>';
    if(b.methode){
      var objDef = METHODES[obj] || METHODES.libre;
      var methObj = objDef.methods.find(function(m){ return m.id===b.methode; });
      if(methObj){
        html += '<div class="methode-card mc-'+escH(obj)+'">'
             +  '<div class="methode-card-label">'+escH(objDef.label)+' — '+escH(methObj.label)+'</div>'
             +  '<div class="methode-card-desc">'+escH(methObj.desc)+'</div>';
        if(methObj.protocol){
          html += '<div class="methode-card-protocol">⚙ Structure : '+escH(methObj.protocol)+'</div>';
        }
        html += '</div>';
      }
    }
    // Grouper les exos en chain-groups et solos
    var exos = b.exos||[];
    var groups = [];
    var gi = 0;
    while(gi < exos.length){
      if(exos[gi].chained){
        var gItems = [];
        while(gi < exos.length && (gItems.length===0 || exos[gi-1].chained)){
          gItems.push({exo:exos[gi], idx:gi});
          gi++;
        }
        groups.push({type:'chain', items:gItems});
      } else {
        groups.push({type:'solo', items:[{exo:exos[gi], idx:gi}]});
        gi++;
      }
    }

    function _buildExoRowV3(e, idx, isLastInChain){
      var _eKey = _exoKey(bIdx, idx);
      var ytId = _ytId(e.url||'');
      var r = '<div class="exo-row-v3">';
      // Thumb + nom
      r += '<div class="exo-top-v3">';
      if(ytId){
        r += '<div class="exo-thumb-v3" onclick="openYtModal(\''+ytId+'\')" title="Voir la vidéo">'
           + '<img src="https://img.youtube.com/vi/'+ytId+'/hqdefault.jpg" alt="vidéo" loading="lazy">'
           + '<div class="exo-thumb-overlay-v3"><div class="exo-play-circle"><div class="exo-play-tri"></div></div></div>'
           + '</div>';
      } else {
        r += '<div class="exo-thumb-v3 no-vid"><div class="exo-thumb-overlay-v3"><div class="exo-play-circle"><div class="exo-play-tri"></div></div></div></div>';
      }
      r += '<div class="exo-name-v3">'+escH(e.name)+'</div>';
      r += '</div>';
      // Consigne
      if(e.consigne&&e.consigne.trim()) r += '<div class="exo-consigne-v3">'+escH(e.consigne)+'</div>';
      // Pills
      var pills = [];
      if(e.series) pills.push({l:'Séries', v:e.series, cls:''});
      if(e.reps)   pills.push({l:'Reps', v:e.reps+(e.perCote?' / côté':''), cls:''});
      else if(e.duree) pills.push({l:'Durée', v:e.duree+(e.perCote?' / côté':''), cls:''});
      if(e.reps && e.duree) pills.push({l:'Durée', v:e.duree+(e.perCote?' / côté':''), cls:''});
      if(e.tempo)  pills.push({l:'Tempo', v:e.tempo, cls:''});
      var cibles = e.cibles&&e.cibles.length ? e.cibles : (e.cibleType?[{type:e.cibleType,min:e.cibleVal||'',max:''}]:[]);
      cibles.forEach(function(c,ci){ var cf=fmtCible(c); if(cf) pills.push({l:'Cible'+(cibles.length>1?' '+(ci+1):''), v:cf, cls:''}); });
      // Récup : grisée si mid-chain (pas de pause), sinon valeur réelle
      var _recupCls, _recupVal;
      if(e.chained && !isLastInChain){ _recupCls='recup recup-dim'; _recupVal='—'; }
      else if(e.recup){               _recupCls='recup';            _recupVal=e.recup; }
      else {                          _recupCls='recup recup-dim';  _recupVal='—'; }
      pills.push({l:'Récup', v:_recupVal, cls:_recupCls});
      r += '<div class="exo-pills">';
      pills.forEach(function(p){
        r += '<div class="exo-pill '+p.cls+'">'
           + '<div class="exo-pill-lbl">'+escH(p.l)+'</div>'
           + '<div class="exo-pill-val">'+escH(p.v)+'</div>'
           + '</div>';
      });
      r += '</div>';
      // Douleur (curseur) + note repliée
      var _initNote = _existingExoNotes[_eKey] || '';
      r += _buildPainSliderHTML(_eKey, true, _initNote);
      r += '<div class="exo-note-area'+(_initNote?' open':'')+'" id="exoNoteArea-'+_eKey+'">'
         + '<textarea id="exoNote-'+_eKey+'" class="exo-exo-note-inp" placeholder="Remarque sur cet exercice…" rows="1" oninput="this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\'">'+escH(_initNote)+'</textarea>'
         + '</div>';
      r += '</div>';
      return r;
    }

    groups.forEach(function(g){
      if(g.type==='chain'){
        html += '<div class="exo-chain-group">';
        g.items.forEach(function(item, ii){
          html += _buildExoRowV3(item.exo, item.idx, ii===g.items.length-1);
        });
        html += '</div>';
      } else {
        html += '<div class="exo-solo-group">';
        html += _buildExoRowV3(g.items[0].exo, g.items[0].idx, true);
        html += '</div>';
      }
    });
    html += '</div>';
  });

  if(notes&&notes.trim()){
    html += '<div class="notes-bloc"><div class="notes-label">📝 Notes & Consignes</div><div class="notes-text">'+escH(notes)+'</div></div>';
  }
  return html;
}
