<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>rehab⁴perf — Icônes v5 (en cours)</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@1,600&family=Poppins:wght@800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A3A5C;--accent:#2B5FA6;--green:#2D6A4F;--orange:#D4600A;--border:#E8E6E1;--bg:#F5F7FA;--surface:#fff;--muted:#9D9B96}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--navy)}
.hdr{background:var(--navy);padding:16px 28px;display:flex;align-items:center;gap:12px}
.hdr-logo{display:inline-flex;align-items:center;gap:8px}
.hdr-logo .r{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:20px;color:#fff}
.hdr-logo .e{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:.44em;vertical-align:super;color:#7FA8D9;margin:0 .04em}
.hdr-logo .p{font-family:'Poppins',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:-.025em}
.badge{background:rgba(255,165,0,.25);border:1px solid rgba(255,165,0,.5);color:#FFD580;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:20px;padding:3px 10px}
.hdr-src{color:rgba(255,255,255,.45);font-size:.68rem;margin-left:auto;letter-spacing:.06em;font-weight:600}
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-label{font-size:.63rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.btn{padding:4px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:#6B6860;font-size:.74rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700}
.sep{width:1px;height:22px;background:var(--border)}
.main{padding:24px 28px;max-width:900px}
.cat{margin-bottom:28px}
.cat-hdr{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding-bottom:9px;border-bottom:2px solid var(--border);margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:16px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative}
.card:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(43,95,166,.08)}
.card.sel{border-color:var(--accent);background:#EEF3FB}
.icon-bg{width:60px;height:60px;border-radius:14px;background:#EEF3FB;display:flex;align-items:center;justify-content:center}
.card-name{font-size:.7rem;font-weight:700;color:var(--navy);text-align:center;line-height:1.3}
.card-ctx{font-size:.6rem;color:var(--muted);text-align:center}
.sizes{display:flex;align-items:flex-end;gap:10px;padding-top:7px;border-top:1px solid var(--border);width:100%}
.sz{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.sz-lbl{font-size:.54rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600}
.chip{position:absolute;top:7px;right:7px;font-size:.52rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:#FFF3E0;color:#E65100}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <svg viewBox="8 34 164 104" width="24" height="16" aria-hidden="true"><g stroke="#4A90D9" stroke-width="17" stroke-linecap="round" fill="none"><line x1="20" y1="118" x2="56" y2="104"/><line x1="70" y1="122" x2="100" y2="84"/><line x1="112" y1="125" x2="134" y2="66"/><line x1="158" y1="128" x2="158" y2="46"/></g></svg>
    <span><span class="r">rehab<span class="e">4</span></span><span class="p">perf</span></span>
  </div>
  <div class="badge">Icônes v5 — en cours</div>
  <div class="hdr-src">9 icônes à valider · custom stroke anatomique</div>
</div>

<div class="controls">
  <span class="ctrl-label">Couleur</span>
  <button class="btn on" onclick="setC('navy',this)">Navy</button>
  <button class="btn" onclick="setC('accent',this)">Accent</button>
  <button class="btn" onclick="setC('green',this)">Vert</button>
  <button class="btn" onclick="setC('orange',this)">Orange</button>
  <div class="sep"></div>
  <span class="ctrl-label">Taille aperçu</span>
  <button class="btn" onclick="setPrev(36,this)">S</button>
  <button class="btn on" onclick="setPrev(48,this)">M</button>
  <button class="btn" onclick="setPrev(64,this)">L</button>
  <button class="btn" onclick="setPrev(80,this)">XL</button>
</div>

<div class="main" id="main"></div>

<script>
var COLOR='#1A3A5C', PREV=48;
var COLORS={navy:'#1A3A5C',accent:'#2B5FA6',green:'#2D6A4F',orange:'#D4600A'};

var ICONS=[

{ cat:'Bilan — Anatomique (à valider)', items:[

{ name:'Épaule', ctx:'Bilan sidebar + page', type:'stroke',
  d:`<path d="M2 9 L10 9 L12 11"/>
<path d="M12 11 Q8 15 12 19"/>
<circle cx="16" cy="15" r="3.5"/>
<line x1="16" y1="18.5" x2="17" y2="23"/>` },

{ name:'AGP / Hanche', ctx:'Bilan sidebar + page', type:'stroke',
  d:`<path d="M3 7 Q10 3 20 7"/>
<path d="M6 9 Q1 15 6 21"/>
<circle cx="11" cy="15" r="4"/>
<path d="M14 18 L19 22 L21 24"/>
<path d="M15 13 L21 11"/>` },

{ name:'Genou', ctx:'Bilan sidebar + page', type:'stroke',
  d:`<line x1="12" y1="2" x2="12" y2="10"/>
<path d="M8 10 C10 14 14 14 16 10"/>
<ellipse cx="12" cy="11.5" rx="2.5" ry="2"/>
<line x1="7" y1="16" x2="17" y2="16"/>
<path d="M11.5 16 L12 14.5 L12.5 16"/>
<line x1="11" y1="16" x2="10" y2="23"/>
<line x1="15" y1="17" x2="15.5" y2="23"/>` },

{ name:'Pied / Cheville', ctx:'Bilan sidebar + page', type:'stroke',
  d:`<line x1="9" y1="2" x2="9" y2="12"/>
<line x1="15" y1="3" x2="15" y2="13"/>
<line x1="9" y1="12" x2="15" y2="12"/>
<path d="M8 12 A4 4 0 0 1 16 12"/>
<circle cx="9" cy="13" r="1.5"/>
<circle cx="15" cy="14" r="1.5"/>
<line x1="8" y1="16" x2="16" y2="16"/>
<path d="M8 16 Q5 17 5 19 Q6 22 11 22 Q16 22 17 20 Q18 18 16 16"/>
<path d="M16 20 Q18 18 22 18"/>` },

{ name:'LMA', ctx:'Bilan sidebar + page', type:'stroke',
  d:`<circle cx="12" cy="4" r="2.5"/>
<line x1="12" y1="6.5" x2="12" y2="15"/>
<path d="M12 9 L8 13"/>
<path d="M12 9 L16 13"/>
<line x1="12" y1="15" x2="9" y2="22"/>
<line x1="12" y1="15" x2="15" y2="22"/>
<circle cx="9.5" cy="19" r="3.5" stroke-dasharray="2,1"/>
<path d="M10 17 L8.5 19.5 L9.5 19.5 L8 22"/>` },

]},

{ cat:'Bilan — Tests & Synthèse (à valider)', items:[

{ name:'Tests Fonct. MS', ctx:'Bilan sidebar', type:'stroke',
  d:`<circle cx="12" cy="4" r="2.5"/>
<line x1="12" y1="6.5" x2="12" y2="15"/>
<path d="M12 9 L4 9"/>
<path d="M4 9 L2 12"/>
<path d="M12 9 L16 13"/>
<line x1="12" y1="15" x2="10" y2="22"/>
<line x1="12" y1="15" x2="14" y2="22"/>
<path d="M12 7 A7 7 0 0 0 4 9" stroke-dasharray="2,1.5"/>` },

{ name:'Tests Fonct. Rachis', ctx:'Bilan sidebar', type:'stroke',
  d:`<circle cx="6" cy="4" r="2"/>
<path d="M6 6 C7 9 11 11 18 11"/>
<line x1="15" y1="12" x2="15" y2="22"/>
<line x1="18" y1="12" x2="18" y2="22"/>
<circle cx="15" cy="15" r="1.2"/>
<circle cx="15" cy="21" r="1.2"/>
<path d="M13 15 L13 21" stroke-dasharray="2,1"/>` },

{ name:'Tests Fonct. MI', ctx:'Bilan sidebar', type:'stroke',
  d:`<circle cx="12" cy="3.5" r="2"/>
<path d="M12 5.5 L11 12"/>
<path d="M11 8 L7 10"/>
<path d="M11 8 L15 10"/>
<path d="M11 12 L10 18"/>
<path d="M10 18 L13 23"/>
<path d="M11 12 L16 15"/>
<path d="M16 15 L19 12"/>` },

{ name:'CR Complet', ctx:'Bilan sidebar + page', type:'stroke',
  d:`<rect x="4" y="2" width="15" height="20" rx="1.5"/>
<path d="M15 2 L19 6"/>
<path d="M15 2 L15 6 L19 6"/>
<line x1="7" y1="9" x2="16" y2="9"/>
<circle cx="8.5" cy="12.5" r="1.5"/>
<line x1="8.5" y1="14" x2="8.5" y2="17"/>
<path d="M8.5 14.8 L7 16 M8.5 14.8 L10 16"/>
<path d="M8.5 17 L7.5 20 M8.5 17 L9.5 20"/>
<rect x="12" y="13" width="1.5" height="4"/>
<rect x="14.5" y="11" width="1.5" height="6"/>
<line x1="11" y1="17" x2="17" y2="17"/>` },

]},

];

function mkSvg(icon, size) {
  var c = COLOR;
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="'+size+'" height="'+size+'" fill="none" stroke="'+c+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">'+icon.d+'</svg>';
}

function render() {
  var html='';
  ICONS.forEach(function(sec){
    html+='<div class="cat"><div class="cat-hdr">'+sec.cat+'</div><div class="grid">';
    sec.items.forEach(function(icon){
      html+='<div class="card" onclick="this.classList.toggle(\'sel\')">'
        +'<div class="chip">v5</div>'
        +'<div class="icon-bg">'+mkSvg(icon,PREV)+'</div>'
        +'<div class="card-name">'+icon.name+'</div>'
        +'<div class="card-ctx">'+icon.ctx+'</div>'
        +'<div class="sizes">'
        +'<div class="sz"><div style="height:24px;display:flex;align-items:center">'+mkSvg(icon,20)+'</div><div class="sz-lbl">20px</div></div>'
        +'<div class="sz"><div style="height:36px;display:flex;align-items:center">'+mkSvg(icon,32)+'</div><div class="sz-lbl">32px</div></div>'
        +'<div class="sz"><div style="height:48px;display:flex;align-items:center">'+mkSvg(icon,40)+'</div><div class="sz-lbl">40px</div></div>'
        +'</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('main').innerHTML=html;
}

function setC(k,btn){
  document.querySelectorAll('.btn').forEach(function(b){if(['Navy','Accent','Vert','Orange'].includes(b.textContent))b.classList.remove('on');});
  btn.classList.add('on'); COLOR=COLORS[k]; render();
}
function setPrev(v,btn){
  document.querySelectorAll('.btn').forEach(function(b){if(['S','M','L','XL'].includes(b.textContent))b.classList.remove('on');});
  btn.classList.add('on'); PREV=v; render();
}
render();
</script>
</body>
</html>
