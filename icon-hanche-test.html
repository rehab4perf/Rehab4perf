<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Icons – Preview Sidebar R4P</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #E8E7E3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    gap: 32px;
    padding: 40px;
    min-height: 100vh;
    align-items: flex-start;
  }

  /* ── R4P Variables ── */
  :root {
    --bg:        #F7F6F3;
    --surface:   #FFFFFF;
    --surface2:  #F1F0ED;
    --text:      #1A1917;
    --text2:     #6B6860;
    --text3:     #9D9B96;
    --accent:    #2B5FA6;
    --accent-l:  #EEF3FB;
    --accent2:   #1A3A5C;
    --radius-sm: 6px;
    --red:       #E53E3E;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #EEEDEA;
  }
  .logo-label {
    font-size: .78rem;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: .01em;
  }
  .sidebar-patient {
    margin-top: 6px;
    background: var(--accent-l);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: .78rem;
    color: var(--accent2);
    font-weight: 600;
  }

  .nav { flex: 1; padding: 8px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    font-size: .83rem;
    color: var(--text2);
    cursor: pointer;
    transition: all .12s;
    font-weight: 500;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    position: relative;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-l); color: var(--accent2); font-weight: 700; }
  .nav-item .icon {
    font-size: 1rem;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .nav-section {
    font-size: .63rem;
    font-weight: 700;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 16px 10px 4px;
  }

  /* ── Label colonne ── */
  .col-label {
    font-size: 11px;
    color: #888;
    text-align: center;
    margin-bottom: 8px;
    font-family: system-ui;
  }

  /* ── SVGs inline ── */
  .epaule-icon { width: 16px; height: 16px; }
  .hanche-icon { width: 15px; height: 16px; }

</style>
</head>
