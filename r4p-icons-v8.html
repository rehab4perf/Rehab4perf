<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>rehab⁴perf — Icônes v8</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@1,600&family=Poppins:wght@800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A3A5C;--accent:#2B5FA6;--green:#2D6A4F;--orange:#D4600A;--border:#E8E6E1;--bg:#F5F7FA;--surface:#fff;--muted:#9D9B96}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--navy)}
.hdr{background:var(--navy);padding:14px 28px;display:flex;align-items:center;gap:12px}
.hdr-logo{display:inline-flex;align-items:center;gap:8px}
.hdr-logo .r{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:20px;color:#fff}
.hdr-logo .e{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:.44em;vertical-align:super;color:#7FA8D9;margin:0 .04em}
.hdr-logo .p{font-family:'Poppins',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:-.025em}
.badge{background:rgba(255,165,0,.25);border:1px solid rgba(255,165,0,.5);color:#FFD580;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:20px;padding:3px 10px}
.hdr-note{color:rgba(255,255,255,.4);font-size:.62rem;margin-left:auto;font-weight:600;letter-spacing:.06em}
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-label{font-size:.63rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.btn{padding:4px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:#6B6860;font-size:.74rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700}
.sep{width:1px;height:22px;background:var(--border)}
.main{padding:24px 28px;max-width:1100px}
.cat{margin-bottom:40px}
.cat-hdr{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding-bottom:9px;border-bottom:2px solid var(--border);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:16px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative}
.card:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(43,95,166,.08)}
.card.sel{border-color:var(--accent);background:#EEF3FB}
.icon-bg{width:68px;height:68px;border-radius:14px;background:#EEF3FB;display:flex;align-items:center;justify-content:center}
.icon-bg-dark{background:var(--navy)}
.card-name{font-size:.75rem;font-weight:700;color:var(--navy);text-align:center}
.card-ctx{font-size:.58rem;color:var(--muted);text-align:center;line-height:1.4}
.sizes{display:flex;align-items:flex-end;gap:8px;padding-top:7px;border-top:1px solid var(--border);width:100%}
.sz{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.sz-lbl{font-size:.52rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600}
.chip{position:absolute;top:7px;right:7px;font-size:.52rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.chip-fill{background:#EEF3FB;color:#2B5FA6}
.chip-stroke{background:#EDF6F0;color:#2D6A4F}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <svg viewBox="8 34 164 104" width="24" height="16"><g stroke="#4A90D9" stroke-width="17" stroke-linecap="round" fill="none"><line x1="20" y1="118" x2="56" y2="104"/><line x1="70" y1="122" x2="100" y2="84"/><line x1="112" y1="125" x2="134" y2="66"/><line x1="158" y1="128" x2="158" y2="46"/></g></svg>
    <span><span class="r">rehab<span class="e">4</span></span><span class="p">perf</span></span>
  </div>
  <div class="badge">Icônes bilan v8</div>
  <div class="hdr-note">6 icônes · fill + stroke · références approuvées</div>
</div>

<div class="controls">
  <span class="ctrl-label">Couleur</span>
  <button class="btn on" onclick="setC('navy',this)">Navy</button>
  <button class="btn" onclick="setC('accent',this)">Accent</button>
  <button class="btn" onclick="setC('green',this)">Vert</button>
  <button class="btn" onclick="setC('orange',this)">Orange</button>
  <div class="sep"></div>
  <span class="ctrl-label">Fond aperçu</span>
  <button class="btn on" onclick="setBg('light',this)">Clair</button>
  <button class="btn" onclick="setBg('dark',this)">Sombre</button>
  <div class="sep"></div>
  <span class="ctrl-label">Taille aperçu</span>
  <button class="btn" onclick="setPrev(36,this)">S</button>
  <button class="btn on" onclick="setPrev(48,this)">M</button>
  <button class="btn" onclick="setPrev(64,this)">L</button>
  <button class="btn" onclick="setPrev(80,this)">XL</button>
</div>

<div class="main" id="main"></div>

<script>
var COLOR = '#1A3A5C', PREV = 48, BG = 'light';
var COLORS = {navy:'#1A3A5C', accent:'#2B5FA6', green:'#2D6A4F', orange:'#D4600A'};

var ICONS = [{ cat: 'Bilan clinique — Articulations', items: [

  {
    name: 'Épaule',
    style: 'fill',
    ctx: 'Vue postérieure · clavicule + omoplate + humérus',
    page: 'page-epaule',
    vb: '0 0 48 48',
    svg: `
      <rect x="2" y="2" width="44" height="8" rx="4"/>
      <path d="M4 8 L30 8 C34 8 38 12 36 18 C34 24 28 32 18 38 C12 42 6 44 4 44 Z"/>
      <rect x="36" y="14" width="10" height="32" rx="5"/>
    `
  },

  {
    name: 'Hanche',
    style: 'fill',
    ctx: 'Vue antérieure · vertèbres + bassin + 2 têtes fémorales',
    page: 'page-hanche',
    vb: '0 0 48 48',
    svg: `
      <rect x="17" y="1" width="14" height="4" rx="2"/>
      <rect x="16" y="6" width="16" height="4" rx="2"/>
      <rect x="17" y="11" width="14" height="4" rx="2"/>
      <path fill-rule="evenodd" clip-rule="evenodd" d="
        M2 24 C2 13 11 7 24 7 C37 7 46 13 46 24 C46 32 42 37 34 39 L34 48 L28 48 L28 41 L20 41 L20 48 L14 48 L14 39 C6 37 2 32 2 24 Z
        M12 19 C9 19 6 22 6 25 C6 28 9 31 12 31 C15 31 18 28 18 25 C18 22 15 19 12 19 Z
        M36 19 C33 19 30 22 30 25 C30 28 33 31 36 31 C39 31 42 28 42 25 C42 22 39 19 36 19 Z
      "/>
    `
  },

  {
    name: 'Genou',
    style: 'fill',
    ctx: 'Vue latérale · fémur diagonal + rotule + tibia/fibula',
    page: 'page-genou',
    vb: '0 0 48 48',
    svg: `
      <path d="M8 2 C13 2 17 5 16 9 L19 18 C22 22 28 25 30 31 C32 37 29 43 23 45 C17 47 11 43 11 37 C9 31 13 25 11 19 L5 10 C3 6 3 2 8 2 Z"/>
      <ellipse cx="35" cy="29" rx="5" ry="7"/>
      <path d="M13 45 L21 45 L19 48 L11 48 Z"/>
      <rect x="23" y="43" width="5" height="5" rx="2.5"/>
    `
  },

  {
    name: 'Rachis',
    style: 'stroke',
    ctx: 'Vue latérale · 3 corps vertébraux + processus épineux',
    page: 'page-rachis',
    vb: '0 0 48 48',
    svg: `
      <rect x="5" y="3" width="22" height="11" rx="3" fill="none" stroke="COLOR" stroke-width="2.2"/>
      <rect x="5" y="18" width="22" height="11" rx="3" fill="none" stroke="COLOR" stroke-width="2.2"/>
      <rect x="5" y="33" width="22" height="11" rx="3" fill="none" stroke="COLOR" stroke-width="2.2"/>
      <path d="M27 6 L41 8.5 L27 11" fill="none" stroke="COLOR" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M27 21 L41 23.5 L27 26" fill="none" stroke="COLOR" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M27 36 L41 38.5 L27 41" fill="none" stroke="COLOR" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    `
  },

  {
    name: 'LMA',
    style: 'stroke',
    ctx: 'Fuseau musculaire · lignes de fibres parallèles',
    page: 'page-lma',
    vb: '0 0 48 48',
    svg: `
      <path d="M4 24 C4 24 10 8 24 8 C38 8 44 24 44 24 C44 24 38 40 24 40 C10 40 4 24 4 24 Z" fill="none" stroke="COLOR" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 13 C15 18 15 30 14 35" fill="none" stroke="COLOR" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M20 10 C21 15 21 33 20 38" fill="none" stroke="COLOR" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M28 10 C29 15 29 33 28 38" fill="none" stroke="COLOR" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M34 13 C35 18 35 30 34 35" fill="none" stroke="COLOR" stroke-width="1.8" stroke-linecap="round"/>
    `
  },

  {
    name: 'Pied / Cheville',
    style: 'stroke',
    ctx: 'Vue latérale squelettique · tibia + tarsiens + métatarses',
    page: 'page-pied',
    vb: '0 0 48 48',
    svg: `
      <line x1="17" y1="2" x2="15" y2="15" stroke="COLOR" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="22" y1="2" x2="24" y2="15" stroke="COLOR" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M11 15 C7 15 4 18 4 22 C4 26 7 29 11 29 L29 29 C33 29 37 26 37 22 C37 18 34 15 30 15 Z" fill="none" stroke="COLOR" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M7 29 L35 29 L33 39 L9 39 Z" fill="none" stroke="COLOR" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="9" y1="39" x2="5" y2="47" stroke="COLOR" stroke-width="2" stroke-linecap="round"/>
      <line x1="14" y1="39" x2="11" y2="47" stroke="COLOR" stroke-width="2" stroke-linecap="round"/>
      <line x1="19" y1="39" x2="18" y2="47" stroke="COLOR" stroke-width="2" stroke-linecap="round"/>
      <line x1="25" y1="39" x2="26" y2="47" stroke="COLOR" stroke-width="2" stroke-linecap="round"/>
      <line x1="30" y1="39" x2="34" y2="47" stroke="COLOR" stroke-width="2" stroke-linecap="round"/>
    `
  }

]}];

function mkSvg(icon, size) {
  var c = icon.svg.replace(/COLOR/g, COLOR);
  var fill = icon.style === 'fill' ? 'fill="'+COLOR+'"' : 'fill="none"';
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="'+(icon.vb||'0 0 48 48')+'" width="'+size+'" height="'+size+'" '+fill+' style="flex-shrink:0">'+c+'</svg>';
}

function render() {
  var bgClass = BG === 'dark' ? 'icon-bg-dark' : 'icon-bg';
  var html = '';
  ICONS.forEach(function(sec) {
    html += '<div class="cat"><div class="cat-hdr">'+sec.cat+'</div><div class="grid">';
    sec.items.forEach(function(icon) {
      var cc = icon.style === 'fill' ? 'chip-fill' : 'chip-stroke';
      html += '<div class="card" onclick="this.classList.toggle(\'sel\')">'
        +'<div class="chip '+cc+'">'+icon.style+'</div>'
        +'<div class="'+bgClass+'">'+mkSvg(icon, PREV)+'</div>'
        +'<div class="card-name">'+icon.name+'</div>'
        +'<div class="card-ctx">'+icon.ctx+'</div>'
        +'<div class="sizes">'
        +'<div class="sz"><div style="height:28px;display:flex;align-items:center">'+mkSvg(icon,20)+'</div><div class="sz-lbl">20px</div></div>'
        +'<div class="sz"><div style="height:36px;display:flex;align-items:center">'+mkSvg(icon,28)+'</div><div class="sz-lbl">28px</div></div>'
        +'<div class="sz"><div style="height:44px;display:flex;align-items:center">'+mkSvg(icon,36)+'</div><div class="sz-lbl">36px</div></div>'
        +'</div></div>';
    });
    html += '</div></div>';
  });
  document.getElementById('main').innerHTML = html;
}

function setC(k,btn){
  document.querySelectorAll('.btn').forEach(function(b){if(['Navy','Accent','Vert','Orange'].includes(b.textContent))b.classList.remove('on');});
  btn.classList.add('on'); COLOR=COLORS[k]; render();
}
function setBg(v,btn){
  document.querySelectorAll('.btn').forEach(function(b){if(['Clair','Sombre'].includes(b.textContent))b.classList.remove('on');});
  btn.classList.add('on'); BG=v; render();
}
function setPrev(v,btn){
  document.querySelectorAll('.btn').forEach(function(b){if(['S','M','L','XL'].includes(b.textContent))b.classList.remove('on');});
  btn.classList.add('on'); PREV=v; render();
}
render();
</script>
</body>
</html>
