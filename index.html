<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Rehab4Perf</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#1A3A5C; }
.topnav {
  height:48px; background:#1A3A5C;
  display:flex; align-items:center; padding:0 18px; gap:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.3); flex-shrink:0;
}
.logo { font-family:Georgia,serif; font-style:italic; font-size:1.05rem; margin-right:20px; flex-shrink:0; user-select:none; }
.logo .r { color:#4A90D9; }
.logo .n { color:#fff; font-weight:900; font-style:normal; }
.logo .p { color:#E74C3C; }
.tab {
  display:flex; align-items:center; gap:6px; padding:0 16px; height:100%;
  color:rgba(255,255,255,.55); font-size:.84rem; font-weight:500;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  cursor:pointer; border:none; background:none;
  border-bottom:3px solid transparent; white-space:nowrap;
  transition:color .15s, border-color .15s;
}
.tab:hover { color:rgba(255,255,255,.85); }
.tab.active { color:#fff; border-bottom-color:#4A90D9; background:rgba(255,255,255,.05); }
.topnav-right {
  margin-left:auto; font-size:.68rem; color:rgba(255,255,255,.35);
  font-family:-apple-system,'Helvetica Neue',sans-serif; line-height:1.5; text-align:right;
}
.frame-wrap { position:fixed; top:48px; left:0; right:0; bottom:0; }
iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; display:none; background:#fff; }
iframe.active { display:block; }
@media (max-width:600px) {
  .topnav { padding:0 10px; } .tab { padding:0 10px; font-size:.78rem; }
  .logo { margin-right:10px; font-size:.92rem; } .topnav-right { display:none; }
}
/* Auth gate */
#authGate {
  position:fixed; inset:0; background:#1A3A5C; z-index:9999;
  display:flex; align-items:center; justify-content:center;
}
.gate-card {
  background:#fff; border-radius:14px; padding:36px 32px;
  max-width:380px; width:90%; text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.gate-logo { font-family:Georgia,serif; font-style:italic; font-size:1.6rem; margin-bottom:4px; }
.gate-logo .r { color:#4A90D9; }
.gate-logo .n { color:#1A3A5C; font-weight:900; font-style:normal; }
.gate-logo .p { color:#E74C3C; }
.gate-sub { font-size:.8rem; color:#6b7a8d; margin-bottom:22px; }
.gate-field {
  width:100%; padding:10px 12px; border:1px solid #dde3ec; border-radius:7px;
  font-size:.88rem; color:#1a2433; outline:none; margin-bottom:10px;
  font-family:inherit;
}
.gate-field:focus { border-color:#4A90D9; }
.gate-btn {
  width:100%; padding:11px; background:#2B5FA6; color:#fff; border:none;
  border-radius:7px; font-size:.9rem; font-weight:600; cursor:pointer;
  font-family:inherit; transition:background .15s; margin-top:2px;
}
.gate-btn:hover { background:#1A3A5C; }
.gate-btn:disabled { opacity:.6; cursor:not-allowed; }
.gate-error { font-size:.78rem; color:#E74C3C; margin-top:8px; min-height:18px; }
.gate-note { font-size:.7rem; color:#aab; margin-top:14px; line-height:1.5; }
</style>
</head>
<body>
<!-- Auth Gate -->
<div id="authGate">
  <div class="gate-card">
    <div class="gate-logo"><span class="r">Rehab</span><span class="n">4</span><span class="p">Perf</span></div>
    <p class="gate-sub">Votre espace kiné personnel</p>
    <input class="gate-field" id="gateEmail" type="email" placeholder="Adresse email" autocomplete="email">
    <input class="gate-field" id="gatePassword" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="gate-btn" id="gateBtn" onclick="doLogin()">Se connecter</button>
    <div class="gate-error" id="gateError"></div>
    <p class="gate-note">Accès sur invitation uniquement<br>Contactez Antoine PERONNAUD</p>
  </div>
</div>

<div class="topnav">
  <div class="logo">
    <span class="r">Rehab</span><span class="n">4</span><span class="p">Perf</span>
  </div>
  <button class="tab active" id="tab-bilan" onclick="show('bilan')">Bilan clinique</button>
  <button class="tab" id="tab-outils" onclick="show('outils')">Outils</button>
  <button class="tab" id="tab-prescription" onclick="show('prescription')">Prescription</button>
  <div class="topnav-right" id="userDisplay" style="cursor:pointer;" onclick="show('account')" title="Mon compte">—<br>—</div>
</div>
<div class="frame-wrap">
  <iframe id="frame-bilan"  src="bilan.html"  class="active"></iframe>
  <iframe id="frame-outils" src="outils.html"></iframe>
  <iframe id="frame-prescription" src="prescription.html"></iframe>
  <iframe id="frame-account" src="account.html"></iframe>
</div>
<script>
var IDENTITY_URL = 'https://rehab4perf.netlify.app/.netlify/identity';
var _token = null;
var _user  = null;

/* ── TAB SWITCHER ── */
function show(id) {
  var tabs = document.querySelectorAll('.tab');
  var frames = document.querySelectorAll('iframe');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  for(var i=0;i<frames.length;i++) frames[i].classList.remove('active');
  var tab = document.getElementById('tab-'+id);
  if(tab) tab.classList.add('active');
  document.getElementById('frame-'+id).classList.add('active');
}

/* ── LOGIN ── */
document.getElementById('gatePassword').addEventListener('keydown', function(e){
  if(e.key==='Enter') doLogin();
});
document.getElementById('gateEmail').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('gatePassword').focus();
});

function doLogin(){
  var email    = document.getElementById('gateEmail').value.trim();
  var password = document.getElementById('gatePassword').value;
  var btn      = document.getElementById('gateBtn');
  var errEl    = document.getElementById('gateError');
  if(!email || !password){ errEl.textContent = 'Veuillez remplir email et mot de passe.'; return; }
  btn.disabled = true; btn.textContent = 'Connexion…'; errEl.textContent = '';
  fetch(IDENTITY_URL+'/token', {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'grant_type=password&username='+encodeURIComponent(email)+'&password='+encodeURIComponent(password)
  })
  .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,data:d}; }); })
  .then(function(res){
    if(!res.ok) throw new Error(res.data.error_description || 'Identifiants incorrects.');
    _token = res.data.access_token;
    return fetch(IDENTITY_URL+'/user', { headers:{'Authorization':'Bearer '+_token} });
  })
  .then(function(r){ return r.json(); })
  .then(function(user){
    _user = user;
    document.getElementById('authGate').style.display = 'none';
    updateUserDisplay(user);
    // Pass token to account iframe
    var af = document.getElementById('frame-account');
    af.contentWindow.postMessage({type:'r4p-token',token:_token,user:user},'*');
  })
  .catch(function(err){
    errEl.textContent = err.message || 'Erreur de connexion.';
    btn.disabled = false; btn.textContent = 'Se connecter';
  });
}

function updateUserDisplay(user){
  var el = document.getElementById('userDisplay');
  if(!user){ el.innerHTML = '—<br>—'; return; }
  var meta = (user.user_metadata||{});
  var prenom = meta.prenom||''; var nom = meta.nom||'';
  var fullName = (prenom+' '+nom).trim() || user.email.split('@')[0];
  var cabinet = meta.cabinet||'';
  el.style.color = 'rgba(255,255,255,.85)';
  el.innerHTML = fullName+'<br>'+(cabinet||'Mon compte');
}

// Listen for messages from account page
window.addEventListener('message', function(e){
  if(e.data && e.data.type==='r4p-profile-updated'){
    updateUserDisplay(e.data.user);
  }
  if(e.data && e.data.type==='r4p-logout'){
    _token=null; _user=null;
    updateUserDisplay(null);
    document.getElementById('gateEmail').value='';
    document.getElementById('gatePassword').value='';
    document.getElementById('gateError').textContent='';
    document.getElementById('gateBtn').disabled=false;
    document.getElementById('gateBtn').textContent='Se connecter';
    document.getElementById('authGate').style.display='flex';
    show('bilan');
  }
});
</script>
</body>
</html>
