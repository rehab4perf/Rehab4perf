<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Rehab4Perf</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#1A3A5C; }
.topnav {
  height:48px; background:#1A3A5C;
  display:flex; align-items:center; padding:0 18px; gap:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.3); flex-shrink:0;
}
.logo { font-family:Georgia,serif; font-style:italic; font-size:1.05rem; margin-right:20px; flex-shrink:0; user-select:none; }
.logo .r { color:#4A90D9; }
.logo .n { color:#fff; font-weight:900; font-style:normal; }
.logo .p { color:#E74C3C; }
.tab {
  display:flex; align-items:center; gap:6px; padding:0 16px; height:100%;
  color:rgba(255,255,255,.55); font-size:.84rem; font-weight:500;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  cursor:pointer; border:none; background:none;
  border-bottom:3px solid transparent; white-space:nowrap;
  transition:color .15s, border-color .15s;
}
.tab:hover { color:rgba(255,255,255,.85); }
.tab.active { color:#fff; border-bottom-color:#4A90D9; background:rgba(255,255,255,.05); }
.topnav-right {
  margin-left:auto; font-size:.68rem; color:rgba(255,255,255,.35);
  font-family:-apple-system,'Helvetica Neue',sans-serif; line-height:1.5; text-align:right;
}
.frame-wrap { position:fixed; top:48px; left:0; right:0; bottom:0; }
iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; display:none; background:#fff; }
iframe.active { display:block; }
@media (max-width:600px) {
  .topnav { padding:0 10px; } .tab { padding:0 10px; font-size:.78rem; }
  .logo { margin-right:10px; font-size:.92rem; } .topnav-right { display:none; }
}
/* Set password gate */
#setPasswordGate {
  position:fixed; inset:0; background:#1A3A5C; z-index:9999;
  display:none; align-items:center; justify-content:center;
}
/* Auth gate */
#authGate {
  position:fixed; inset:0; background:#1A3A5C; z-index:9999;
  display:flex; align-items:center; justify-content:center;
}
.gate-card {
  background:#fff; border-radius:14px; padding:36px 32px;
  max-width:380px; width:90%; text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.gate-logo { font-family:Georgia,serif; font-style:italic; font-size:1.6rem; margin-bottom:4px; }
.gate-logo .r { color:#4A90D9; }
.gate-logo .n { color:#1A3A5C; font-weight:900; font-style:normal; }
.gate-logo .p { color:#E74C3C; }
.gate-sub { font-size:.8rem; color:#6b7a8d; margin-bottom:22px; }
.gate-field {
  width:100%; padding:10px 12px; border:1px solid #dde3ec; border-radius:7px;
  font-size:.88rem; color:#1a2433; outline:none; margin-bottom:10px;
  font-family:inherit;
}
.gate-field:focus { border-color:#4A90D9; }
.gate-btn {
  width:100%; padding:11px; background:#2B5FA6; color:#fff; border:none;
  border-radius:7px; font-size:.9rem; font-weight:600; cursor:pointer;
  font-family:inherit; transition:background .15s; margin-top:2px;
}
.gate-btn:hover { background:#1A3A5C; }
.gate-btn:disabled { opacity:.6; cursor:not-allowed; }
.gate-error { font-size:.78rem; color:#E74C3C; margin-top:8px; min-height:18px; }
.gate-note { font-size:.7rem; color:#aab; margin-top:14px; line-height:1.5; }
</style>
</head>
<body>
<!-- Set Password Gate (invite + recovery) -->
<div id="setPasswordGate">
  <div class="gate-card">
    <div class="gate-logo"><span class="r">Rehab</span><span class="n">4</span><span class="p">Perf</span></div>
    <p class="gate-sub" id="setPasswordTitle">Créez votre mot de passe</p>
    <input class="gate-field" id="spPassword" type="password" placeholder="Nouveau mot de passe" autocomplete="new-password">
    <input class="gate-field" id="spPassword2" type="password" placeholder="Confirmer le mot de passe" autocomplete="new-password">
    <button class="gate-btn" id="spBtn" onclick="doSetPassword()">Valider</button>
    <div class="gate-error" id="spError"></div>
  </div>
</div>

<!-- Auth Gate -->
<div id="authGate">
  <div class="gate-card">
    <div class="gate-logo"><span class="r">Rehab</span><span class="n">4</span><span class="p">Perf</span></div>
    <p class="gate-sub">Votre espace kiné personnel</p>
    <input class="gate-field" id="gateEmail" type="email" placeholder="Adresse email" autocomplete="email">
    <input class="gate-field" id="gatePassword" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="gate-btn" id="gateBtn" onclick="doLogin()">Se connecter</button>
    <div class="gate-error" id="gateError"></div>
    <p class="gate-note">Accès sur invitation uniquement<br>Contactez Antoine PERONNAUD</p>
  </div>
</div>

<div class="topnav">
  <div class="logo">
    <span class="r">Rehab</span><span class="n">4</span><span class="p">Perf</span>
  </div>
  <button class="tab active" id="tab-bilan" onclick="show('bilan')">Bilan clinique</button>
  <button class="tab" id="tab-outils" onclick="show('outils')">Outils</button>
  <button class="tab" id="tab-prescription" onclick="show('prescription')">Prescription</button>
  <div class="topnav-right" id="userDisplay" style="cursor:pointer;" onclick="show('account')" title="Mon compte">—<br>—</div>
</div>
<div class="frame-wrap">
  <iframe id="frame-bilan"  src="bilan.html"  class="active"></iframe>
  <iframe id="frame-outils" src="outils.html"></iframe>
  <iframe id="frame-prescription" src="prescription.html"></iframe>
  <iframe id="frame-account" src="account.html"></iframe>
</div>
<script>
var IDENTITY_URL = 'https://rehab4perf.netlify.app/.netlify/identity';
var _token = null;
var _user  = null;
var _inviteToken = null;
var _recoveryToken = null;

/* ── SESSION PERSISTENCE ── */
function saveSession(tokenData, user) {
  try {
    localStorage.setItem('r4p-refresh-token', tokenData.refresh_token || '');
    localStorage.setItem('r4p-access-token',  tokenData.access_token  || '');
    var expiresAt = Date.now() + ((tokenData.expires_in || 3600) - 60) * 1000;
    localStorage.setItem('r4p-token-expiry',  String(expiresAt));
    if(user) localStorage.setItem('r4p-session-user', JSON.stringify(user));
  } catch(e) {}
}
function clearSession() {
  ['r4p-refresh-token','r4p-access-token','r4p-token-expiry','r4p-session-user'].forEach(function(k){
    try { localStorage.removeItem(k); } catch(e) {}
  });
}
function restoreSession() {
  var refreshToken = localStorage.getItem('r4p-refresh-token');
  if(!refreshToken) { return; }
  var accessToken = localStorage.getItem('r4p-access-token');
  var expiry      = parseInt(localStorage.getItem('r4p-token-expiry') || '0');
  var cachedUser  = null;
  try { cachedUser = JSON.parse(localStorage.getItem('r4p-session-user') || 'null'); } catch(e) {}
  // If access token still valid, use it directly
  if(accessToken && Date.now() < expiry && cachedUser) {
    _token = accessToken;
    _user  = cachedUser;
    document.getElementById('authGate').style.display = 'none';
    updateUserDisplay(cachedUser);
    broadcastProfile(cachedUser);
    return;
  }
  // Try to refresh silently
  document.getElementById('gateBtn').disabled = true;
  document.getElementById('gateBtn').textContent = 'Reconnexion…';
  fetch(IDENTITY_URL + '/token', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'grant_type=refresh_token&refresh_token=' + encodeURIComponent(refreshToken)
  })
  .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
  .then(function(res){
    if(!res.ok) throw new Error('Session expirée');
    _token = res.data.access_token;
    return fetch(IDENTITY_URL + '/user', { headers: {'Authorization': 'Bearer ' + _token} });
  })
  .then(function(r){ return r.json(); })
  .then(function(user){
    _user = user;
    saveSession({access_token:_token, refresh_token:refreshToken, expires_in: 3600}, user);
    saveProfile(user);
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('gateBtn').disabled = false;
    document.getElementById('gateBtn').textContent = 'Se connecter';
    updateUserDisplay(user);
    broadcastProfile(user);
  })
  .catch(function(){
    clearSession();
    document.getElementById('gateBtn').disabled = false;
    document.getElementById('gateBtn').textContent = 'Se connecter';
    // authGate reste visible → reconnexion manuelle
  });
}

/* ── DETECT INVITE / RECOVERY TOKEN IN URL ── */
(function(){
  var hash = window.location.hash;
  var params = {};
  hash.replace(/^#/, '').split('&').forEach(function(p){
    var kv = p.split('='); params[kv[0]] = decodeURIComponent(kv[1]||'');
  });
  if(params.invite_token){
    _inviteToken = params.invite_token;
    document.getElementById('setPasswordTitle').textContent = 'Créez votre mot de passe';
    document.getElementById('setPasswordGate').style.display = 'flex';
    document.getElementById('authGate').style.display = 'none';
    history.replaceState(null,'',window.location.pathname);
  } else if(params.recovery_token){
    _recoveryToken = params.recovery_token;
    document.getElementById('setPasswordTitle').textContent = 'Réinitialisez votre mot de passe';
    document.getElementById('setPasswordGate').style.display = 'flex';
    document.getElementById('authGate').style.display = 'none';
    history.replaceState(null,'',window.location.pathname);
  }
})();

function doSetPassword(){
  var pw  = document.getElementById('spPassword').value;
  var pw2 = document.getElementById('spPassword2').value;
  var btn = document.getElementById('spBtn');
  var err = document.getElementById('spError');
  if(pw.length < 8){ err.textContent = 'Minimum 8 caractères.'; return; }
  if(pw !== pw2){ err.textContent = 'Les mots de passe ne correspondent pas.'; return; }
  btn.disabled = true; btn.textContent = 'Validation…'; err.textContent = '';
  var rawToken = _inviteToken || _recoveryToken;
  var isInvite = !!_inviteToken;

  var verifyType = isInvite ? 'signup' : 'recovery';
  fetch(IDENTITY_URL+'/verify', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:rawToken, type:verifyType, password:pw})
  })
  .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,data:d}; }); })
  .then(function(res){
    if(!res.ok) throw new Error(res.data.msg || res.data.error_description || 'Token invalide.');
    _inviteToken = null; _recoveryToken = null;
    document.getElementById('setPasswordGate').style.display = 'none';
    document.getElementById('authGate').style.display = 'flex';
    document.getElementById('spPassword').value = '';
    document.getElementById('spPassword2').value = '';
    btn.disabled = false; btn.textContent = 'Valider';
    if(res.data.email) document.getElementById('gateEmail').value = res.data.email;
    document.getElementById('gatePassword').focus();
  })
  .catch(function(e){
    err.textContent = e.message;
    btn.disabled = false; btn.textContent = 'Valider';
  });
}

/* ── TAB SWITCHER ── */
function show(id) {
  var tabs = document.querySelectorAll('.tab');
  var frames = document.querySelectorAll('iframe');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  for(var i=0;i<frames.length;i++) frames[i].classList.remove('active');
  var tab = document.getElementById('tab-'+id);
  if(tab) tab.classList.add('active');
  document.getElementById('frame-'+id).classList.add('active');
}

/* ── LOGIN ── */
document.getElementById('gatePassword').addEventListener('keydown', function(e){
  if(e.key==='Enter') doLogin();
});
document.getElementById('gateEmail').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('gatePassword').focus();
});

function doLogin(){
  var email    = document.getElementById('gateEmail').value.trim();
  var password = document.getElementById('gatePassword').value;
  var btn      = document.getElementById('gateBtn');
  var errEl    = document.getElementById('gateError');
  if(!email || !password){ errEl.textContent = 'Veuillez remplir email et mot de passe.'; return; }
  btn.disabled = true; btn.textContent = 'Connexion…'; errEl.textContent = '';
  fetch(IDENTITY_URL+'/token', {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'grant_type=password&username='+encodeURIComponent(email)+'&password='+encodeURIComponent(password)
  })
  .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,data:d}; }); })
  .then(function(res){
    if(!res.ok) throw new Error(res.data.error_description || 'Identifiants incorrects.');
    _token = res.data.access_token;
    var _tokenData = res.data;
    return fetch(IDENTITY_URL+'/user', { headers:{'Authorization':'Bearer '+_token} })
      .then(function(r){ return r.json().then(function(u){ return {user:u, tokenData:_tokenData}; }); });
  })
  .then(function(result){
    _user = result.user;
    saveSession(result.tokenData, result.user);
    saveProfile(result.user);
    document.getElementById('authGate').style.display = 'none';
    updateUserDisplay(result.user);
    broadcastProfile(result.user);
  })
  .catch(function(err){
    errEl.textContent = err.message || 'Erreur de connexion.';
    btn.disabled = false; btn.textContent = 'Se connecter';
  });
}

function updateUserDisplay(user){
  var el = document.getElementById('userDisplay');
  if(!user){ el.innerHTML = '—<br>—'; return; }
  var meta = (user.user_metadata||{});
  var prenom = meta.prenom||''; var nom = meta.nom||'';
  var fullName = (prenom+' '+nom).trim() || user.email.split('@')[0];
  var cabinet = meta.cabinet||'';
  el.style.color = 'rgba(255,255,255,.85)';
  el.innerHTML = fullName+'<br>'+(cabinet||'Mon compte');
}

function saveProfile(user){
  var meta = user.user_metadata || {};
  var profile = {
    prenom: meta.prenom || '',
    nom: meta.nom || '',
    am: meta.am || '',
    tel: meta.tel || '',
    cabinet: meta.cabinet || '',
    email: user.email || ''
  };
  try { localStorage.setItem('r4p-profile', JSON.stringify(profile)); } catch(e){}
}

function broadcastProfile(user){
  var meta = user.user_metadata || {};
  var profile = {
    prenom: meta.prenom || '',
    nom: meta.nom || '',
    am: meta.am || '',
    tel: meta.tel || '',
    cabinet: meta.cabinet || '',
    email: user.email || ''
  };
  // Send token + profile to account iframe
  var af = document.getElementById('frame-account');
  if(af && af.contentWindow) af.contentWindow.postMessage({type:'r4p-token',token:_token,user:user},'*');
  // Broadcast profile to all iframes
  document.querySelectorAll('iframe').forEach(function(fr){
    try { fr.contentWindow.postMessage({type:'r4p-profile',profile:profile},'*'); } catch(e){}
  });
}

// Listen for messages from account page
window.addEventListener('message', function(e){
  if(e.data && e.data.type==='r4p-profile-updated'){
    updateUserDisplay(e.data.user);
    saveProfile(e.data.user);
    broadcastProfile(e.data.user);
  }
  if(e.data && e.data.type==='r4p-logout'){
    _token=null; _user=null;
    clearSession();
    updateUserDisplay(null);
    document.getElementById('gateEmail').value='';
    document.getElementById('gatePassword').value='';
    document.getElementById('gateError').textContent='';
    document.getElementById('gateBtn').disabled=false;
    document.getElementById('gateBtn').textContent='Se connecter';
    document.getElementById('authGate').style.display='flex';
    show('bilan');
  }
});

// ── AUTO-RESTORE SESSION ON LOAD ──
restoreSession();
</script>
</body>
</html>
