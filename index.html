<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rehab4Perf</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="fonts/fonts.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Figtree', sans-serif; }
html, body { height:100%; overflow:hidden; background:#1A3A5C; }
.topnav {
  height:48px; background:#1A3A5C;
  display:flex; align-items:center; padding:0 18px; gap:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.3); flex-shrink:0;
}
.logo { display:inline-flex; align-items:center; gap:8px; margin-right:20px; flex-shrink:0; user-select:none; }
.logo svg { display:block; flex-shrink:0; }
.logo-w { display:inline-flex; align-items:baseline; line-height:1; white-space:nowrap; }
.logo-r { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:22px; color:#fff; letter-spacing:-.01em; }
.logo-e { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:.44em; vertical-align:super; color:#7FA8D9; margin:0 .05em 0 .01em; line-height:0; }
.logo-p { font-family:'Poppins',sans-serif; font-weight:800; font-size:18px; color:#fff; letter-spacing:-.025em; margin-left:.02em; }
.tab {
  display:flex; align-items:center; gap:6px; padding:0 16px; height:100%;
  color:rgba(255,255,255,.55); font-size:.84rem; font-weight:500;
  font-family:'Figtree',sans-serif;
  cursor:pointer; border:none; background:none;
  border-bottom:3px solid transparent; white-space:nowrap;
  transition:color .15s, border-color .15s;
}
.tab:hover { color:rgba(255,255,255,.85); }
.tab.active { color:#fff; border-bottom-color:#4A90D9; background:rgba(255,255,255,.05); }
.topnav-right {
  font-size:.72rem; font-weight:500; line-height:1.4;
  text-align:right; white-space:nowrap; color:rgba(255,255,255,.75);
  cursor:pointer; font-family:'Figtree',sans-serif;
  transition:color .15s;
}
.topnav-right:hover { color:#fff; }
.frame-wrap { position:fixed; top:48px; left:0; right:0; bottom:0; }
iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; display:none; background:#fff; }
iframe.active { display:block; }

/* ── Patient selector button ─────────────────────────────── */
.patient-btn {
  margin-left:auto;
  display:flex; align-items:center; gap:6px;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  border-radius:6px; padding:5px 11px; cursor:pointer;
  font-family:'Figtree',sans-serif;
  font-size:.78rem; font-weight:500; color:rgba(255,255,255,.85);
  white-space:nowrap; transition:background .15s, border-color .15s;
  max-width:180px; overflow:hidden;
}
.patient-btn:hover { background:rgba(255,255,255,.18); border-color:rgba(255,255,255,.35); }
.patient-btn.has-patient { background:rgba(74,144,217,.25); border-color:rgba(74,144,217,.5); color:#fff; }
.patient-btn-label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ── Patient modal ───────────────────────────────────────── */
.pm-overlay {
  display:none; position:fixed; inset:0; z-index:9999;
  background:rgba(0,0,0,.5); backdrop-filter:blur(2px);
  align-items:flex-start; justify-content:center;
  padding-top:52px;
}
.pm-overlay.open { display:flex; }
.pm-card {
  background:#fff; border-radius:14px;
  box-shadow:0 12px 48px rgba(0,0,0,.28);
  width:calc(100% - 24px); max-width:560px; min-height:340px; max-height:calc(100vh - 72px);
  display:flex; flex-direction:column; overflow:hidden;
  font-family:'Figtree',sans-serif;
}
.pm-header {
  background:#1A3A5C; color:#fff;
  padding:16px 20px; display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.pm-header h2 { font-size:1rem; font-weight:700; flex:1; }
.pm-close {
  background:none; border:none; color:rgba(255,255,255,.7);
  font-size:1.3rem; cursor:pointer; padding:0 2px; line-height:1;
  transition:color .12s;
}
.pm-close:hover { color:#fff; }
.pm-search-row {
  padding:12px 16px; border-bottom:1px solid #E8E6E1; flex-shrink:0;
  display:flex; gap:8px; align-items:center;
}
.pm-search {
  flex:1; border:1.5px solid #D3D1CB; border-radius:8px;
  padding:9px 13px; font-size:.95rem; font-family:inherit; outline:none;
  min-height:44px;
}
.pm-search:focus { border-color:#2B5FA6; box-shadow:0 0 0 3px rgba(43,95,166,.1); }
.pm-new-btn {
  background:#1A3A5C; color:#fff; border:none; border-radius:8px;
  padding:9px 16px; font-size:.82rem; font-weight:600; cursor:pointer;
  font-family:inherit; white-space:nowrap; transition:background .12s;
  min-height:44px;
}
.pm-new-btn:hover { background:#2B5FA6; }
.pm-body { flex:1; overflow-y:auto; min-height:80px; }
.pm-empty {
  padding:32px 20px; text-align:center;
  color:#9D9B96; font-size:.88rem; font-style:italic;
}
.pm-patient-item {
  display:flex; align-items:center; gap:12px;
  padding:13px 20px; border-bottom:1px solid #F1F0ED;
  transition:background .1s; cursor:pointer;
}
.pm-patient-item:hover { background:#F7F6F3; }
.pm-patient-item.selected { background:#EEF3FB; }
.pm-patient-avatar {
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  background:#1A3A5C; color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:.8rem; font-weight:700;
}
.pm-patient-avatar.female { background:#8B5C8B; }
.pm-patient-info { flex:1; min-width:0; }
.pm-patient-name { font-size:.92rem; font-weight:700; color:#1A1917; }
.pm-patient-meta { font-size:.79rem; color:#6B6860; margin-top:1px; }
.pm-patient-actions { display:flex; gap:6px; flex-shrink:0; }
.pm-select-btn {
  background:#1A3A5C; color:#fff; border:none; border-radius:7px;
  padding:7px 13px; font-size:.78rem; font-weight:600; cursor:pointer;
  font-family:inherit; transition:background .12s; min-height:36px;
}
.pm-select-btn:hover { background:#2B5FA6; }
.pm-select-btn.active { background:#2D6A4F; }
.pm-del-btn {
  background:none; border:1.5px solid #E8E6E1; border-radius:5px;
  color:#C0392B; padding:5px 8px; font-size:.78rem; cursor:pointer;
  transition:all .12s;
}
.pm-del-btn:hover { background:#FDECEA; border-color:#C0392B; }

/* ── Create form ─────────────────────────────────────────── */
.pm-create-form {
  display:none; padding:18px 20px; border-bottom:2px solid #E8E6E1;
  background:#F7F6F3; flex-shrink:0;
}
.pm-create-form.open { display:block; }
.pm-create-form h3 { font-size:.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#1A3A5C; margin-bottom:14px; }
.pm-form-row { display:flex; gap:10px; margin-bottom:10px; }
.pm-form-field { display:flex; flex-direction:column; gap:4px; flex:1; }
.pm-form-field label { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#6B6860; }
.pm-form-field input, .pm-form-field select {
  border:1.5px solid #D3D1CB; border-radius:8px;
  padding:9px 12px; font-size:.95rem; font-family:inherit; outline:none;
  background:#fff; height:46px; box-sizing:border-box;
  transition:border-color .12s, box-shadow .12s;
}
.pm-form-field input:focus, .pm-form-field select:focus {
  border-color:#2B5FA6; box-shadow:0 0 0 3px rgba(43,95,166,.1);
}
/* Champ date bascule */
.pm-date-wrap { display:flex; align-items:stretch; gap:6px; }
.pm-date-wrap input { flex:1; min-width:0; }
.pm-date-toggle-btn {
  flex-shrink:0; width:38px; height:46px; box-sizing:border-box;
  border:1.5px solid #D3D1CB; border-radius:8px; background:#fff;
  font-size:1rem; cursor:pointer; display:flex; align-items:center;
  justify-content:center; color:#6B6860; transition:border-color .12s, color .12s;
}
.pm-date-toggle-btn:hover { border-color:#2B5FA6; color:#2B5FA6; }
.pm-form-actions { display:flex; gap:10px; margin-top:14px; }
.pm-save-btn {
  flex:1; background:#2D6A4F; color:#fff; border:none; border-radius:8px;
  padding:10px 16px; font-size:.88rem; font-weight:600; cursor:pointer;
  font-family:inherit; transition:background .12s; min-height:44px;
}
.pm-save-btn:hover { background:#1A5C3A; }
.pm-cancel-btn {
  background:none; border:1.5px solid #D3D1CB; border-radius:8px;
  padding:10px 16px; font-size:.88rem; color:#6B6860; cursor:pointer;
  font-family:inherit; transition:all .12s; min-height:44px;
}
.pm-cancel-btn:hover { border-color:#9D9B96; color:#1A1917; }

/* ── Context menu ──────────────────────────────────────── */
.pm-ctx-wrap { flex-shrink:0; }
.pm-ctx-btn {
  background:none; border:1.5px solid #E8E6E1; border-radius:5px;
  color:#6B6860; padding:4px 10px; font-size:.9rem; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all .12s;
  letter-spacing:.08em; line-height:1;
}
.pm-ctx-btn:hover { background:#F7F6F3; border-color:#9D9B96; color:#1A1917; }
/* Menu global fixe — positionné par JS, jamais clipé par overflow */
.pm-ctx-menu {
  background:#fff; border-radius:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.07);
  min-width:160px; overflow:hidden;
  font-family:'Figtree',sans-serif;
}
.pm-ctx-item {
  display:flex; align-items:center; gap:8px;
  padding:9px 14px; font-size:.82rem; cursor:pointer;
  color:#1A1917; transition:background .1s;
  border:none; background:none; width:100%; text-align:left;
  font-family:inherit;
}
.pm-ctx-item:hover { background:#F7F6F3; }
.pm-ctx-item.active-item { color:#2D6A4F; font-weight:700; }
.pm-ctx-item.delete-item { color:#C0392B; }
.pm-ctx-item.delete-item:hover { background:#FDECEA; }
.pm-ctx-divider { height:1px; background:#E8E6E1; margin:2px 0; }

/* ── Edit form ──────────────────────────────────────────── */
.pm-edit-form {
  display:none; padding:18px 20px; border-bottom:2px solid #2B5FA6;
  background:#EEF3FB; flex-shrink:0;
}
.pm-edit-form.open { display:block; }
.pm-edit-form h3 { font-size:.78rem; font-weight:700; text-transform:uppercase;
  letter-spacing:.06em; color:#2B5FA6; margin-bottom:14px; }

@media (max-width:900px) {
  .topnav { padding:0 10px; gap:2px; }
  .tab { padding:0 10px; font-size:.8rem; }
  .logo { margin-right:10px; }
  .topnav-right { font-size:.68rem; }
}
@media (max-width:600px) {
  .topnav { padding:0 8px; } .tab { padding:0 8px; font-size:.75rem; }
  .logo { margin-right:6px; font-size:.92rem; } .topnav-right { display:none; }
  .patient-btn { max-width:120px; font-size:.7rem; padding:4px 6px; }
  .pm-overlay { padding-top:52px; }
  .pm-card { max-width:100%; border-radius:10px 10px 0 0; }
}

</style>
</head>
<body>
<div class="topnav">
  <div class="logo">
    <svg viewBox="8 34 164 104" width="30" height="19" aria-hidden="true"><g stroke="#4A90D9" stroke-width="17" stroke-linecap="round" fill="none"><line x1="20" y1="118" x2="56" y2="104"/><line x1="70" y1="122" x2="100" y2="84"/><line x1="112" y1="125" x2="134" y2="66"/><line x1="158" y1="128" x2="158" y2="46"/></g></svg>
    <span class="logo-w"><span class="logo-r">rehab<sup class="logo-e">4</sup></span><span class="logo-p">perf</span></span>
  </div>
  <button class="tab active" id="tab-bilan"        onclick="show('bilan')">Bilan clinique</button>
  <button class="tab"        id="tab-outils"       onclick="show('outils')">Outils</button>
  <button class="tab"        id="tab-prescription" onclick="show('prescription')">Programme</button>
  <button class="patient-btn" id="patientBtn" onclick="openPatientModal()" title="Sélectionner un patient">
    <span>👤</span><span class="patient-btn-label" id="patientBtnLabel">Aucun patient</span><span>▾</span>
  </button>
  <div class="topnav-right" id="userDisplay" onclick="show('account')" title="Mon compte" style="margin-left:12px;">Mon compte</div>
</div>

<!-- ── Modal patients ─────────────────────────────────────── -->
<div class="pm-overlay" id="pmOverlay" onclick="closePMOnBackdrop(event)">
  <div class="pm-card">
    <div class="pm-header">
      <h2>👤 Patients</h2>
      <button class="pm-close" onclick="closePatientModal()">✕</button>
    </div>

    <!-- Formulaire création (masqué par défaut) -->
    <div class="pm-create-form" id="pmCreateForm">
      <h3>Nouveau patient</h3>
      <div class="pm-form-row">
        <div class="pm-form-field" style="flex:0 0 90px">
          <label>Civilité</label>
          <select id="pm-civ"><option value="M.">M.</option><option value="Mme.">Mme.</option></select>
        </div>
        <div class="pm-form-field">
          <label>Nom</label>
          <input type="text" id="pm-nom" placeholder="NOM" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="pm-form-field">
          <label>Prénom</label>
          <input type="text" id="pm-prenom" placeholder="Prénom">
        </div>
      </div>
      <div class="pm-form-row">
        <div class="pm-form-field">
          <label>Date de naissance</label>
          <div class="pm-date-wrap">
            <input type="date" id="pm-ddn">
            <input type="text" id="pm-ddn-txt" placeholder="JJ/MM/AAAA" style="display:none" oninput="syncDateText('pm-ddn')">
            <button type="button" class="pm-date-toggle-btn" onclick="toggleDateMode('pm-ddn')" title="Saisir manuellement">✎</button>
          </div>
        </div>
        <div class="pm-form-field">
          <label>Sport / Activité</label>
          <input type="text" id="pm-sport" placeholder="ex: Football, Course…">
        </div>
      </div>
      <div class="pm-form-actions">
        <button class="pm-save-btn" onclick="createPatient()">✓ Créer</button>
        <button class="pm-cancel-btn" onclick="toggleCreateForm(false)">Annuler</button>
      </div>
    </div>

    <!-- Formulaire édition (masqué par défaut) -->
    <div class="pm-edit-form" id="pmEditForm">
      <h3>✏️ Modifier le patient</h3>
      <input type="hidden" id="pm-edit-id">
      <div class="pm-form-row">
        <div class="pm-form-field" style="flex:0 0 90px">
          <label>Civilité</label>
          <select id="pm-edit-civ"><option value="M.">M.</option><option value="Mme.">Mme.</option></select>
        </div>
        <div class="pm-form-field">
          <label>Nom</label>
          <input type="text" id="pm-edit-nom" placeholder="NOM" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="pm-form-field">
          <label>Prénom</label>
          <input type="text" id="pm-edit-prenom" placeholder="Prénom">
        </div>
      </div>
      <div class="pm-form-row">
        <div class="pm-form-field">
          <label>Date de naissance</label>
          <div class="pm-date-wrap">
            <input type="date" id="pm-edit-ddn">
            <input type="text" id="pm-edit-ddn-txt" placeholder="JJ/MM/AAAA" style="display:none" oninput="syncDateText('pm-edit-ddn')">
            <button type="button" class="pm-date-toggle-btn" onclick="toggleDateMode('pm-edit-ddn')" title="Saisir manuellement">✎</button>
          </div>
        </div>
        <div class="pm-form-field">
          <label>Sport / Activité</label>
          <input type="text" id="pm-edit-sport" placeholder="ex: Football, Course…">
        </div>
      </div>
      <div class="pm-form-actions">
        <button class="pm-save-btn" id="pmEditSaveBtn" onclick="saveEditPatient()">✓ Enregistrer</button>
        <button class="pm-cancel-btn" onclick="closeEditForm()">Annuler</button>
      </div>
    </div>

    <!-- Barre de recherche -->
    <div class="pm-search-row">
      <input class="pm-search" id="pmSearch" type="text" placeholder="Rechercher un patient…" oninput="filterPatients()">
      <button class="pm-new-btn" onclick="toggleCreateForm(true)">+ Nouveau</button>
    </div>

    <!-- Liste des patients -->
    <div class="pm-body" id="pmList">
      <div class="pm-empty">Chargement…</div>
    </div>
  </div>
</div>
<div class="frame-wrap">
  <iframe id="frame-bilan"        src="bilan.html"        class="active"></iframe>
  <iframe id="frame-outils"       src="outils.html"       ></iframe>
  <iframe id="frame-prescription" src="programme.html" ></iframe>
  <iframe id="frame-account"      src="account.html"      ></iframe>
</div>

<script>
/* ── Constantes localStorage ─────────────────────────────────────────
   Source unique de vérité pour toutes les clés de stockage local.
   Modifier ici = propagé partout dans ce fichier. ────────────────── */
var R4P_KEYS = {
  PATIENT        : 'r4p-current-patient',
  PROFILE        : 'r4p-profile',
  CACHED_PROFILE : 'r4p-cached-profile',
  SESSION        : 'r4p-session',
  SUPABASE_AUTH  : 'sb-sxdobjodxkwexaspepdm-auth-token',
  LAST_ACTIVITY  : 'r4p-last-activity'
};

var SUPA_URL = 'https://sxdobjodxkwexaspepdm.supabase.co';
var SUPA_KEY = 'sb_publishable_zEJrmQOnKyRm-Y_NyojaTA_ERrDx4pl';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);

/* ═══ TIMEOUT D'INACTIVITÉ — 8 heures ═══════════════════════════════
   Déconnecte automatiquement l'utilisateur après 8h sans interaction.
   Remplace le "Time-box user sessions" de Supabase Pro. ══════════ */
var R4P_TIMEOUT_MS = 8 * 60 * 60 * 1000; // 8h en millisecondes

function _touchActivity() {
  try { localStorage.setItem(R4P_KEYS.LAST_ACTIVITY, Date.now().toString()); } catch(e) {}
}

function _checkInactivity() {
  try {
    var last = parseInt(localStorage.getItem(R4P_KEYS.LAST_ACTIVITY) || '0');
    if (last > 0 && (Date.now() - last) > R4P_TIMEOUT_MS) {
      sb.auth.signOut().then(function() {
        try {
          [R4P_KEYS.CACHED_PROFILE, R4P_KEYS.PROFILE, R4P_KEYS.PATIENT,
           R4P_KEYS.BILAN_DRAFT, R4P_KEYS.LAST_ACTIVITY].forEach(function(k) {
            localStorage.removeItem(k);
          });
        } catch(ex) {}
        window.location.replace('auth.html');
      });
    }
  } catch(e) {}
}

// Enregistrer l'activité sur tout événement utilisateur
['click', 'keydown', 'touchstart', 'mousemove'].forEach(function(evt) {
  document.addEventListener(evt, _touchActivity, { passive: true });
});

// Vérifier l'inactivité toutes les 60 secondes
setInterval(_checkInactivity, 60 * 1000);

/* ═══ REDIRECT TOKENS SUPABASE (invite / recovery)
   Supabase redirige vers la racine avec un hash :
   https://rehab4perf.netlify.app/#access_token=...&type=invite
   On détecte et redirige vers auth.html qui affiche le bon formulaire. */
(function() {
  var h = window.location.hash || '';
  var type = null;
  h.replace(/^#/, '').split('&').forEach(function(p) {
    var i = p.indexOf('=');
    if (i > 0 && p.slice(0, i) === 'type') type = decodeURIComponent(p.slice(i + 1));
  });
  if (type === 'invite' || type === 'recovery') {
    window.location.replace('auth.html' + h);
    return;
  }
})();

/* ═══ NAVIGATION ═══ */
function show(id) {
  // En affichant le builder, vider la barre de recherche
  // Direction "on entry" : plus fiable que "on leave" (iframe encore stable, dispatchEvent garanti)
  if (id === 'prescription') {
    try {
      var pf = document.getElementById('frame-prescription');
      if (pf && pf.contentWindow) {
        var searchEl = pf.contentWindow.document.getElementById('searchInput');
        if (searchEl && searchEl.value) {
          searchEl.value = '';
          searchEl.dispatchEvent(new Event('input'));
        }
      }
    } catch(ex) {}
  }
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('iframe').forEach(function(f){ f.classList.remove('active'); });
  var tab = document.getElementById('tab-' + id);
  if (tab) tab.classList.add('active');
  document.getElementById('frame-' + id).classList.add('active');
}

/* ═══ TOPNAV ═══ */
function updateNav(user) {
  if (!user) return;
  var meta = user.user_metadata || {};
  var name = ((meta.prenom || '') + ' ' + (meta.nom || '')).trim() || (user.email || '').split('@')[0];
  if (!name) return;
  var cab = meta.cabinet || '';
  var el  = document.getElementById('userDisplay');
  el.innerHTML = name + (cab ? '<br><span style="font-size:.65rem;opacity:.7">' + cab + '</span>' : '');
}

function buildProfile(user) {
  var meta = (user && user.user_metadata) || {};
  return { prenom:meta.prenom||'', nom:meta.nom||'', am:meta.am||'', tel:meta.tel||'', cabinet:meta.cabinet||'', email:(user&&user.email)||'' };
}

function syncProfileToStorage(user) {
  var p = buildProfile(user);
  try { localStorage.setItem(R4P_KEYS.CACHED_PROFILE, JSON.stringify(p)); localStorage.setItem(R4P_KEYS.PROFILE, JSON.stringify(p)); } catch(e) {}
  return p;
}

function propagateToBilan(profile) {
  var bf = document.getElementById('frame-bilan');
  if (bf && bf.contentWindow) bf.contentWindow.postMessage({ type:'r4p-profile', profile:profile }, window.location.origin);
  var of = document.getElementById('frame-outils');
  if (of && of.contentWindow) of.contentWindow.postMessage({ type:'r4p-profile', profile:profile }, window.location.origin);
}

/* ═══ GATING PAR PLAN ═══ */
function applyPlan(plan) {
  if (plan === 'performance') {
    document.getElementById('tab-bilan').style.display       = 'none';
    document.getElementById('tab-outils').style.display      = 'none';
    document.getElementById('tab-prescription').style.display = 'none';
    // Activer Programme par défaut
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('iframe').forEach(function(f){ f.classList.remove('active'); });
    document.getElementById('frame-prescription').classList.add('active');
    document.getElementById('frame-bilan').classList.remove('active');
  }
}

/* ═══ VÉRIFICATION SESSION & INIT ═══ */
sb.auth.getSession().then(function(result) {
  var session = result.data && result.data.session;
  if (!session) {
    // Nettoyer les anciens caches et rediriger
    try { localStorage.removeItem(R4P_KEYS.SESSION); localStorage.removeItem(R4P_KEYS.CACHED_PROFILE); localStorage.removeItem(R4P_KEYS.PROFILE); } catch(e) {}
    window.location.replace('auth.html');
    return;
  }
  _touchActivity(); // Initialise le timer d'inactivité à la connexion
  var user = session.user;
  updateNav(user);
  applyPlan((user.user_metadata || {}).plan);
  // Isolation de session : efface le cache si l'utilisateur a changé
  try {
    var _prev = JSON.parse(localStorage.getItem(R4P_KEYS.CACHED_PROFILE) || 'null');
    if (_prev && _prev.email !== user.email) {
      Object.values(R4P_KEYS).forEach(function(k){ try { localStorage.removeItem(k); } catch(e){} });
      try { localStorage.removeItem('athletik-bilan'); } catch(e) {}
    }
  } catch(e) {}
  var profile = syncProfileToStorage(user);
  // Propager à bilan.html après chargement de l'iframe
  setTimeout(function() { propagateToBilan(profile); }, 600);
});

// Diffuse le token rafraîchi à toutes les iframes
function _broadcastFreshToken(session) {
  if (!session) return;
  var token = session.access_token;
  ['frame-bilan','frame-outils','frame-prescription'].forEach(function(id) {
    var f = document.getElementById(id);
    if (f && f.contentWindow) {
      f.contentWindow.postMessage({
        type: 'r4p-token-refreshed',
        access_token: token
      }, window.location.origin);
    }
  });
}

// Écouter les changements d'état (déconnexion forcée par expiration token)
sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_OUT') {
    window.location.replace('auth.html');
  }
  if (event === 'TOKEN_REFRESHED' && session) {
    var profile = syncProfileToStorage(session.user);
    updateNav(session.user);
    propagateToBilan(profile);
    _broadcastFreshToken(session); // ← propager à toutes les iframes
  }
});

/* ═══ MESSAGES DES IFRAMES ═══ */
window.addEventListener('message', function(e) {
  if (e.origin !== window.location.origin) return;
  if (!e.data || !e.data.type) return;

  // account.html a mis à jour le profil
  if (e.data.type === 'r4p-profile-updated' && e.data.profile) {
    var profile = e.data.profile;
    updateNav({ email: profile.email, user_metadata: profile });
    try { localStorage.setItem(R4P_KEYS.CACHED_PROFILE, JSON.stringify(profile)); localStorage.setItem(R4P_KEYS.PROFILE, JSON.stringify(profile)); } catch(ex) {}
    propagateToBilan(profile);
  }

  // bilan.html a annulé le changement de patient (données non sauvegardées)
  if (e.data.type === 'r4p-cancel-patient-switch') {
    // bilan.html envoie patientId = l'id du patient qu'il affiche encore (source de vérité)
    // On l'utilise plutôt que _previousPatient qui peut être périmé si l'utilisateur
    // a re-cliqué dans le modal pendant que la boîte de confirmation était ouverte.
    var _rollbackId = e.data.patientId;
    _currentPatient = (_rollbackId && _allPatients.find(function(p){ return p.id === _rollbackId; }))
      || _previousPatient || null;
    try { localStorage.setItem(R4P_KEYS.PATIENT, _currentPatient ? JSON.stringify(_currentPatient) : ''); } catch(ex) {}
    _updatePatientBtn();
    renderPatients(_allPatients);
    // Re-broadcaster le patient rollbacké aux autres iframes (pas bilan qui n'a jamais changé)
    // pour éviter que programme/outils restent sur le nouveau patient.
    (function(rolledBack){
      sb.auth.getSession().then(function(r) {
        var sess = r.data && r.data.session;
        var msg = {
          type: 'r4p-patient-selected',
          patient: rolledBack,
          auth: sess ? { access_token: sess.access_token, refresh_token: sess.refresh_token } : null
        };
        ['frame-outils','frame-prescription'].forEach(function(id) {
          var f = document.getElementById(id);
          if (f && f.contentWindow) f.contentWindow.postMessage(msg, window.location.origin);
        });
      });
    })(_currentPatient);
  }

  // account.html demande une déconnexion
  if (e.data.type === 'r4p-logout-done') {
    try {
      // Purge complète des données locales sensibles
      [R4P_KEYS.CACHED_PROFILE, R4P_KEYS.PROFILE, R4P_KEYS.PATIENT, R4P_KEYS.BILAN_DRAFT].forEach(function(k){
        localStorage.removeItem(k);
      });
    } catch(ex) {}
    window.location.replace('auth.html');
  }

  // outils.html a sauvegardé un score → relayer à bilan.html pour mise à jour live
  if (e.data.type === 'r4p-outils-save') {
    var bilanFrame = document.getElementById('frame-bilan');
    if (bilanFrame && bilanFrame.contentWindow) {
      bilanFrame.contentWindow.postMessage(e.data, window.location.origin);
    }
  }

  // outils demande les graphiques pevo → relayer à l'iframe programme
  if (e.data.type === 'r4p-pevo-request') {
    var prescFrame = document.getElementById('frame-prescription');
    if (prescFrame && prescFrame.contentWindow) {
      prescFrame.contentWindow.postMessage(e.data, window.location.origin);
    }
  }

  // programme répond avec les graphiques → relayer à outils
  if (e.data.type === 'r4p-pevo-response') {
    var outilsFrame = document.getElementById('frame-outils');
    if (outilsFrame && outilsFrame.contentWindow) {
      outilsFrame.contentWindow.postMessage(e.data, window.location.origin);
    }
  }

  // bilan.html a réinitialisé le dossier → déselectionner le patient dans la topnav
  if (e.data.type === 'r4p-patient-reset') {
    deselectPatient();
  }
});

var _allPatients    = [];

function _updatePatientBtn() {

    btn.classList.remove('has-patient');
  }
}

  sb.auth.getSession().then(function(r) {

    var msg = {
      type: 'r4p-patient-selected',
      patient: p,

    };

/* ── Formulaire création ────────────────────────────────── */
/* ── Bascule saisie date (picker ↔ texte manuel) ─────────── */
function resetDateField(baseId) {
  var nat = document.getElementById(baseId);
  var txt = document.getElementById(baseId + '-txt');
  if (!nat) return;
  nat.value = ''; nat.style.display = '';
  if (txt) { txt.value = ''; txt.style.display = 'none'; }
  var wrap = nat.closest ? nat.closest('.pm-date-wrap') : nat.parentElement;
  if (wrap) {
    var btn = wrap.querySelector('.pm-date-toggle-btn');
    if (btn) { btn.textContent = '✎'; btn.title = 'Saisir manuellement'; }
  }
}
function syncDateText(baseId) {
  var nat = document.getElementById(baseId);
  var txt = document.getElementById(baseId + '-txt');
  if (!nat || !txt) return;
  var m = txt.value.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  nat.value = m ? m[3] + '-' + m[2].padStart(2,'0') + '-' + m[1].padStart(2,'0') : '';
}
function toggleDateMode(baseId) {
  var nat = document.getElementById(baseId);
  var txt = document.getElementById(baseId + '-txt');
  if (!nat || !txt) return;
  var wrap = nat.closest ? nat.closest('.pm-date-wrap') : nat.parentElement;
  var btn  = wrap ? wrap.querySelector('.pm-date-toggle-btn') : null;
  var toText = txt.style.display === 'none';
  if (toText) {
    // → mode texte
    var v = nat.value;
    if (v) { var p=v.split('-'); txt.value=p[2]+'/'+p[1]+'/'+p[0]; } else { txt.value=''; }
    nat.style.display = 'none'; txt.style.display = '';
    if (btn) { btn.textContent = '📅'; btn.title = 'Utiliser le sélecteur'; }
    txt.focus();
  } else {
    // → mode picker
    syncDateText(baseId);
    txt.style.display = 'none'; nat.style.display = '';
    if (btn) { btn.textContent = '✎'; btn.title = 'Saisir manuellement'; }
  }
}

function toggleCreateForm(show) {
  var f = document.getElementById('pmCreateForm');
  if (show) {
    f.classList.add('open');
    document.getElementById('pm-nom').focus();
  } else {
    f.classList.remove('open');
    ['pm-civ','pm-nom','pm-prenom','pm-sport'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = id === 'pm-civ' ? 'M.' : '';
    });
    resetDateField('pm-ddn');
  }
}

/* ── Charger la liste ───────────────────────────────────── */
function loadPatients() {
  document.getElementById('pmList').innerHTML = '<div class="pm-empty">Chargement…</div>';
  sb.auth.getSession().then(function(r) {
    var uid = r.data && r.data.session && r.data.session.user && r.data.session.user.id;
    if (!uid) return;
    sb.from('patients')
      .select('*')
      .eq('praticien_id', uid)
      .order('nom', { ascending: true })
      .then(function(res) {
        if (res.error) { document.getElementById('pmList').innerHTML = '<div class="pm-empty">Erreur de chargement.</div>'; return; }
        _allPatients = res.data || [];
        renderPatients(_allPatients);
      });
  });
}

/* ── Filtrer ────────────────────────────────────────────── */
function filterPatients() {
  var q = (document.getElementById('pmSearch').value || '').toLowerCase().trim();
  if (!q) { renderPatients(_allPatients); return; }
  renderPatients(_allPatients.filter(function(p) {
    return (p.nom+' '+p.prenom).toLowerCase().includes(q) || (p.sport||'').toLowerCase().includes(q);
  }));
}

/* ── Afficher la liste ──────────────────────────────────── */
function _capFirst(str) {
  if(!str) return str;
  return str.toLowerCase().replace(/(^|[\s\-])([\wÀ-ÿ])/g, function(m, sep, c){ return sep + c.toUpperCase(); });
}

function renderPatients(list) {
  closeCtxMenu();
  var el = document.getElementById('pmList');
  if (!list.length) { el.innerHTML = '<div class="pm-empty">Aucun patient trouvé.</div>'; return; }
  el.innerHTML = list.map(function(p) {
    var initials = (p.nom.charAt(0) + (p.prenom.charAt(0)||'')).toUpperCase();
    var isFemale = (p.sexe === 'F');
    var ddn = p.ddn ? p.ddn.split('-').reverse().join('/') : '';
    var meta = [ddn, p.sport].filter(Boolean).join(' · ');
    var isSelected = _currentPatient && _currentPatient.id === p.id;
    var selLabel = isSelected ? '✓ Patient actif' : 'Sélectionner';
    return '<div class="pm-patient-item'+(isSelected?' selected':'')+'" id="pitem-'+p.id+'" onclick="selectPatient(\''+p.id+'\')" style="cursor:pointer">'
      + '<div class="pm-patient-avatar'+(isFemale?' female':'')+'">'+initials+'</div>'
      + '<div class="pm-patient-info">'
      +   '<div class="pm-patient-name">'+_esc(p.nom)+' '+_esc(_capFirst(p.prenom))+'</div>'
      +   (meta ? '<div class="pm-patient-meta">'+_esc(meta)+'</div>' : '')
      + '</div>'
      + '<div class="pm-patient-actions">'
      +   '<div class="pm-ctx-wrap">'
      +     '<button class="pm-ctx-btn" onclick="openCtxMenu(\''+p.id+'\',event)" title="Actions">···</button>'
      +   '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

/* ── Modifier un patient ────────────────────────────────── */
function editPatient(id) {
  closeCtxMenu();
  var p = _allPatients.find(function(x){ return x.id === id; });
  if (!p) return;
  toggleCreateForm(false); // ferme le formulaire de création si ouvert
  resetDateField('pm-edit-ddn');
  document.getElementById('pm-edit-id').value    = p.id;
  document.getElementById('pm-edit-nom').value   = p.nom || '';
  document.getElementById('pm-edit-prenom').value= p.prenom || '';
  document.getElementById('pm-edit-ddn').value   = p.ddn || '';
  document.getElementById('pm-edit-sport').value = p.sport || '';
  document.getElementById('pm-edit-civ').value   = (p.sexe === 'F') ? 'Mme.' : 'M.';
  document.getElementById('pmEditForm').classList.add('open');
  document.getElementById('pm-edit-nom').focus();
  var item = document.getElementById('pitem-' + id);
  if (item) item.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function closeEditForm() {
  document.getElementById('pmEditForm').classList.remove('open');
}

function saveEditPatient() {
  var id     = document.getElementById('pm-edit-id').value;
  var nom    = (document.getElementById('pm-edit-nom').value||'').trim().toUpperCase();
  var prenom = _capFirst((document.getElementById('pm-edit-prenom').value||'').trim());
  var ddn    = document.getElementById('pm-edit-ddn').value || null;
  var civ    = document.getElementById('pm-edit-civ').value;
  var sport  = (document.getElementById('pm-edit-sport').value||'').trim();
  if (!nom || !prenom) { alert('Nom et prénom requis.'); return; }
  var sexe = civ === 'Mme.' ? 'F' : 'H';
  var btn = document.getElementById('pmEditSaveBtn');
  if (btn) { btn.textContent = '…'; btn.disabled = true; }
  sb.from('patients').update({ nom: nom, prenom: prenom, ddn: ddn, sexe: sexe, sport: sport })
    .eq('id', id).select().single()
    .then(function(res) {
      if (btn) { btn.textContent = '✓ Enregistrer'; btn.disabled = false; }
      if (res.error) { alert('Erreur : ' + res.error.message); return; }
      var idx = _allPatients.findIndex(function(x){ return x.id === id; });
      if (idx !== -1) _allPatients[idx] = res.data;
      _allPatients.sort(function(a,b){ return a.nom.localeCompare(b.nom); });
      if (_currentPatient && _currentPatient.id === id) {
        _currentPatient = res.data;
        try { localStorage.setItem(R4P_KEYS.PATIENT, JSON.stringify(res.data)); } catch(ex){}
        _broadcastPatient(res.data);
        _updatePatientBtn();
      }
      closeEditForm();
      renderPatients(_allPatients);
    });
}

function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── Sélectionner un patient ────────────────────────────── */
function selectPatient(id) {
  var p = _allPatients.find(function(x){ return x.id === id; });
  if (!p) return;
  _previousPatient = _currentPatient; // snapshot pour rollback
  _currentPatient = p;
  try { localStorage.setItem(R4P_KEYS.PATIENT, JSON.stringify(p)); } catch(e) {}
  _updatePatientBtn();
  _broadcastPatient(p);
  renderPatients(_allPatients);
  closePatientModal();
}

/* ── Désélectionner ─────────────────────────────────────── */
function deselectPatient() {
  _currentPatient = null;
  try { localStorage.removeItem(R4P_KEYS.PATIENT); } catch(e) {}
  _updatePatientBtn();
  _broadcastPatient(null);
}

/* ── Créer un patient ───────────────────────────────────── */
function createPatient() {
  var nom    = (document.getElementById('pm-nom').value||'').trim().toUpperCase();
  var prenom = _capFirst((document.getElementById('pm-prenom').value||'').trim());
  var ddn    = document.getElementById('pm-ddn').value || null;
  var civ    = document.getElementById('pm-civ').value;
  var sport  = (document.getElementById('pm-sport').value||'').trim();
  if (!nom || !prenom) { alert('Nom et prénom requis.'); return; }
  sb.auth.getSession().then(function(r) {
    var uid = r.data && r.data.session && r.data.session.user && r.data.session.user.id;
    if (!uid) return;
    var sexe = civ === 'Mme.' ? 'F' : 'H';
    sb.from('patients').insert({ praticien_id: uid, nom: nom, prenom: prenom, ddn: ddn, sexe: sexe, sport: sport })
      .select().single()
      .then(function(res) {
        if (res.error) { alert('Erreur : ' + res.error.message); return; }
        toggleCreateForm(false);
        _allPatients.push(res.data);
        _allPatients.sort(function(a,b){ return a.nom.localeCompare(b.nom); });
        selectPatient(res.data.id);
      });
  });
}

/* ── Supprimer un patient ───────────────────────────────── */
function deletePatient(id, e) {
  e.stopPropagation();
  var p = _allPatients.find(function(x){ return x.id === id; });
  if (!p) return;
  if (!confirm('Supprimer ' + p.nom + ' ' + p.prenom + ' et toutes ses données ?\n\nCette action est irréversible — bilans et notes inclus.')) return;

  // 1. Supprimer les bilans du patient (RGPD — droit à l'effacement)
  Promise.all([
    sb.from('bilans').delete().eq('patient_id', id),
    sb.from('clinical_notes').delete().eq('patient_id', id)
  ]).then(function() {
    // 2. Supprimer le patient
    return sb.from('patients').delete().eq('id', id);
  }).then(function(res) {
    if (res.error) { alert('Erreur : ' + res.error.message); return; }
    _allPatients = _allPatients.filter(function(x){ return x.id !== id; });
    if (_currentPatient && _currentPatient.id === id) {
      deselectPatient();
      // Purger aussi le brouillon de bilan en cours
      try { localStorage.removeItem(R4P_KEYS.BILAN_DRAFT); } catch(ex) {}
    }
    renderPatients(_allPatients);
  }).catch(function(err) {
    alert('Erreur lors de la suppression : ' + (err && err.message ? err.message : err));
  });
}
</script>
