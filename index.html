<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Rehab4Perf</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#1A3A5C; }
.topnav {
  height:48px; background:#1A3A5C;
  display:flex; align-items:center; padding:0 18px; gap:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.3); flex-shrink:0;
}
.logo { font-family:Georgia,serif; font-style:italic; font-size:1.05rem; margin-right:20px; flex-shrink:0; user-select:none; }
.logo .r { color:#4A90D9; }
.logo .n { color:#fff; font-weight:900; font-style:normal; }
.logo .p { color:#E74C3C; }
.tab {
  display:flex; align-items:center; gap:6px; padding:0 16px; height:100%;
  color:rgba(255,255,255,.55); font-size:.84rem; font-weight:500;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  cursor:pointer; border:none; background:none;
  border-bottom:3px solid transparent; white-space:nowrap;
  transition:color .15s, border-color .15s;
}
.tab:hover { color:rgba(255,255,255,.85); }
.tab.active { color:#fff; border-bottom-color:#4A90D9; background:rgba(255,255,255,.05); }
.topnav-right {
  font-size:.72rem; font-weight:500; line-height:1.4;
  text-align:right; white-space:nowrap; color:rgba(255,255,255,.75);
  cursor:pointer; font-family:-apple-system,'Helvetica Neue',sans-serif;
  transition:color .15s;
}
.topnav-right:hover { color:#fff; }
.frame-wrap { position:fixed; top:48px; left:0; right:0; bottom:0; }
iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; display:none; background:#fff; }
iframe.active { display:block; }

/* ── Patient selector button ─────────────────────────────── */
.patient-btn {
  margin-left:auto;
  display:flex; align-items:center; gap:6px;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  border-radius:6px; padding:5px 11px; cursor:pointer;
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  font-size:.78rem; font-weight:500; color:rgba(255,255,255,.85);
  white-space:nowrap; transition:background .15s, border-color .15s;
  max-width:180px; overflow:hidden;
}
.patient-btn:hover { background:rgba(255,255,255,.18); border-color:rgba(255,255,255,.35); }
.patient-btn.has-patient { background:rgba(74,144,217,.25); border-color:rgba(74,144,217,.5); color:#fff; }
.patient-btn-label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ── Patient modal ───────────────────────────────────────── */
.pm-overlay {
  display:none; position:fixed; inset:0; z-index:9999;
  background:rgba(0,0,0,.5); backdrop-filter:blur(2px);
  align-items:flex-start; justify-content:center;
  padding-top:60px;
}
.pm-overlay.open { display:flex; }
.pm-card {
  background:#fff; border-radius:10px;
  box-shadow:0 8px 40px rgba(0,0,0,.25);
  width:100%; max-width:480px; max-height:calc(100vh - 100px);
  display:flex; flex-direction:column; overflow:hidden;
}
.pm-header {
  background:#1A3A5C; color:#fff;
  padding:14px 18px; display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.pm-header h2 { font-size:.95rem; font-weight:700; flex:1; }
.pm-close {
  background:none; border:none; color:rgba(255,255,255,.7);
  font-size:1.3rem; cursor:pointer; padding:0 2px; line-height:1;
  transition:color .12s;
}
.pm-close:hover { color:#fff; }
.pm-search-row {
  padding:12px 16px; border-bottom:1px solid #E8E6E1; flex-shrink:0;
  display:flex; gap:8px;
}
.pm-search {
  flex:1; border:1.5px solid #D3D1CB; border-radius:6px;
  padding:7px 11px; font-size:.88rem; font-family:inherit; outline:none;
}
.pm-search:focus { border-color:#2B5FA6; }
.pm-new-btn {
  background:#1A3A5C; color:#fff; border:none; border-radius:6px;
  padding:7px 13px; font-size:.8rem; font-weight:600; cursor:pointer;
  font-family:inherit; white-space:nowrap; transition:background .12s;
}
.pm-new-btn:hover { background:#2B5FA6; }
.pm-body { flex:1; overflow-y:auto; }
.pm-empty {
  padding:32px 20px; text-align:center;
  color:#9D9B96; font-size:.88rem; font-style:italic;
}
.pm-patient-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 16px; border-bottom:1px solid #F1F0ED;
  transition:background .1s; cursor:pointer;
}
.pm-patient-item:hover { background:#F7F6F3; }
.pm-patient-item.selected { background:#EEF3FB; }
.pm-patient-avatar {
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  background:#1A3A5C; color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:.8rem; font-weight:700;
}
.pm-patient-avatar.female { background:#8B5C8B; }
.pm-patient-info { flex:1; min-width:0; }
.pm-patient-name { font-size:.88rem; font-weight:700; color:#1A1917; }
.pm-patient-meta { font-size:.74rem; color:#6B6860; margin-top:1px; }
.pm-patient-actions { display:flex; gap:6px; flex-shrink:0; }
.pm-select-btn {
  background:#1A3A5C; color:#fff; border:none; border-radius:5px;
  padding:5px 10px; font-size:.74rem; font-weight:600; cursor:pointer;
  font-family:inherit; transition:background .12s;
}
.pm-select-btn:hover { background:#2B5FA6; }
.pm-select-btn.active { background:#2D6A4F; }
.pm-del-btn {
  background:none; border:1.5px solid #E8E6E1; border-radius:5px;
  color:#C0392B; padding:5px 8px; font-size:.78rem; cursor:pointer;
  transition:all .12s;
}
.pm-del-btn:hover { background:#FDECEA; border-color:#C0392B; }

/* ── Create form ─────────────────────────────────────────── */
.pm-create-form {
  display:none; padding:16px; border-bottom:2px solid #E8E6E1;
  background:#F7F6F3; flex-shrink:0;
}
.pm-create-form.open { display:block; }
.pm-create-form h3 { font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#1A3A5C; margin-bottom:12px; }
.pm-form-row { display:flex; gap:8px; margin-bottom:8px; }
.pm-form-field { display:flex; flex-direction:column; gap:3px; flex:1; }
.pm-form-field label { font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#6B6860; }
.pm-form-field input, .pm-form-field select {
  border:1.5px solid #D3D1CB; border-radius:5px;
  padding:6px 9px; font-size:.85rem; font-family:inherit; outline:none;
  background:#fff;
}
.pm-form-field input:focus, .pm-form-field select:focus { border-color:#2B5FA6; }
.pm-form-actions { display:flex; gap:8px; margin-top:10px; }
.pm-save-btn {
  background:#2D6A4F; color:#fff; border:none; border-radius:6px;
  padding:7px 16px; font-size:.82rem; font-weight:600; cursor:pointer;
  font-family:inherit; transition:background .12s;
}
.pm-save-btn:hover { background:#1A5C3A; }
.pm-cancel-btn {
  background:none; border:1.5px solid #D3D1CB; border-radius:6px;
  padding:7px 14px; font-size:.82rem; color:#6B6860; cursor:pointer;
  font-family:inherit; transition:all .12s;
}
.pm-cancel-btn:hover { border-color:#9D9B96; color:#1A1917; }

/* ── Context menu ──────────────────────────────────────── */
.pm-ctx-wrap { position:relative; flex-shrink:0; }
.pm-ctx-btn {
  background:none; border:1.5px solid #E8E6E1; border-radius:5px;
  color:#6B6860; padding:4px 10px; font-size:.9rem; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all .12s;
  letter-spacing:.08em; line-height:1;
}
.pm-ctx-btn:hover { background:#F7F6F3; border-color:#9D9B96; color:#1A1917; }
.pm-ctx-menu {
  display:none; position:absolute; right:0; top:calc(100% + 4px); z-index:200;
  background:#fff; border-radius:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.07);
  min-width:160px; overflow:hidden;
}
.pm-ctx-menu.open { display:block; }
.pm-ctx-item {
  display:flex; align-items:center; gap:8px;
  padding:9px 14px; font-size:.82rem; cursor:pointer;
  color:#1A1917; transition:background .1s;
  border:none; background:none; width:100%; text-align:left;
  font-family:inherit;
}
.pm-ctx-item:hover { background:#F7F6F3; }
.pm-ctx-item.active-item { color:#2D6A4F; font-weight:700; }
.pm-ctx-item.delete-item { color:#C0392B; }
.pm-ctx-item.delete-item:hover { background:#FDECEA; }
.pm-ctx-divider { height:1px; background:#E8E6E1; margin:2px 0; }

/* ── Edit form ──────────────────────────────────────────── */
.pm-edit-form {
  display:none; padding:16px; border-bottom:2px solid #2B5FA6;
  background:#EEF3FB; flex-shrink:0;
}
.pm-edit-form.open { display:block; }
.pm-edit-form h3 { font-size:.8rem; font-weight:700; text-transform:uppercase;
  letter-spacing:.05em; color:#2B5FA6; margin-bottom:12px; }

@media (max-width:900px) {
  .topnav { padding:0 10px; gap:2px; }
  .tab { padding:0 10px; font-size:.8rem; }
  .logo { margin-right:10px; }
  .topnav-right { font-size:.68rem; }
}
@media (max-width:600px) {
  .topnav { padding:0 8px; } .tab { padding:0 8px; font-size:.75rem; }
  .logo { margin-right:6px; font-size:.92rem; } .topnav-right { display:none; }
  .patient-btn { max-width:120px; font-size:.7rem; padding:4px 6px; }
  .pm-overlay { padding-top:52px; }
  .pm-card { max-width:100%; border-radius:10px 10px 0 0; }
}
</style>
</head>
<body>
<div class="topnav">
  <div class="logo">
    <span class="r">Rehab</span><span class="n">4</span><span class="p">Perf</span>
  </div>
  <button class="tab active" id="tab-bilan"        onclick="show('bilan')">Bilan clinique</button>
  <button class="tab"        id="tab-outils"       onclick="show('outils')">Outils</button>
  <button class="tab"        id="tab-prescription" onclick="show('prescription')">Programme</button>
  <button class="patient-btn" id="patientBtn" onclick="openPatientModal()" title="Sélectionner un patient">
    <span>👤</span><span class="patient-btn-label" id="patientBtnLabel">Aucun patient</span><span>▾</span>
  </button>
  <div class="topnav-right" id="userDisplay" onclick="show('account')" title="Mon compte" style="margin-left:12px;">Mon compte</div>
</div>

<!-- ── Modal patients ─────────────────────────────────────── -->
<div class="pm-overlay" id="pmOverlay" onclick="closePMOnBackdrop(event)">
  <div class="pm-card">
    <div class="pm-header">
      <h2>👤 Patients</h2>
      <button class="pm-close" onclick="closePatientModal()">✕</button>
    </div>

    <!-- Formulaire création (masqué par défaut) -->
    <div class="pm-create-form" id="pmCreateForm">
      <h3>Nouveau patient</h3>
      <div class="pm-form-row">
        <div class="pm-form-field" style="flex:0 0 72px">
          <label>Civilité</label>
          <select id="pm-civ"><option value="M.">M.</option><option value="Mme.">Mme.</option></select>
        </div>
        <div class="pm-form-field">
          <label>Nom</label>
          <input type="text" id="pm-nom" placeholder="NOM" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="pm-form-field">
          <label>Prénom</label>
          <input type="text" id="pm-prenom" placeholder="Prénom">
        </div>
      </div>
      <div class="pm-form-row">
        <div class="pm-form-field">
          <label>Date de naissance</label>
          <input type="date" id="pm-ddn">
        </div>
        <div class="pm-form-field">
          <label>Sport / Activité</label>
          <input type="text" id="pm-sport" placeholder="ex: Football, Course…">
        </div>
      </div>
      <div class="pm-form-actions">
        <button class="pm-save-btn" onclick="createPatient()">✓ Créer</button>
        <button class="pm-cancel-btn" onclick="toggleCreateForm(false)">Annuler</button>
      </div>
    </div>

    <!-- Formulaire édition (masqué par défaut) -->
    <div class="pm-edit-form" id="pmEditForm">
      <h3>✏️ Modifier le patient</h3>
      <input type="hidden" id="pm-edit-id">
      <div class="pm-form-row">
        <div class="pm-form-field" style="flex:0 0 72px">
          <label>Civilité</label>
          <select id="pm-edit-civ"><option value="M.">M.</option><option value="Mme.">Mme.</option></select>
        </div>
        <div class="pm-form-field">
          <label>Nom</label>
          <input type="text" id="pm-edit-nom" placeholder="NOM" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="pm-form-field">
          <label>Prénom</label>
          <input type="text" id="pm-edit-prenom" placeholder="Prénom">
        </div>
      </div>
      <div class="pm-form-row">
        <div class="pm-form-field">
          <label>Date de naissance</label>
          <input type="date" id="pm-edit-ddn">
        </div>
        <div class="pm-form-field">
          <label>Sport / Activité</label>
          <input type="text" id="pm-edit-sport" placeholder="ex: Football, Course…">
        </div>
      </div>
      <div class="pm-form-actions">
        <button class="pm-save-btn" id="pmEditSaveBtn" onclick="saveEditPatient()">✓ Enregistrer</button>
        <button class="pm-cancel-btn" onclick="closeEditForm()">Annuler</button>
      </div>
    </div>

    <!-- Barre de recherche -->
    <div class="pm-search-row">
      <input class="pm-search" id="pmSearch" type="text" placeholder="Rechercher un patient…" oninput="filterPatients()">
      <button class="pm-new-btn" onclick="toggleCreateForm(true)">+ Nouveau</button>
    </div>

    <!-- Liste des patients -->
    <div class="pm-body" id="pmList">
      <div class="pm-empty">Chargement…</div>
    </div>
  </div>
</div>
<div class="frame-wrap">
  <iframe id="frame-bilan"        src="bilan.html"        class="active"></iframe>
  <iframe id="frame-outils"       src="outils.html"       ></iframe>
  <iframe id="frame-prescription" src="programme.html" ></iframe>
  <iframe id="frame-account"      src="account.html"      ></iframe>
</div>

<script>
var SUPA_URL = 'https://sxdobjodxkwexaspepdm.supabase.co';
var SUPA_KEY = 'sb_publishable_zEJrmQOnKyRm-Y_NyojaTA_ERrDx4pl';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);

/* ═══ REDIRECT TOKENS SUPABASE (invite / recovery)
   Supabase redirige vers la racine avec un hash :
   https://rehab4perf.netlify.app/#access_token=...&type=invite
   On détecte et redirige vers auth.html qui affiche le bon formulaire. */
(function() {
  var h = window.location.hash || '';
  var type = null;
  h.replace(/^#/, '').split('&').forEach(function(p) {
    var i = p.indexOf('=');
    if (i > 0 && p.slice(0, i) === 'type') type = decodeURIComponent(p.slice(i + 1));
  });
  if (type === 'invite' || type === 'recovery') {
    window.location.replace('auth.html' + h);
    return;
  }
})();

/* ═══ NAVIGATION ═══ */
function show(id) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('iframe').forEach(function(f){ f.classList.remove('active'); });
  var tab = document.getElementById('tab-' + id);
  if (tab) tab.classList.add('active');
  document.getElementById('frame-' + id).classList.add('active');
}

/* ═══ TOPNAV ═══ */
function updateNav(user) {
  if (!user) return;
  var meta = user.user_metadata || {};
  var name = ((meta.prenom || '') + ' ' + (meta.nom || '')).trim() || (user.email || '').split('@')[0];
  if (!name) return;
  var cab = meta.cabinet || '';
  var el  = document.getElementById('userDisplay');
  el.innerHTML = name + (cab ? '<br><span style="font-size:.65rem;opacity:.7">' + cab + '</span>' : '');
}

function buildProfile(user) {
  var meta = (user && user.user_metadata) || {};
  var appMeta = (user && user.app_metadata) || {};
  var role = appMeta.role || meta.role || 'reader';
  return { prenom:meta.prenom||'', nom:meta.nom||'', am:meta.am||'', tel:meta.tel||'', cabinet:meta.cabinet||'', email:(user&&user.email)||'', role:role };
}

function syncProfileToStorage(user) {
  var p = buildProfile(user);
  try { localStorage.setItem('r4p-cached-profile', JSON.stringify(p)); localStorage.setItem('r4p-profile', JSON.stringify(p)); } catch(e) {}
  return p;
}

function propagateToBilan(profile) {
  var bf = document.getElementById('frame-bilan');
  if (bf && bf.contentWindow) bf.contentWindow.postMessage({ type:'r4p-profile', profile:profile }, '*');
  var of = document.getElementById('frame-outils');
  if (of && of.contentWindow) of.contentWindow.postMessage({ type:'r4p-profile', profile:profile }, '*');
}

/* ═══ VÉRIFICATION SESSION & INIT ═══ */
sb.auth.getSession().then(function(result) {
  var session = result.data && result.data.session;
  if (!session) {
    // Nettoyer les anciens caches et rediriger
    try { localStorage.removeItem('r4p-session'); localStorage.removeItem('r4p-cached-profile'); localStorage.removeItem('r4p-profile'); } catch(e) {}
    window.location.replace('auth.html');
    return;
  }
  var user = session.user;
  updateNav(user);
  var profile = syncProfileToStorage(user);
  // Propager à bilan.html après chargement de l'iframe
  setTimeout(function() { propagateToBilan(profile); }, 600);
});

// Diffuse le token rafraîchi à toutes les iframes
function _broadcastFreshToken(session) {
  if (!session) return;
  var token = session.access_token;
  ['frame-bilan','frame-outils','frame-prescription'].forEach(function(id) {
    var f = document.getElementById(id);
    if (f && f.contentWindow) {
      f.contentWindow.postMessage({
        type: 'r4p-token-refreshed',
        access_token: token
      }, '*');
    }
  });
}

// Écouter les changements d'état (déconnexion forcée par expiration token)
sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_OUT') {
    window.location.replace('auth.html');
  }
  if (event === 'TOKEN_REFRESHED' && session) {
    var profile = syncProfileToStorage(session.user);
    updateNav(session.user);
    propagateToBilan(profile);
    _broadcastFreshToken(session); // ← propager à toutes les iframes
  }
});

/* ═══ MESSAGES DES IFRAMES ═══ */
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;

  // account.html a mis à jour le profil
  if (e.data.type === 'r4p-profile-updated' && e.data.profile) {
    var profile = e.data.profile;
    updateNav({ email: profile.email, user_metadata: profile });
    try { localStorage.setItem('r4p-cached-profile', JSON.stringify(profile)); localStorage.setItem('r4p-profile', JSON.stringify(profile)); } catch(ex) {}
    propagateToBilan(profile);
  }

  // bilan.html a annulé le changement de patient (données non sauvegardées)
  if (e.data.type === 'r4p-cancel-patient-switch') {
    _currentPatient = _previousPatient || null;
    try { localStorage.setItem('r4p-current-patient', _currentPatient ? JSON.stringify(_currentPatient) : ''); } catch(ex) {}
    _updatePatientBtn();
    renderPatients(_allPatients);
  }

  // account.html demande une déconnexion
  if (e.data.type === 'r4p-logout-done') {
    try { localStorage.removeItem('r4p-cached-profile'); localStorage.removeItem('r4p-profile'); } catch(ex) {}
    window.location.replace('auth.html');
  }

  // outils.html a sauvegardé un score → relayer à bilan.html pour mise à jour live
  if (e.data.type === 'r4p-outils-save') {
    var bilanFrame = document.getElementById('frame-bilan');
    if (bilanFrame && bilanFrame.contentWindow) {
      bilanFrame.contentWindow.postMessage(e.data, '*');
    }
  }
});

/* ═══════════════════════════════════════════════════════════
   GESTION DES PATIENTS
═══════════════════════════════════════════════════════════ */
var _allPatients    = [];
var _currentPatient  = null;
var _previousPatient = null; // mémorisé avant chaque switch pour rollback

// Restaurer le patient courant depuis localStorage
(function() {
  try {
    var stored = localStorage.getItem('r4p-current-patient');
    if (stored) {
      _currentPatient = JSON.parse(stored);
      _updatePatientBtn();
    }
  } catch(e) {}
})();

function _updatePatientBtn() {
  var btn   = document.getElementById('patientBtn');
  var label = document.getElementById('patientBtnLabel');
  if (_currentPatient) {
    label.textContent = _currentPatient.nom + ' ' + _currentPatient.prenom;
    btn.classList.add('has-patient');
  } else {
    label.textContent = 'Aucun patient';
    btn.classList.remove('has-patient');
  }
}

function _broadcastPatient(p) {
  sb.auth.getSession().then(function(r) {
    var sess = r.data && r.data.session;
    var msg = {
      type: 'r4p-patient-selected',
      patient: p,
      auth: sess ? { access_token: sess.access_token, refresh_token: sess.refresh_token } : null
    };
    ['frame-bilan','frame-outils','frame-prescription'].forEach(function(id) {
      var f = document.getElementById(id);
      if (f && f.contentWindow) f.contentWindow.postMessage(msg, '*');
    });
  });
}

/* ── Ouvrir / fermer modal ──────────────────────────────── */
function openPatientModal() {
  document.getElementById('pmOverlay').classList.add('open');
  document.getElementById('pmSearch').value = '';
  loadPatients();
}
function closePatientModal() {
  document.getElementById('pmOverlay').classList.remove('open');
  toggleCreateForm(false);
}
function closePMOnBackdrop(e) {
  if (e.target === document.getElementById('pmOverlay')) closePatientModal();
}

/* ── Formulaire création ────────────────────────────────── */
function toggleCreateForm(show) {
  var f = document.getElementById('pmCreateForm');
  if (show) {
    f.classList.add('open');
    document.getElementById('pm-nom').focus();
  } else {
    f.classList.remove('open');
    ['pm-civ','pm-nom','pm-prenom','pm-ddn','pm-sport'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = id === 'pm-civ' ? 'M.' : '';
    });
  }
}

/* ── Charger la liste ───────────────────────────────────── */
function loadPatients() {
  document.getElementById('pmList').innerHTML = '<div class="pm-empty">Chargement…</div>';
  sb.auth.getSession().then(function(r) {
    var uid = r.data && r.data.session && r.data.session.user && r.data.session.user.id;
    if (!uid) return;
    sb.from('patients')
      .select('*')
      .eq('praticien_id', uid)
      .order('nom', { ascending: true })
      .then(function(res) {
        if (res.error) { document.getElementById('pmList').innerHTML = '<div class="pm-empty">Erreur de chargement.</div>'; return; }
        _allPatients = res.data || [];
        renderPatients(_allPatients);
      });
  });
}

/* ── Filtrer ────────────────────────────────────────────── */
function filterPatients() {
  var q = (document.getElementById('pmSearch').value || '').toLowerCase().trim();
  if (!q) { renderPatients(_allPatients); return; }
  renderPatients(_allPatients.filter(function(p) {
    return (p.nom+' '+p.prenom).toLowerCase().includes(q) || (p.sport||'').toLowerCase().includes(q);
  }));
}

/* ── Afficher la liste ──────────────────────────────────── */
function renderPatients(list) {
  var el = document.getElementById('pmList');
  if (!list.length) { el.innerHTML = '<div class="pm-empty">Aucun patient trouvé.</div>'; return; }
  el.innerHTML = list.map(function(p) {
    var initials = (p.nom.charAt(0) + (p.prenom.charAt(0)||'')).toUpperCase();
    var isFemale = (p.sexe === 'F');
    var ddn = p.ddn ? p.ddn.split('-').reverse().join('/') : '';
    var meta = [ddn, p.sport].filter(Boolean).join(' · ');
    var isSelected = _currentPatient && _currentPatient.id === p.id;
    var selLabel = isSelected ? '✓ Patient actif' : 'Sélectionner';
    return '<div class="pm-patient-item'+(isSelected?' selected':'')+'" id="pitem-'+p.id+'">'
      + '<div class="pm-patient-avatar'+(isFemale?' female':'')+'">'+initials+'</div>'
      + '<div class="pm-patient-info">'
      +   '<div class="pm-patient-name">'+_esc(p.nom)+' '+_esc(p.prenom)+'</div>'
      +   (meta ? '<div class="pm-patient-meta">'+_esc(meta)+'</div>' : '')
      + '</div>'
      + '<div class="pm-patient-actions">'
      +   '<div class="pm-ctx-wrap" id="ctx-wrap-'+p.id+'">'
      +     '<button class="pm-ctx-btn" onclick="openCtxMenu(\''+p.id+'\',event)" title="Actions">···</button>'
      +     '<div class="pm-ctx-menu" id="ctx-menu-'+p.id+'">'
      +       '<button class="pm-ctx-item'+(isSelected?' active-item':'')+'" onclick="selectPatient(\''+p.id+'\');closeCtxMenu()">'+selLabel+'</button>'
      +       '<button class="pm-ctx-item" onclick="editPatient(\''+p.id+'\')">✏️&nbsp; Modifier</button>'
      +       '<div class="pm-ctx-divider"></div>'
      +       '<button class="pm-ctx-item delete-item" onclick="deletePatient(\''+p.id+'\',event)">🗑&nbsp; Supprimer</button>'
      +     '</div>'
      +   '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

/* ── Menu contextuel ────────────────────────────────────── */
var _openCtxId = null;

function openCtxMenu(id, e) {
  e.stopPropagation();
  if (_openCtxId === id) { closeCtxMenu(); return; }
  closeCtxMenu();
  _openCtxId = id;
  var menu = document.getElementById('ctx-menu-' + id);
  if (menu) menu.classList.add('open');
}

function closeCtxMenu() {
  if (_openCtxId) {
    var menu = document.getElementById('ctx-menu-' + _openCtxId);
    if (menu) menu.classList.remove('open');
    _openCtxId = null;
  }
}

document.addEventListener('click', function() { closeCtxMenu(); });

/* ── Modifier un patient ────────────────────────────────── */
function editPatient(id) {
  closeCtxMenu();
  var p = _allPatients.find(function(x){ return x.id === id; });
  if (!p) return;
  toggleCreateForm(false); // ferme le formulaire de création si ouvert
  document.getElementById('pm-edit-id').value    = p.id;
  document.getElementById('pm-edit-nom').value   = p.nom || '';
  document.getElementById('pm-edit-prenom').value= p.prenom || '';
  document.getElementById('pm-edit-ddn').value   = p.ddn || '';
  document.getElementById('pm-edit-sport').value = p.sport || '';
  document.getElementById('pm-edit-civ').value   = (p.sexe === 'F') ? 'Mme.' : 'M.';
  document.getElementById('pmEditForm').classList.add('open');
  document.getElementById('pm-edit-nom').focus();
  var item = document.getElementById('pitem-' + id);
  if (item) item.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function closeEditForm() {
  document.getElementById('pmEditForm').classList.remove('open');
}

function saveEditPatient() {
  var id     = document.getElementById('pm-edit-id').value;
  var nom    = (document.getElementById('pm-edit-nom').value||'').trim().toUpperCase();
  var prenom = (document.getElementById('pm-edit-prenom').value||'').trim();
  var ddn    = document.getElementById('pm-edit-ddn').value || null;
  var civ    = document.getElementById('pm-edit-civ').value;
  var sport  = (document.getElementById('pm-edit-sport').value||'').trim();
  if (!nom || !prenom) { alert('Nom et prénom requis.'); return; }
  var sexe = civ === 'Mme.' ? 'F' : 'H';
  var btn = document.getElementById('pmEditSaveBtn');
  if (btn) { btn.textContent = '…'; btn.disabled = true; }
  sb.from('patients').update({ nom: nom, prenom: prenom, ddn: ddn, sexe: sexe, sport: sport })
    .eq('id', id).select().single()
    .then(function(res) {
      if (btn) { btn.textContent = '✓ Enregistrer'; btn.disabled = false; }
      if (res.error) { alert('Erreur : ' + res.error.message); return; }
      var idx = _allPatients.findIndex(function(x){ return x.id === id; });
      if (idx !== -1) _allPatients[idx] = res.data;
      _allPatients.sort(function(a,b){ return a.nom.localeCompare(b.nom); });
      if (_currentPatient && _currentPatient.id === id) {
        _currentPatient = res.data;
        try { localStorage.setItem('r4p-current-patient', JSON.stringify(res.data)); } catch(ex){}
        _broadcastPatient(res.data);
        _updatePatientBtn();
      }
      closeEditForm();
      renderPatients(_allPatients);
    });
}

function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── Sélectionner un patient ────────────────────────────── */
function selectPatient(id) {
  var p = _allPatients.find(function(x){ return x.id === id; });
  if (!p) return;
  _previousPatient = _currentPatient; // snapshot pour rollback
  _currentPatient = p;
  try { localStorage.setItem('r4p-current-patient', JSON.stringify(p)); } catch(e) {}
  _updatePatientBtn();
  _broadcastPatient(p);
  renderPatients(_allPatients);
}

/* ── Désélectionner ─────────────────────────────────────── */
function deselectPatient() {
  _currentPatient = null;
  try { localStorage.removeItem('r4p-current-patient'); } catch(e) {}
  _updatePatientBtn();
  _broadcastPatient(null);
}

/* ── Créer un patient ───────────────────────────────────── */
function createPatient() {
  var nom    = (document.getElementById('pm-nom').value||'').trim().toUpperCase();
  var prenom = (document.getElementById('pm-prenom').value||'').trim();
  var ddn    = document.getElementById('pm-ddn').value || null;
  var civ    = document.getElementById('pm-civ').value;
  var sport  = (document.getElementById('pm-sport').value||'').trim();
  if (!nom || !prenom) { alert('Nom et prénom requis.'); return; }
  sb.auth.getSession().then(function(r) {
    var uid = r.data && r.data.session && r.data.session.user && r.data.session.user.id;
    if (!uid) return;
    var sexe = civ === 'Mme.' ? 'F' : 'H';
    sb.from('patients').insert({ praticien_id: uid, nom: nom, prenom: prenom, ddn: ddn, sexe: sexe, sport: sport })
      .select().single()
      .then(function(res) {
        if (res.error) { alert('Erreur : ' + res.error.message); return; }
        toggleCreateForm(false);
        _allPatients.push(res.data);
        _allPatients.sort(function(a,b){ return a.nom.localeCompare(b.nom); });
        selectPatient(res.data.id);
      });
  });
}

/* ── Supprimer un patient ───────────────────────────────── */
function deletePatient(id, e) {
  e.stopPropagation();
  var p = _allPatients.find(function(x){ return x.id === id; });
  if (!p) return;
  if (!confirm('Supprimer ' + p.nom + ' ' + p.prenom + ' et toutes ses données ?')) return;
  sb.from('patients').delete().eq('id', id).then(function(res) {
    if (res.error) { alert('Erreur : ' + res.error.message); return; }
    _allPatients = _allPatients.filter(function(x){ return x.id !== id; });
    if (_currentPatient && _currentPatient.id === id) deselectPatient();
    renderPatients(_allPatients);
  });
}
</script>
