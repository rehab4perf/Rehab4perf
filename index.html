<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Rehab4Perf</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#1A3A5C; }
.topnav {
  height:48px; background:#1A3A5C;
  display:flex; align-items:center; padding:0 18px; gap:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.3); flex-shrink:0;
}
.logo {
  font-family:Georgia,serif; font-style:italic; font-size:1.05rem;
  color:#fff; margin-right:14px; letter-spacing:-.01em; white-space:nowrap;
}
.logo .r { color:#4A90D9; }
.logo .n { color:#fff; font-weight:900; font-style:normal; }
.logo .p { color:#E74C3C; }
.tab {
  padding:0 16px; height:100%; border:none; background:none;
  color:rgba(255,255,255,.65); font-size:.82rem; font-weight:500;
  cursor:pointer; font-family:inherit; transition:color .15s;
  border-bottom:3px solid transparent; white-space:nowrap;
}
.tab:hover { color:#fff; }
.tab.active { color:#fff; border-bottom-color:#4A90D9; font-weight:700; }
.frame-wrap { position:relative; height:calc(100% - 48px); }
iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; display:none; background:#fff; }
iframe.active { display:block; }
.topnav-right {
  margin-left:auto; color:rgba(255,255,255,.75); font-size:.72rem;
  font-weight:500; line-height:1.4; text-align:right; white-space:nowrap;
}
@media (max-width:600px) {
  .topnav { padding:0 10px; } .tab { padding:0 10px; font-size:.78rem; }
  .logo { margin-right:10px; font-size:.92rem; } .topnav-right { display:none; }
}
</style>
</head>
<body>

<div class="topnav">
  <div class="logo">
    <span class="r">Rehab</span><span class="n">4</span><span class="p">Perf</span>
  </div>
  <button class="tab active" id="tab-bilan" onclick="show('bilan')">Bilan clinique</button>
  <button class="tab" id="tab-outils" onclick="show('outils')">Outils</button>
  <button class="tab" id="tab-prescription" onclick="show('prescription')">Prescription</button>
  <div class="topnav-right" id="userDisplay" style="cursor:pointer;" onclick="show('account')" title="Mon compte"></div>
</div>
<div class="frame-wrap">
  <iframe id="frame-bilan"       src="bilan.html?v=4"       class="active"></iframe>
  <iframe id="frame-outils"      src="outils.html?v=4"></iframe>
  <iframe id="frame-prescription" src="prescription.html?v=4"></iframe>
  <iframe id="frame-account"     src="account.html?v=4"></iframe>
</div>

<script>
function show(id) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('iframe').forEach(function(f){ f.classList.remove('active'); });
  var tab = document.getElementById('tab-'+id);
  if(tab) tab.classList.add('active');
  document.getElementById('frame-'+id).classList.add('active');
}

// Profil utilisateur depuis localStorage
(function(){
  try {
    var p = JSON.parse(localStorage.getItem('r4p-profile')||'{}');
    if(p.prenom || p.nom) {
      var name = ((p.prenom||'')+' '+(p.nom||'')).trim();
      var cab  = p.cabinet || 'Mon compte';
      var el = document.getElementById('userDisplay');
      el.style.color = 'rgba(255,255,255,.85)';
      el.innerHTML = name+'<br>'+cab;
    }
  } catch(e){}
})();

window.addEventListener('message', function(e){
  if(e.data && e.data.type==='r4p-profile'){
    try {
      var p = e.data.profile;
      localStorage.setItem('r4p-profile', JSON.stringify(p));
      var name = ((p.prenom||'')+' '+(p.nom||'')).trim();
      var cab  = p.cabinet || 'Mon compte';
      var el = document.getElementById('userDisplay');
      el.style.color = 'rgba(255,255,255,.85)';
      el.innerHTML = name+'<br>'+cab;
    } catch(ex){}
  }
});
</script>
</body>
</html>
