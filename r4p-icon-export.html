<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Poppins:wght@800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#e8e6e1; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:28px; font-family:system-ui; }

#icon {
  width:512px; height:512px;
  background:#ffffff;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;
  flex-shrink:0;
  overflow:hidden;
}
.wordmark { display:inline-flex; align-items:baseline; white-space:nowrap; line-height:1; }

button {
  font-family:system-ui; font-size:14px; font-weight:600; color:#2B5FA6;
  background:#fff; border:1.5px solid #2B5FA6; border-radius:24px;
  padding:10px 28px; cursor:pointer;
}
.note { font-size:12px; color:#888; }
</style>
</head>
<body>

<div id="icon">
  <svg viewBox="8 34 164 104" width="200" height="128">
    <g stroke="#2B5FA6" stroke-width="17" stroke-linecap="round" fill="none">
      <line x1="20" y1="118" x2="56" y2="104"/>
      <line x1="70" y1="122" x2="100" y2="84"/>
      <line x1="112" y1="125" x2="134" y2="66"/>
      <line x1="158" y1="128" x2="158" y2="46"/>
    </g>
  </svg>
  <div class="wordmark">
    <span style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:86px;color:#1A3A5C;letter-spacing:-.01em;line-height:1">rehab<sup style="font-size:.42em;line-height:0;color:#2B5FA6;vertical-align:.6em">4</sup></span><span style="font-family:'Poppins',sans-serif;font-weight:800;font-size:66px;color:#1A3A5C;letter-spacing:-.03em;line-height:1">perf</span>
  </div>
</div>

<button onclick="dl()">⬇ Télécharger PNG 512×512</button>
<p class="note">Attends 2s que les polices chargent avant de télécharger</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function dl(){
  var el = document.getElementById('icon');
  html2canvas(el, {
    scale: 1,
    useCORS: true,
    backgroundColor: '#ffffff',
    width: 512,
    height: 512,
    x: 0,
    y: 0,
    scrollX: 0,
    scrollY: 0,
    onclone: function(doc){
      doc.getElementById('icon').style.borderRadius = '0';
    }
  }).then(function(c){
    var a = document.createElement('a');
    a.download = 'rehab4perf-icon.png';
    a.href = c.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
