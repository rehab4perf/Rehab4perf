<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@1,600&family=Poppins:wght@800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A3A5C;--accent:#2B5FA6;--green:#2D6A4F;--orange:#D4600A;--border:#E8E6E1;--bg:#F5F7FA;--surface:#fff;--muted:#9D9B96}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--navy)}
.hdr{background:var(--navy);padding:16px 28px;display:flex;align-items:center;gap:12px}
.hdr-logo{display:inline-flex;align-items:center;gap:8px}
.hdr-logo .r{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:20px;color:#fff}
.hdr-logo .e{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:.44em;vertical-align:super;color:#7FA8D9;margin:0 .04em}
.hdr-logo .p{font-family:'Poppins',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:-.025em}
.badge{background:rgba(43,95,166,.4);border:1px solid rgba(43,95,166,.6);color:#90B8F0;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:20px;padding:3px 10px}
.hdr-src{color:rgba(255,255,255,.45);font-size:.68rem;margin-left:auto;letter-spacing:.06em;font-weight:600}
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-label{font-size:.63rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.btn{padding:4px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:#6B6860;font-size:.74rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700}
.sep{width:1px;height:22px;background:var(--border)}
.main{padding:24px 28px;max-width:900px}
.cat{margin-bottom:28px}
.cat-hdr{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding-bottom:9px;border-bottom:2px solid var(--border);margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:16px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative}
.card:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(43,95,166,.08)}
.card.sel{border-color:#2D6A4F;background:#EEF8F3}
.icon-bg{width:60px;height:60px;border-radius:14px;background:#EEF3FB;display:flex;align-items:center;justify-content:center}
.card-name{font-size:.7rem;font-weight:700;color:var(--navy);text-align:center;line-height:1.3}
.card-ctx{font-size:.6rem;color:var(--muted);text-align:center}
.sizes{display:flex;align-items:flex-end;gap:10px;padding-top:7px;border-top:1px solid var(--border);width:100%}
.sz{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.sz-lbl{font-size:.54rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600}
.chip{position:absolute;top:7px;right:7px;font-size:.52rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.chip-hi{background:#EEF3FB;color:#2B5FA6}
.chip-custom{background:#FFF3E0;color:#E65100}
</style>

function mkSvg(icon, size) {
  var c = COLOR;
  if(icon.type==='hi') {
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="'+size+'" height="'+size+'" fill="'+c+'" style="color:'+c+';flex-shrink:0">'+icon.d+'</svg>';
  }
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="'+size+'" height="'+size+'" fill="none" stroke="'+c+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">'+icon.d+'</svg>';
}

function render() {
  var html='';
  ICONS.forEach(function(sec){
    html+='<div class="cat"><div class="cat-hdr">'+sec.cat+'</div><div class="grid">';
    sec.items.forEach(function(icon){
      var chip = icon.type==='hi'
        ? '<div class="chip chip-hi">HI</div>'
        : '<div class="chip chip-custom">custom</div>';
      html+='<div class="card" onclick="this.classList.toggle(\'sel\')">'
        +chip
        +'<div class="icon-bg">'+mkSvg(icon,PREV)+'</div>'
        +'<div class="card-name">'+icon.name+'</div>'
        +'<div class="card-ctx">'+icon.ctx+'</div>'
        +'<div class="sizes">'
        +'<div class="sz"><div style="height:24px;display:flex;align-items:center">'+mkSvg(icon,18)+'</div><div class="sz-lbl">18px</div></div>'
        +'<div class="sz"><div style="height:32px;display:flex;align-items:center">'+mkSvg(icon,24)+'</div><div class="sz-lbl">24px</div></div>'
        +'<div class="sz"><div style="height:48px;display:flex;align-items:center">'+mkSvg(icon,40)+'</div><div class="sz-lbl">40px</div></div>'
        +'</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('main').innerHTML=html;
}

function setC(k,btn){
  document.querySelectorAll('.btn').forEach(function(b){if(['Navy','Accent','Vert','Orange'].includes(b.textContent))b.classList.remove('on');});
  btn.classList.add('on'); COLOR=COLORS[k]; render();
}
function setPrev(v,btn){
  document.querySelectorAll('.btn').forEach(function(b){if(['S','M','L','XL'].includes(b.textContent))b.classList.remove('on');});
  btn.classList.add('on'); PREV=v; render();
}
render();
